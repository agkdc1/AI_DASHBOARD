apiVersion: v1
kind: Service
metadata:
  name: intranet-redis
  namespace: intranet
  labels:
    app.kubernetes.io/name: intranet-redis
    app.kubernetes.io/component: cache
    app.kubernetes.io/part-of: shinbee-intranet
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: intranet-redis
  ports:
    - port: 6379
      targetPort: redis
      protocol: TCP
      name: redis
