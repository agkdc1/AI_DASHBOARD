apiVersion: v1
kind: Service
metadata:
  name: intranet-db
  namespace: intranet
  labels:
    app.kubernetes.io/name: intranet-db
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: shinbee-intranet
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: intranet-db
  ports:
    - port: 5432
      targetPort: postgres
      protocol: TCP
      name: postgres
