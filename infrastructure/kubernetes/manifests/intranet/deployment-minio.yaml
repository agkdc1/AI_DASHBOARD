apiVersion: apps/v1
kind: Deployment
metadata:
  name: intranet-minio
  namespace: intranet
  labels:
    app.kubernetes.io/name: intranet-minio
    app.kubernetes.io/component: storage
    app.kubernetes.io/part-of: shinbee-intranet
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: intranet-minio
  template:
    metadata:
      labels:
        app.kubernetes.io/name: intranet-minio
        app.kubernetes.io/component: storage
        app.kubernetes.io/part-of: shinbee-intranet
    spec:
      priorityClassName: shinbee-normal
      nodeSelector:
        kubernetes.io/arch: amd64
      containers:
        - name: minio
          image: minio/minio:latest
          args: ["server", "/data", "--console-address", ":9001"]
          ports:
            - containerPort: 9000
              name: api
            - containerPort: 9001
              name: console
          env:
            - name: TZ
              value: Asia/Tokyo
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: access-key
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: minio-secret
                  key: secret-key
          resources:
            requests:
              memory: 128Mi
              cpu: 100m
            limits:
              memory: 256Mi
              cpu: 500m
          volumeMounts:
            - name: minio-data
              mountPath: /data
          startupProbe:
            httpGet:
              path: /minio/health/live
              port: api
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 20
          readinessProbe:
            httpGet:
              path: /minio/health/live
              port: api
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: api
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
      volumes:
        - name: minio-data
          persistentVolumeClaim:
            claimName: minio-data
