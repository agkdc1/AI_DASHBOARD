apiVersion: apps/v1
kind: Deployment
metadata:
  name: intranet-redis
  namespace: intranet
  labels:
    app.kubernetes.io/name: intranet-redis
    app.kubernetes.io/component: cache
    app.kubernetes.io/part-of: shinbee-intranet
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: intranet-redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: intranet-redis
        app.kubernetes.io/component: cache
        app.kubernetes.io/part-of: shinbee-intranet
    spec:
      priorityClassName: shinbee-normal
      nodeSelector:
        kubernetes.io/arch: amd64
      containers:
        - name: redis
          image: redis:7-alpine
          command: ["redis-server", "--maxmemory", "100mb", "--maxmemory-policy", "allkeys-lru"]
          ports:
            - containerPort: 6379
              name: redis
          env:
            - name: TZ
              value: Asia/Tokyo
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 128Mi
              cpu: 250m
          volumeMounts:
            - name: redis-data
              mountPath: /data
          startupProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
      volumes:
        - name: redis-data
          persistentVolumeClaim:
            claimName: redis-data
