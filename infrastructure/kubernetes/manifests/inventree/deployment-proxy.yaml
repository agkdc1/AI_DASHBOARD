apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventree-proxy
  namespace: shinbee
  labels:
    app.kubernetes.io/name: inventree-proxy
    app.kubernetes.io/component: proxy
    app.kubernetes.io/part-of: shinbee
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: inventree-proxy
  template:
    metadata:
      labels:
        app.kubernetes.io/name: inventree-proxy
        app.kubernetes.io/component: proxy
        app.kubernetes.io/part-of: shinbee
    spec:
      priorityClassName: shinbee-high
      nodeSelector:
        kubernetes.io/arch: amd64
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: shinbee/workload
                    operator: In
                    values:
                      - inventree
      containers:
        - name: nginx
          image: nginx:1.25-alpine
          ports:
            - containerPort: 80
              name: http
          env:
            - name: INVENTREE_DOMAIN
              value: api.your-domain.com
            - name: PORTAL_DOMAIN
              value: portal.your-domain.com
            - name: TEST_API_DOMAIN
              value: test-api.your-domain.com
            - name: TEST_PORTAL_DOMAIN
              value: test-portal.your-domain.com
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 128Mi
              cpu: 250m
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/templates
              readOnly: true
            - name: inventree-data
              mountPath: /home/inventree/data
              readOnly: true
            - name: portal-assets
              mountPath: /srv/portal
              readOnly: true
          readinessProbe:
            httpGet:
              path: /
              port: http
              httpHeaders:
                - name: Host
                  value: api.your-domain.com
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /
              port: http
              httpHeaders:
                - name: Host
                  value: api.your-domain.com
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
      volumes:
        - name: nginx-config
          configMap:
            name: inventree-nginx-config
        - name: inventree-data
          persistentVolumeClaim:
            claimName: inventree-data
        - name: portal-assets
          persistentVolumeClaim:
            claimName: inventree-portal
