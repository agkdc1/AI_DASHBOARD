apiVersion: v1
kind: ConfigMap
metadata:
  name: inventree-nginx-config
  namespace: shinbee
data:
  default.conf.template: |
    # K8s variant: HTTP only, proxy_pass to gunicorn, Ingress handles TLS

    upstream inventree {
        server inventree-server:8000;
    }

    upstream inventree-test {
        server inventree-test-server:8000;
    }

    # API domain
    server {
        listen 80;
        server_name ${INVENTREE_DOMAIN};

        client_max_body_size 100M;

        location /static/ {
            alias /home/inventree/data/static/;
            expires 30d;
            access_log off;
            add_header Cache-Control "public, immutable";
        }

        location /media/ {
            alias /home/inventree/data/media/;
            auth_request /auth;
        }

        location = /auth {
            internal;
            proxy_pass http://inventree;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header X-Original-URI $request_uri;
            proxy_set_header X-Forwarded-Host $host;
        }

        location / {
            proxy_pass http://inventree;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # Pass Authentik forward auth headers to gunicorn
            proxy_set_header X-Authentik-Username $http_x_authentik_username;
            proxy_set_header X-Authentik-Email $http_x_authentik_email;
            proxy_set_header X-Authentik-Name $http_x_authentik_name;
            proxy_set_header X-Authentik-Groups $http_x_authentik_groups;
        }
    }

    # Portal domain
    server {
        listen 80;
        server_name ${PORTAL_DOMAIN};

        client_max_body_size 100M;

        location /portal-assets/ {
            alias /srv/portal/;
            expires 1h;
            access_log off;
        }

        location /static/ {
            alias /home/inventree/data/static/;
            expires 30d;
            access_log off;
            add_header Cache-Control "public, immutable";
        }

        location /media/ {
            alias /home/inventree/data/media/;
            auth_request /auth;
        }

        location = /auth {
            internal;
            proxy_pass http://inventree;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header X-Original-URI $request_uri;
            proxy_set_header X-Forwarded-Host $host;
        }

        location / {
            proxy_pass http://inventree;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Accept-Encoding "";
            # Pass Authentik forward auth headers to gunicorn
            proxy_set_header X-Authentik-Username $http_x_authentik_username;
            proxy_set_header X-Authentik-Email $http_x_authentik_email;
            proxy_set_header X-Authentik-Name $http_x_authentik_name;
            proxy_set_header X-Authentik-Groups $http_x_authentik_groups;
            sub_filter '</head>' '<link rel="stylesheet" href="/portal-assets/portal-override.css"><script src="/portal-assets/portal-override.js"></script></head>';
            sub_filter_once on;
            sub_filter_types text/html;
        }
    }

    # Test API domain — routes to test InvenTree server (separate DB, no SSO)
    server {
        listen 80;
        server_name ${TEST_API_DOMAIN};

        client_max_body_size 100M;

        location /static/ {
            alias /home/inventree/data/test-data/static/;
            expires 30d;
            access_log off;
            add_header Cache-Control "public, immutable";
        }

        location /media/ {
            alias /home/inventree/data/test-data/media/;
            auth_request /auth;
        }

        location = /auth {
            internal;
            proxy_pass http://inventree-test;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header X-Original-URI $request_uri;
            proxy_set_header X-Forwarded-Host $host;
        }

        location / {
            proxy_pass http://inventree-test;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # Test Portal domain
    server {
        listen 80;
        server_name ${TEST_PORTAL_DOMAIN};

        client_max_body_size 100M;

        location /static/ {
            alias /home/inventree/data/test-data/static/;
            expires 30d;
            access_log off;
            add_header Cache-Control "public, immutable";
        }

        location /media/ {
            alias /home/inventree/data/test-data/media/;
            auth_request /auth;
        }

        location = /auth {
            internal;
            proxy_pass http://inventree-test;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header X-Original-URI $request_uri;
            proxy_set_header X-Forwarded-Host $host;
        }

        location / {
            proxy_pass http://inventree-test;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
