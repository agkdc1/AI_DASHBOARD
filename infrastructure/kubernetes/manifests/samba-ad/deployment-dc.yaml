apiVersion: apps/v1
kind: Deployment
metadata:
  name: samba-ad-dc
  namespace: shinbee
  labels:
    app.kubernetes.io/name: samba-ad-dc
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: samba-ad-dc
  template:
    metadata:
      labels:
        app.kubernetes.io/name: samba-ad-dc
    spec:
      nodeSelector:
        kubernetes.io/arch: amd64
      containers:
        - name: samba-ad-dc
          image: asia-northeast1-docker.pkg.dev/your-gcp-project-id/shinbee/samba-ad-dc:latest
          env:
            - name: SAMBA_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: samba-ad-secret
                  key: admin-password
            - name: SAMBA_REALM
              value: "AD.YOUR-DOMAIN.COM"
            - name: SAMBA_DOMAIN
              value: "AD"
            - name: DNS_FORWARDER
              value: "10.0.7.1"
            - name: TZ
              value: "Asia/Tokyo"
          ports:
            - name: dns-tcp
              containerPort: 53
              protocol: TCP
            - name: dns-udp
              containerPort: 53
              protocol: UDP
            - name: kerberos-tcp
              containerPort: 88
              protocol: TCP
            - name: kerberos-udp
              containerPort: 88
              protocol: UDP
            - name: ldap-tcp
              containerPort: 389
              protocol: TCP
            - name: ldap-udp
              containerPort: 389
              protocol: UDP
            - name: smb
              containerPort: 445
              protocol: TCP
            - name: kpasswd-tcp
              containerPort: 464
              protocol: TCP
            - name: kpasswd-udp
              containerPort: 464
              protocol: UDP
            - name: ldaps
              containerPort: 636
              protocol: TCP
            - name: gc
              containerPort: 3268
              protocol: TCP
            - name: gc-ssl
              containerPort: 3269
              protocol: TCP
          readinessProbe:
            tcpSocket:
              port: 389
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 389
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1"
          volumeMounts:
            - name: samba-data
              mountPath: /var/lib/samba
      volumes:
        - name: samba-data
          persistentVolumeClaim:
            claimName: samba-ad-data
