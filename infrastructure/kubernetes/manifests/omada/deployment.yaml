apiVersion: apps/v1
kind: Deployment
metadata:
  name: omada-controller
  namespace: shinbee
  labels:
    app.kubernetes.io/name: omada-controller
    app.kubernetes.io/component: network
    app.kubernetes.io/part-of: shinbee
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: omada-controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: omada-controller
        app.kubernetes.io/component: network
        app.kubernetes.io/part-of: shinbee
    spec:
      priorityClassName: shinbee-normal
      nodeSelector:
        kubernetes.io/arch: amd64
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: shinbee/workload
                    operator: In
                    values:
                      - inventree
      containers:
        - name: omada
          image: mbentley/omada-controller:5.15
          ports:
            - containerPort: 8088
              name: http
            - containerPort: 8043
              name: https
            - containerPort: 8843
              name: portal-https
            - containerPort: 29810
              name: discovery
              protocol: UDP
            - containerPort: 29811
              name: manage-v1
            - containerPort: 29812
              name: adopt-v1
            - containerPort: 29813
              name: upgrade
            - containerPort: 29814
              name: manage-v2
          env:
            - name: TZ
              value: Asia/Tokyo
            - name: MANAGE_HTTP_PORT
              value: "8088"
            - name: MANAGE_HTTPS_PORT
              value: "8043"
            - name: PORTAL_HTTP_PORT
              value: "8088"
            - name: PORTAL_HTTPS_PORT
              value: "8843"
          resources:
            requests:
              memory: 512Mi
              cpu: 250m
            limits:
              memory: 1024Mi
              cpu: "1"
          volumeMounts:
            - name: omada-data
              mountPath: /opt/tplink/EAPController/data
            - name: omada-logs
              mountPath: /opt/tplink/EAPController/logs
      volumes:
        - name: omada-data
          persistentVolumeClaim:
            claimName: omada-data
        - name: omada-logs
          persistentVolumeClaim:
            claimName: omada-logs
