apiVersion: apps/v1
kind: Deployment
metadata:
  name: openldap
  namespace: shinbee
  labels:
    app.kubernetes.io/name: openldap
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: openldap
  template:
    metadata:
      labels:
        app.kubernetes.io/name: openldap
    spec:
      nodeSelector:
        kubernetes.io/arch: amd64
      initContainers:
        - name: copy-seed
          image: busybox:1.36
          command: ["sh", "-c", "cp /ldifs-ro/* /ldifs/ && chown -R 911:911 /ldifs/"]
          volumeMounts:
            - name: ldap-seed-ro
              mountPath: /ldifs-ro
            - name: ldap-seed
              mountPath: /ldifs
      containers:
        - name: openldap
          image: osixia/openldap:latest
          ports:
            - name: ldap
              containerPort: 389
          env:
            - name: LDAP_ORGANISATION
              value: "Shinbee Japan"
            - name: LDAP_DOMAIN
              value: "your-domain.local"
            - name: LDAP_BASE_DN
              value: "dc=shinbee,dc=local"
            - name: LDAP_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: openldap-admin
                  key: password
            - name: LDAP_REMOVE_CONFIG_AFTER_SETUP
              value: "false"
          readinessProbe:
            tcpSocket:
              port: 389
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 389
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          volumeMounts:
            - name: ldap-data
              mountPath: /var/lib/ldap
            - name: ldap-config
              mountPath: /etc/ldap/slapd.d
            - name: ldap-seed
              mountPath: /container/service/slapd/assets/config/bootstrap/ldif/custom
      volumes:
        - name: ldap-data
          emptyDir: {}
        - name: ldap-config
          emptyDir: {}
        - name: ldap-seed
          emptyDir: {}
        - name: ldap-seed-ro
          configMap:
            name: openldap-seed
