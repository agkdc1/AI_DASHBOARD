apiVersion: apps/v1
kind: Deployment
metadata:
  name: mock-oidc
  namespace: shinbee-test
  labels:
    app.kubernetes.io/name: mock-oidc
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mock-oidc
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mock-oidc
    spec:
      containers:
        - name: mock-oidc
          image: python:3.12-slim
          command: ["sh", "-c"]
          args:
            - |
              pip install --quiet fastapi uvicorn
              python /app/main.py
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /.well-known/openid-configuration
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          volumeMounts:
            - name: app
              mountPath: /app
              readOnly: true
      volumes:
        - name: app
          configMap:
            name: mock-oidc-server
