apiVersion: batch/v1
kind: Job
metadata:
  name: playwright-tests
  namespace: shinbee
  labels:
    app.kubernetes.io/name: playwright-tests
    app.kubernetes.io/part-of: shinbee-test
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 7200
  template:
    metadata:
      labels:
        app.kubernetes.io/name: playwright-tests
    spec:
      nodeSelector:
        kubernetes.io/arch: amd64
      containers:
        - name: playwright
          image: asia-northeast1-docker.pkg.dev/your-gcp-project-id/shinbee/playwright-test:latest
          env:
            - name: TEST_PORTAL_URL
              value: "https://test-portal.your-domain.com"
            - name: TEST_APP_URL
              value: "https://test-app.your-domain.com"
            - name: AI_ASSISTANT_URL
              value: "https://ai.your-domain.com"
            - name: VIKUNJA_URL
              value: "https://tasks.your-domain.com"
            - name: OUTLINE_URL
              value: "https://wiki.your-domain.com"
            - name: TEST_USER
              value: "admin"
            - name: TEST_PASSWORD
              value: "change-me"
          command: ["npx", "playwright", "test", "--reporter=html,list"]
          resources:
            requests:
              memory: 512Mi
              cpu: 250m
            limits:
              memory: 2Gi
              cpu: "2"
      restartPolicy: Never
