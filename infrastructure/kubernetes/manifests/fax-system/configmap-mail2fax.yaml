apiVersion: v1
kind: ConfigMap
metadata:
  name: mail2fax-config
  namespace: fax-system
  labels:
    app.kubernetes.io/name: mail2fax
    app.kubernetes.io/part-of: shinbee-fax
data:
  main.cf.template: |
    # Postfix main configuration — generated from template
    # Do not edit directly; modify main.cf.template instead.

    # General
    myhostname = {{DOMAIN}}
    mydomain = {{DOMAIN}}
    myorigin = $mydomain
    mydestination =
    mynetworks = 127.0.0.0/8 [::1]/128 10.0.0.0/21 172.20.0.0/24
    inet_interfaces = all
    inet_protocols = ipv4

    # Virtual domain: intercept all mail to @fax
    virtual_mailbox_domains = fax
    virtual_transport = email_processor:

    # SASL authentication
    smtpd_sasl_auth_enable = yes
    smtpd_sasl_security_options = noanonymous
    smtpd_sasl_local_domain = $myhostname

    # Recipient restrictions: accept mail for our virtual domains, reject the rest
    smtpd_recipient_restrictions = permit_mynetworks, permit_sasl_authenticated, reject_unauth_destination

    # Client restrictions: only allow LAN connections
    smtpd_client_restrictions = permit_mynetworks, reject

    # Outbound relay (outbound port 25 blocked by ISP)
    relayhost = [{{RELAY_HOST}}]:{{RELAY_PORT}}
    smtp_sasl_auth_enable = yes
    smtp_sasl_password_maps = hash:/etc/postfix/sasl_passwd
    smtp_sasl_security_options = noanonymous
    smtp_tls_security_level = encrypt
    smtp_tls_CAfile = /etc/ssl/certs/ca-certificates.crt

    # TLS — inbound
    smtpd_tls_security_level = may
    smtpd_tls_cert_file = {{CERT_DIR}}/fullchain.pem
    smtpd_tls_key_file = {{CERT_DIR}}/privkey.pem
    smtpd_tls_protocols = >=TLSv1.2

    # Message size limit (25 MB)
    message_size_limit = 26214400

    # Misc
    maillog_file = /dev/stdout
  master.cf.template: |
    # Postfix master process configuration — generated from template
    # ==========================================================================
    # service type  private unpriv  chroot  wakeup  maxproc command + args
    # ==========================================================================

    # Submission (587) — authenticated clients with STARTTLS
    submission inet  n       -       n       -       -       smtpd
        -o smtpd_tls_security_level=encrypt
        -o smtpd_sasl_auth_enable=yes
        -o smtpd_client_restrictions=permit_sasl_authenticated,reject

    # Internal pickup & cleanup
    pickup    unix  n       -       n       60      1       pickup
    cleanup   unix  n       -       n       -       0       cleanup
    qmgr      unix  n       -       n       300     1       qmgr
    tlsmgr    unix  -       -       n       1000?   1       tlsmgr
    rewrite   unix  -       -       n       -       -       trivial-rewrite
    bounce    unix  -       -       n       -       0       bounce
    defer     unix  -       -       n       -       0       bounce
    trace     unix  -       -       n       -       0       bounce
    verify    unix  -       -       n       -       1       verify
    flush     unix  n       -       n       1000?   0       flush
    proxymap  unix  -       -       n       -       -       proxymap
    smtp      unix  -       -       n       -       -       smtp
    relay     unix  -       -       n       -       -       smtp
            -o syslog_name=postfix/$service_name
    error     unix  -       -       n       -       -       error
    retry     unix  -       -       n       -       -       error
    discard   unix  -       -       n       -       -       discard
    local     unix  -       n       n       -       -       local
    virtual   unix  -       n       n       -       -       virtual
    lmtp      unix  -       -       n       -       -       lmtp
    anvil     unix  -       -       n       -       1       anvil
    scache    unix  -       -       n       -       1       scache
    postlog   unix-dgram n  -       n       -       1       postlogd

    # Fax email processor — pipe transport
    email_processor unix -  n       n       -       1       pipe
        flags=F user=root argv=/app/scripts/email_processor.py ${recipient}
  smtpd.conf: |
    pwcheck_method: auxprop
    auxprop_plugin: sasldb
    mech_list: PLAIN LOGIN
