apiVersion: v1
kind: ConfigMap
metadata:
  name: hylafax-config
  namespace: fax-system
  labels:
    app.kubernetes.io/name: asterisk
    app.kubernetes.io/part-of: shinbee-fax
data:
  config: |
    InternationalPrefix:	00
    CountryCode:		81
    AreaCode:		03
    LongDistancePrefix:	0
  config.ttyIAX0: |
    CountryCode:		81
    AreaCode:		03
    FAXNumber:		+81.3.6424.5304
    LongDistancePrefix:	0
    InternationalPrefix:	001
    DialStringRules:	etc/dialrules
    ServerTracing:		1
    SessionTracing:		11
    RecvFileMode:		0600
    LogFileMode:		0600
    DeviceMode:		0600
    RingsBeforeAnswer:	1
    SpeakerVolume:		off
    GettyArgs:		"-h %l dx_%s"
    LocalIdentifier:	"Fax Server"
    TagLineFont:		etc/lutRS18.pcf
    TagLineFormat:		"From %%l|%c|Page %%P of %%T"
    MaxRecvPages:		25
    ModemType:		Class1
    ModemResetCmds:		"ATZ"
    ModemReadyStateCmds:	AT+VTS=7
  setup.cache: |
    AWK='/usr/bin/awk'
    BASE64ENCODE='/bin/base64'
    BIN='/usr/bin'
    CAT='/bin/cat'
    CHGRP='/bin/chgrp'
    CHMOD='/bin/chmod'
    CHOWN='/bin/chown'
    CP='/bin/cp'
    DPSRIP=''
    ECHO='/bin/echo'
    ENCODING='base64'
    FAXQ_SERVER='yes'
    FONTPATH='/usr/share/fonts/type1/gsfonts'
    FUSER='fuser'
    GREP='/bin/grep'
    GSRIP='/usr/bin/gs'
    HFAXD_SERVER='yes'
    HFAXD_SNPP_SERVER='no'
    IMPRIP='/usr/bin/psrip'
    LIBDATA='/etc/hylafax'
    LIBEXEC='/usr/sbin'
    LN='/bin/ln'
    MANDIR='/usr/share/man'
    MIMENCODE='mimencode'
    MKFIFO='/usr/bin/mkfifo'
    MV='/bin/mv'
    PATHEGETTY='/etc/hylafax/egetty-link'
    PATHGETTY='/etc/hylafax/getty-link'
    PATH='/usr/sbin:/bin:/usr/bin:/etc:/usr/local/bin'
    PATHVGETTY='/etc/hylafax/vgetty-link'
    PCL6CMD='pcl6'
    PSPACKAGE='gs'
    QPENCODE='qp-encode'
    RM='/bin/rm'
    SBIN='/usr/sbin'
    SCRIPT_SH='/bin/bash'
    SED='/bin/sed'
    SENDMAIL='/usr/lib/sendmail'
    SPOOL='/var/spool/hylafax'
    SYSVINIT=''
    TARGET='x86_64-unknown-linux-gnu'
    TIFF2PDF='/usr/bin/tiff2pdf'
    TIFFBIN='/usr/bin'
    TTYCMD='/usr/bin/tty'
    UUCP_LOCKDIR='/var/lock'
    UUCP_LOCKTYPE='ascii'
    UUENCODE='uuencode'
  setup.modem: |
    prompt()
    {
       echo -n "$* "
    }
    	    ttyPort()
    	    {
    		expr $1 : 'tty\(.*\)'
    	    }
    	    ttyLocks()
    	    {
    		echo $UUCP_LOCKDIR/LCK..`expr /$1 : '.*/\(.*\)'`
    	    }
    	    ttyAliases()
    	    {
    		if [ -z "`echo $1 | grep "^/"`" ]; then printf "/dev/"; fi
    		echo $1
    	    }
    	    ttyDev()
    	    {
    		if [ -z "`echo $1 | grep "^/"`" ]; then printf "/dev/"; fi
    		echo $1
    	    }
    	    checkPort()
    	    {
    		 return
    	    }
    	    ttyStty()
    	    {
    		echo /bin/stty
    	    }
    	    ttySpeeds()
    	    {
    		speeds=
    		if [ -z "$SPEED" ]; then
    		    for s in 38400 19200 9600 4800 2400 1200; do
    			onDev /bin/stty $s </dev/null >/dev/null 2>&1 && speeds="$speeds $s"
    		    done
    		fi
    		echo $speeds
    	    }
