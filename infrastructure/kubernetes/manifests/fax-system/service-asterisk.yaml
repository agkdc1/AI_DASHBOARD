apiVersion: v1
kind: Service
metadata:
  name: asterisk
  namespace: fax-system
  labels:
    app.kubernetes.io/name: asterisk
    app.kubernetes.io/part-of: shinbee-fax
  annotations:
    metallb.universe.tf/loadBalancerIPs: "10.0.0.254"
    metallb.universe.tf/allow-shared-ip: "fax-stack"
spec:
  type: LoadBalancer
  externalTrafficPolicy: Local
  selector:
    app.kubernetes.io/name: asterisk
  ports:
    # SIP (5060/UDP) and IAX (4569/UDP) removed — Asterisk uses hostNetwork
    # and binds directly to the MetalLB VIP. kube-proxy DNAT breaks hostNetwork
    # SIP because it rewrites dst IP from VIP to node IP, but Asterisk binds to VIP.
    - name: faxapi
      port: 8010
      targetPort: 8010
      protocol: TCP
