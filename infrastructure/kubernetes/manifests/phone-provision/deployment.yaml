apiVersion: apps/v1
kind: Deployment
metadata:
  name: phone-provision
  namespace: shinbee
  labels:
    app.kubernetes.io/name: phone-provision
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: phone-provision
  template:
    metadata:
      labels:
        app.kubernetes.io/name: phone-provision
    spec:
      nodeSelector:
        kubernetes.io/arch: amd64
      initContainers:
        - name: fetch-firmware
          image: alpine:3.19
          command:
            - sh
            - -c
            - |
              apk add --no-cache curl >/dev/null 2>&1
              echo "Downloading GXP17xx firmware..."
              curl -sf -o /firmware/gxp1700fw.bin https://firmware.grandstream.com/gxp1700fw.bin
              echo "Done: $(ls -lh /firmware/gxp1700fw.bin)"
          volumeMounts:
            - name: firmware
              mountPath: /firmware
          resources:
            requests:
              memory: "48Mi"
              cpu: "50m"
            limits:
              memory: "96Mi"
              cpu: "200m"
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - name: http
              containerPort: 80
          readinessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              memory: "32Mi"
              cpu: "25m"
            limits:
              memory: "64Mi"
              cpu: "100m"
          volumeMounts:
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
            - name: provision-files
              mountPath: /usr/share/nginx/html
            - name: firmware
              mountPath: /srv/firmware
      volumes:
        - name: nginx-conf
          configMap:
            name: phone-provision-nginx
        - name: provision-files
          configMap:
            name: phone-provision-files
        - name: firmware
          emptyDir: {}
