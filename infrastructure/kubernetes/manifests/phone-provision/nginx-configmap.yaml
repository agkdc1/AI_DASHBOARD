apiVersion: v1
kind: ConfigMap
metadata:
  name: phone-provision-nginx
  namespace: shinbee
data:
  default.conf: |
    server {
        listen 80;
        server_name _;

        root /usr/share/nginx/html;
        autoindex off;

        location /healthz {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        # Firmware files served from init container download
        location ~* \.bin$ {
            root /srv/firmware;
            try_files $uri =404;
        }

        location / {
            # Grandstream requests: GET /cfg<mac>.xml
            try_files $uri =404;
            add_header Content-Type application/xml;
        }

        # Log provisioning requests for debugging
        access_log /var/log/nginx/access.log;
    }
