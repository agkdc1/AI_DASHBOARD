id: call_ja_060
name: 'JA call #60'
language: ja-JP
text: 'もしもし、はい、[REDACTED_NAME]です。


  お疲れ様です、[REDACTED_NAME]です。あ、あのー、今、ちょっとよろしいでしょうか？


  はい、はい、お疲れ様です。大丈夫ですよ。


  ありがとうございます。えーと、来月の**棚卸し**の件なんですけど、そのー、全体の**スケジュール**をですね、来月第一週で組みたいと考えてまして。[一時停止]
  具体的には、えっと、月曜にA棟を、火曜にB棟を…あ、違う、ごめんなさい、水曜でした。月曜と水曜で進めたいのですが、ご都合どうでしょうか？


  [雑音] あー、月と水ですね、第一週の。うーん、まぁ、その日程なら問題ないと思います。はい。


  あ、よかったです。では、その**スケジュール**で進めますね。それで、あの…なんだっけ…ああ、そうだ、担当者の割り当てをお願いしたいんですが。


  はい、承知しました。担当者ですね。来週中には決めておきます。


  助かります。では、よろしくお願いいたします。


  はい。失礼いたします。


  失礼します。'
