id: call_ja_045
name: 'JA call #45'
language: ja-JP
text: 'もしもし、はい、物流部の[REDACTED_NAME]です。


  あ、お疲れ様です。管理部の[REDACTED_NAME]です。えーと、今、ちょっとお時間よろしいでしょうか？


  [雑音]あ、はい、お疲れ様です。はい、はい。大丈夫ですよ。


  ありがとうございます。あのー、来月の**フォークリフト**の定期**点検**の件なんですけど、えー、日程がですね、来月第一週の月曜日、午前中で、あ、違う、えーと、その日程で調整がほぼ確定したので、そのご連絡です。


  あ、もしもし？ちょっと聞こえにくい…あ、聞こえました。来月第一月曜の午前中ですね。うーん、はい、承知しました。えーっと、対象って3…いや4台でしたっけ？


  はい、そうです。4台です。それで、あの…もし可能であれば、なんかそのー、業者さんが来る前に簡単な**点検**をそちらでお願いできればと…


  あ、はいはい、わかりました。事前に確認して、もし何か不具合箇所とかあれば、まとめておけばいいんですね。


  はい、助かります。では、よろしくお願いします。失礼します。


  はい、承知いたしました。失礼します。[電話の音]'
