id: call_kr_009
name: 'KR call #9'
language: ko-KR
text: '여보세요, [REDACTED_NAME]입니다.

  아, 네. [REDACTED_NAME] 대리님, 수고 많으십니다. 저 [REDACTED_NAME]인데요.

  네, 수고하십니다.

  음... 다름이 아니라, 저기... 부품 **재고** 관련해서 전화드렸는데요. 그, P... 아니, 피-디 삼사오육(**P-D3456**) 있잖아요?
  그게... [일시정지]

  아, 저기 잘 안 들리는데... 다시 한번만 말씀해주시겠어요?

  아, 네. **P-D3456** **재고**가 음... 거의 다 떨어져서요. [잡음]

  아, 그래요? 어... 지금 몇 개 정도 남았어요? 한 스무... 아니, 열 개 정도 되나?

  아니요, 그게 아니라... 방금 확인했는데 딱 세... 아니 다섯 개 남았습니다. 다섯 개요.

  아, 다섯 개요? 알겠습니다. 어... 그럼 제가 바로 확인해서 추가 발주 넣도록 하겠습니다.

  네, 네. 감사합니다. 그럼 다음 주 초까지는 입고 가능할까요?

  네, 문제없을 겁니다. 처리하고 다시 연락드리겠습니다.

  네, 알겠습니다. 그럼 수고하세요.

  네, 들어가세요.'
