id: call_kr_011
name: 'KR call #11'
language: ko-KR
text: '여보세요, [REDACTED_NAME] 씨?

  아, 네, [REDACTED_NAME] 팀장님. 어... 수고 많으십니다.

  아, 네. 수고 많아요. 저기, 다름이 아니라... [잡음] 아, 지금 통화 괜찮아요?

  네, 네. 괜찮습니다. 말씀하세요.

  음, 최근에 그 **라쿠텐** 쪽에서 들어온 **주문** 있잖아요. 어... 주문 번호가... 잠시만요... 아, 그래, 그... 123...
  아니, 125로 시작하는 거요. 거기 고객 주소가 좀 이상해서요.

  아, 네. 그 주문이요. 저도 그거 보고 좀 이상하다고 생각은... 아, 아니, 그러니까 확인이 필요하다고 생각했습니다.

  그렇죠? 일단 그거 발송 보류하고, 제가 고객센터 통해서 확인 요청해 둘게요. [REDACTED_NAME] 씨는 일단 다른 건부터 처리해 주세요.

  네, 알겠습니다. 그럼 그 건은 보류 처리하겠습니다. [기침]

  네, 그럼 부탁해요. 수고하고요.

  네, 들어가세요.'
