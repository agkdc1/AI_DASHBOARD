id: call_kr_028
name: 'KR call #28'
language: ko-KR
text: '아, 여보세요, 물류팀 [REDACTED_NAME]입니다. 어, 수고 많으십니다.

  네, 네, [REDACTED_NAME]님. 안녕하세요. 아, 무슨 일이실까요?

  다름이 아니라, 오늘 출고된 건의 그 **운송장** 관련해서 연락드렸는데요. 음... 저희가 시스템을 보니까 주소 입력 **오류**가 한...
  아니, 두 건 정도 발생한 것 같아서요.

  아, 그래요? 저기, 혹시 어떤 주문 건인지... [잡음] 아, 여보세요? 조금 끊기는 것 같은데 다시 한번만 말씀해주시겠어요?

  아, 죄송합니다. 제가 지금 메일로 주문 번호 보내드릴게요. 그러니까... 그... 확인 먼저 하시고 고객분께 연락해서 정확한 주소로 수정 후에
  재발송 처리 부탁드려도 될까요?

  네, 알겠습니다. 메일 확인하는 대로 뭐, 바로 처리하겠습니다.

  네, 감사합니다. 그럼 잘 부탁드립니다.

  네, 수고하세요. 들어가세요.'
expected:
  valid_json_keys:
  - title
  - description
  - due_date
  - priority
  - decisions
  title_contains:
  - 운송장
  - 오류
  priority_range:
  - 3
  - 4
  has_decisions: true
