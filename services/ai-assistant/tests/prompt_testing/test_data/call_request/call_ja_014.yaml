id: call_ja_014
name: 'JA call #14'
language: ja-JP
text: '受信者：「はい、[REDACTED_NAME]です。」


  発信者：「あ、お疲れ様です。[REDACTED_NAME]です。あのー、今、ちょっとお時間よろしいでしょうか？」


  受信者：「お疲れ様です。はい、はい。大丈夫ですよ。」


  発信者：「ありがとうございます。えーと、ご相談なんですけど、なんか最近、楽天からの注文で、発送遅延の問い合わせが、あ、違う、クレームに近いものがえーと、増えてきてる件でして。先週だけで3...いや5件くらいですかね。」[雑音]


  受信者：「あ、もしもし？ ちょっと聞こえにくくて…もう一度お願いします。」


  発信者：「あ、すみません。それで、あの…現状のフローを一度見直したく。うーん、来週あたりに30分ほどミーティングできませんかね？」


  受信者：「なるほど、承知しました。はい、大丈夫です。火曜日の14時…いや、ごめん、15時以降なら空いてます。」[一時停止]


  発信者：「ありがとうございます。では火曜15時でお願いします。まぁ、事前に簡単な資料を送りますね。」


  受信者：「はい、承知いたしました。」


  発信者：「では、よろしくお願いします。失礼いたします。」


  受信者：「はい、失礼いたします。」'
