id: call_kr_023
name: 'KR call #23'
language: ko-KR
text: '여보세요, 시스템팀 [REDACTED_NAME]입니다.

  아, 네, [REDACTED_NAME] 주임님. 수고 많으십니다.

  네, 수고하십니다. 저기, 다름이 아니라, 그 정기 **서버** 점검... 아니, **유지보수** 건 때문에 연락드렸는데요.

  아, 네네. 그거 일정이 어떻게 됐죠?

  아, 그게 이제... [잡음] 음... 다음 주 토요일 새벽... 아, 잠깐, 다시 말하면 다음 주 금요일에서 토요일로 넘어가는 새벽 2시부터
  5시까지로 확정됐거든요.

  아, 죄송합니다. 지금 주변이 좀 시끄러워서... 새벽 2시부터 몇 시까지라고요? 한... 4시였나?

  아, 5시까지입니다. 3시간 동안 진행될 예정이라서요. 그러니까, 사용자분들께 사전 공지를 좀...

  아, 네네, 알겠습니다. 2시부터 5시. 알겠습니다. 제가 바로 공지 올리도록 하겠습니다.

  네, 그럼 잘 부탁드립니다. 감사합니다.

  네, 들어가세요.'
expected:
  valid_json_keys:
  - title
  - description
  - due_date
  - priority
  - decisions
  title_contains:
  - 유지보수
  - 서버
  priority_range:
  - 2
  - 4
  has_decisions: true
