id: call_kr_030
name: 'KR call #30'
language: ko-KR
text: '**수신자:** 여보세요, 물류팀 [REDACTED_NAME]입니다.

  **발신자:** 아, 네, [REDACTED_NAME] 대리님, 어, 영업팀 [REDACTED_NAME]입니다. 수고 많으십니다.

  **수신자:** 네, 네, 팀장님. 무슨 일이십니까? [잡음] 아, 잠시만요, 주변이 좀… 네, 말씀하세요.

  **발신자:** 어… 다름이 아니라 오늘 오전에 출고된 건의 **운송장** 있잖아요. 음, 거기서 뭐랄까, 시스템 **오류**가, 아니, 시스템에
  **오류**가 좀 뜬 것 같아서요.

  **수신자:** 아, 정말요? 혹시 몇 건 정도인가요?

  **발신자:** 그게 한… 2건, 아니 3건 정도인데, 그러니까 주소 정보가 좀 불충분해서 반송된 것 같습니다. 제가 해당 **운송장** 번호를
  지금 바로 메일로… 아, 아니 메신저로 보내드릴 테니, 그, 확인하고 수정 좀 부탁드려도 될까요?

  **수신자:** 네, 알겠습니다. 그럼 메신저로 바로 보내주세요. 제가 확인하고 처리하겠습니다.

  **발신자:** 네, 감사합니다. 그럼 잘 부탁드립니다.

  **수신자:** 네, 들어가세요.'
expected:
  valid_json_keys:
  - title
  - description
  - due_date
  - priority
  - decisions
  title_contains:
  - 운송장
  - 오류
  priority_range:
  - 3
  - 4
  has_decisions: true
