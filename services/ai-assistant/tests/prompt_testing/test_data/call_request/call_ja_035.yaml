id: call_ja_035
name: 'JA call #35'
language: ja-JP
text: '[電話の音]


  発信者: もしもし、お疲れ様です、[REDACTED_NAME]です。


  受信者: あ、はい、お疲れ様です。[REDACTED_NAME]です。


  発信者: すみません、今ちょっとよろしいですか？えーと、本日出荷分の**送り状**の件なんですけど、あのー、システム上でなんかいくつか**エラー**が出てるみたいでして…。


  受信者: あ、そうなんですね。えー、ちなみに原因って、なんか分かりますか？[雑音]


  発信者: はい、えーっと、3件…いや、4件だったかな。そのー、どうも住所の入力不備が原因のようで。あ、いや、お忙しいところ申し訳ないんですが、そちらで内容を確認して修正をお願いできますでしょうか。


  受信者: **はい**、承知しました。すぐ確認して修正しますね。それで、あの…データは共有フォルダのままで大丈夫でしたっけ？


  発信者: はい、はい、そちらのデータでお願いします。まぁ、今日の集荷に間に合わせたいので、なるべく急いでいただけると助かります。


  受信者: かしこまりました。すぐに対応します。[咳]


  発信者: **では**、よろしくお願いします。**失礼します**。


  受信者: はい、**失礼します**。'
expected:
  valid_json_keys:
  - title
  - description
  - due_date
  - priority
  - decisions
  title_contains:
  - 送り状
  - エラー
  priority_range:
  - 3
  - 4
  has_decisions: true
