id: call_kr_002
name: 'KR call #2'
language: ko-KR
text: '**발신자:** 여보세요? 저기 영업팀 [REDACTED_NAME]입니다.


  **수신자:** 아, 네, [REDACTED_NAME] 씨. 수고 많으십니다.


  **발신자:** 네, 과장님. 어... 다름이 아니라 그 주문 번호 에스오(SO)-2024-5678 건 말인데요. [잡음] 아, 고객사 쪽에서
  좀 급하다고 하셔서... 이게 오늘 혹시 **출하**가 될 수 있을까 해서요.


  **수신자:** 아, 에스오... 이공이사 다시 오육칠팔이요? 음... 잠시만요, 재고 좀 볼게요. [일시정지] 아, 네, 가능해요. 이게 오전에...
  아니, 포장까지 다 끝난 상태네요.


  **발신자:** 아, 정말요? 다행입니다! 그럼, 뭐... 바로 진행 좀 부탁드립니다.


  **수신자:** 네, 네, 알겠습니다. 그럼 오늘 오후 첫 차로 바로 내보내겠습니다.


  **발신자:** 네, 감사합니다! 그럼 잘 부탁드립니다. 들어가세요.


  **수신자:** 네, 수고하세요.'
