id: call_ja_036
name: 'JA call #36'
language: ja-JP
text: '[電話の音]

  はい、もしもし、[REDACTED_NAME]です。


  あ、お疲れ様です、[REDACTED_NAME]です。えーと、今、少しよろしいでしょうか？


  はい、はい、お疲れ様です。大丈夫ですよ。


  ありがとうございます。あのー、本日発送分の**送り状**データなんですが、なんかシステム側で**エラー**が出ているとのことで…。あ、違う、えーと、出荷チームから連絡がありまして。


  あ、本当ですか。どういった内容でしょう？ [雑音]


  はい、そのー、住所情報が不完全という理由で弾かれているものが、えーっと、3件…いや4件だったかな、あるみたいでして。うーん、それで、あの…至急、確認と修正が必要でして。


  承知しました。じゃあ、すぐに共有フォルダのデータ見ますね。


  あ、助かります。いや、そうじゃなくて、もし可能なら、もうこちらで元データ修正しちゃっても大丈夫ですか？


  ああ、なるほど。はい、はい。お願いします。その方が早いですね。


  わかりました。じゃあ、えー、そのように進めます。では、取り急ぎ失礼します。


  はい、よろしくお願いいたします。失礼します。'
expected:
  valid_json_keys:
  - title
  - description
  - due_date
  - priority
  - decisions
  title_contains:
  - 送り状
  - エラー
  priority_range:
  - 3
  - 4
  has_decisions: true
