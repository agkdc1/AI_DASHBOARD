id: call_kr_024
name: 'KR call #24'
language: ko-KR
text: '여보세요, 네, [REDACTED_NAME]입니다.

  아, [REDACTED_NAME] 팀장님. 안녕하세요. 저 [REDACTED_NAME]입니다. 수고 많으십니다.

  아, 네, 네. 수고하십니다.

  어, 다름이 아니라요, 그, 서버 유지보수 관련해서 좀 공유드릴 게 있어서 연락드렸습니다.

  아, 서버요? 네, 말씀하세요. [잡음]

  네, 저기, 다음 주... 아니, 다다음 주 토요일이요. 다다음 주 토요일 새벽에 정기 서버 유지보수 작업이 있거든요. 그래서, 어... 그 시간
  동안에는 시스템 접속이 좀...

  아, 잠시만요. 여보세요? 좀 끊기는 것 같은데... 다다음 주 토요일이라고 하셨죠?

  아, 네, 맞습니다. 죄송합니다. 다다음 주 토요일 새벽 1시부터 한... 4시간? 아니, 5시까지니까 총 4시간이네요. 예. 그 시간 동안 작업이
  진행됩니다.

  아, 새벽 1시부터 5시까지. 음... 알겠습니다. 그럼 제가 팀원들한테 미리 공지해 놓겠습니다.

  네, 정말 감사합니다. 그럼 잘 부탁드리겠습니다.

  네, 알겠습니다. 수고하세요.

  네, 들어가세요.'
expected:
  valid_json_keys:
  - title
  - description
  - due_date
  - priority
  - decisions
  title_contains:
  - 유지보수
  - 서버
  priority_range:
  - 2
  - 4
  has_decisions: true
