id: call_ja_054
name: 'JA call #54'
language: ja-JP
text: 'もしもし、[REDACTED_NAME]です。お疲れ様です。


  [ノイズ]あ、お疲れ様です、[REDACTED_NAME]です。


  あ、[REDACTED_NAME]さん、えーと、今大丈夫ですか？あのー、ちょっと急ぎでして…。本日発送分で、えっと、品番がエスケーユー…あ、違う、SKU-Y200ですね、それに不良品が混ざって出荷された可能性があると…。[一時停止]


  えっ、本当ですか！？ えー、SKU-Y200ですか…あ、ちょっと聞こえにくいです、もう一度お願いします。


  あ、すみません、SKU-Y200です！そのー、不良品が、まぁ、数個だと思うんですが、すぐに出荷停止できますかね…？


  はい、はい、承知しました、すぐ確認します。…はい、まだ物流センターにあるようです。止められます！


  よかったです…。では、すぐに出荷停止を。いや、そうじゃなくて、まずはお客様へのご連絡を最優先でお願いします。


  はい、承知しました。こちらで対応して、状況を改めてご報告します。


  助かります。では、よろしくお願いします。失礼します。


  失礼します。'
