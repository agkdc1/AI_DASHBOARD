id: call_kr_005
name: 'KR call #5'
language: ko-KR
text: '여보세요?

  네, [REDACTED_NAME]입니다.

  아, [REDACTED_NAME] 과장님, 안녕하세요. 영업팀 [REDACTED_NAME]입니다. 어, 수고 많으십니다.

  네, 네. [REDACTED_NAME] 대리님, 수고하십니다. [잡음] 무슨 일이시죠?

  아, 다름이 아니라, 저기, 주문 번호 에스오-2026-0456 관련해서요. 음... 혹시 이거 오늘 출하 가능한지 해서...

  네? 아, 잠시만요. 에스오-이공이육... 아니, 다시 한번만요? 잘 안 들려서요.

  아, 죄송합니다. 에스오(SO)-2026-0456 입니다. 오늘 출하 말입니다.

  아, 네. [일시정지] 잠시만요... 그게... 아, 확인했습니다. 오늘 오후 출하 예정으로 잡혀 있네요.

  네, 맞습니다. 그러니까, 혹시 이걸 오전 중으로 바로 출하 처리해주실 수 있을까요? 고객사에서 좀 급하다고 해서요.

  오전이요... 어... 알겠습니다. 뭐, 제가 물류팀에 바로 얘기해서 최대한 오전에 처리하도록 조치하겠습니다.

  아, 정말 감사합니다! 그럼 잘 부탁드립니다!

  네, 알겠습니다. 수고하세요.

  네, 들어가세요.'
expected:
  valid_json_keys:
  - title
  - description
  - due_date
  - priority
  - decisions
  title_contains:
