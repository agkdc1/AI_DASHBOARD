id: call_ja_057
name: 'JA call #57'
language: ja-JP
text: '（プルルル… ガチャ）


  **受信者:** はい、[REDACTED_NAME]です。


  **発信者:** もしもし、お疲れ様です。[REDACTED_NAME]です。あ、今、**ちょっと**よろしいでしょうか？


  **受信者:** あ、お疲れ様です。はい、はい、大丈夫ですよ。


  **発信者:** ありがとうございます。**えーと**、来月の**棚卸し**の件でご相談なんですけど、**あのー**、**スケジュール**をですね、**えー**、第一週の、あ、違う、第二週の月曜にA棟、水曜にB棟っていう形で進めたいんですが…いかがでしょう？
  [雑音]


  **受信者:** あ、**えーっと**、第二週ですね？月曜がA棟、水曜B棟… [一時停止] **うーん**、**そのー**、B棟のほう、**なんか**火曜は別の作業が…あ、ごめん、水曜で大丈夫でした。はい、それでお願いします。


  **発信者:** あ、よかったです。**では**、その日程で確定します。それで、**あの**…各チームの応援なんですけど、**えーっと**、３…いや４名ずつでお願いできますか？


  **受信者:** ４名ずつですね。了解です。来週中に調整します。


  **発信者:** はい、ありがとうございます。**では**、失礼いたします。


  **受信者:** はい、お疲れ様です。**失礼します**。'
