id: call_ja_032
name: 'JA call #32'
language: ja-JP
text: '（コール音）


  受信者: 「はい、営業事務の[REDACTED_NAME]です。[雑音]」


  発信者: 「あ、もしもし、お疲れ様です。えーと、物流の[REDACTED_NAME]ですけど、今、ちょっと大丈夫ですか？」


  受信者: 「お疲れ様です。[REDACTED_NAME]さん。はい、はい、大丈夫ですよ。」


  発信者: 「ありがとうございます。あのー、今日出荷分の**送り状**を今作ってたんですけど、なんかシステムで**エラー**が…えー、2件、あ、違う、3件ですね、出てしまって。そのー、ちょっと確認お願いしたくて。」


  受信者: 「あら、本当ですか。申し訳ないです。えーっと、原因は分かりますか？」


  発信者: 「うーん、それが、住所の…なんだっけな…[一時停止] あ、そう、住所のフォーマットが多分おかしくて。それで、あの、該当の受注番号を今からチャットでお送りするので、元のデータの確認と修正をお願いできますでしょうか。」


  受信者: 「はい、承知いたしました。すぐ確認して、修正が終わったら折り返しご連絡します。」


  発信者: 「助かります。では、よろしくお願いいたします。失礼します。」


  受信者: 「はい、失礼しまーす。」'
