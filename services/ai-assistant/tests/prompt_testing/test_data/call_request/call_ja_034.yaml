id: call_ja_034
name: 'JA call #34'
language: ja-JP
text: '（電話の呼び出し音）


  受信者: 「はい、業務部の[REDACTED_NAME]です。」


  発信者: 「あ、もしもし、お疲れ様です。営業の[REDACTED_NAME]です。えーと、今、ちょっとよろしいでしょうか？」


  受信者: 「はい、お疲れ様です。あ、ちょっと聞こえにくい…もう一度お願いします。」


  発信者: 「あ、失礼しました。あの、本日出荷分の**送り状**の件でして、えー、なんかシステムで取り込んだら**エラー**が…あ、ごめん、エラーが3件、いや、5件だったかな？とにかくいくつか出てまして。」


  受信者: 「あ、本当ですか。うーん、原因はわかりますか？ [咳]」


  発信者: 「はい、はい。おそらく住所データが、そのー、不完全なのが原因かと。それで、あの…なんだっけ…ああそうだ、管理番号を今チャットで送るので、元データを確認して修正をお願いできますでしょうか？」


  受信者: 「はい、承知いたしました。すぐに確認して、あ、いや、確認して修正します。 [雑音]」


  発信者: 「助かります。では、よろしくお願いします。失礼します。」


  受信者: 「はい、承知しました。失礼します。」'
expected:
  valid_json_keys:
  - title
  - description
  - due_date
  - priority
  - decisions
  title_contains:
  - 送り状
  - エラー
  priority_range:
