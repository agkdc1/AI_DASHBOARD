id: call_kr_035
name: 'KR call #35'
language: ko-KR
text: '아, 여보세요, [REDACTED_NAME]입니다.

  네, [REDACTED_NAME]님. 수고하십니다. 아, 잠시만요, 주변이 좀... [잡음] 네, 네. 말씀하세요.

  음, 다름이 아니라, 그... 신상품 NP-2027 말인데요. 어... 재고 등록 때문에 전화드렸습니다.

  아, 네네. 말씀하세요.

  저기, InvenTree에 초회 로트... 아니, 일단 새 카테고리부터 만들고 그 초회 로트 스무, 아니 스무 개 맞나? [일시정지] 네, 20개
  재고 등록 좀 부탁드립니다.

  네, 알겠습니다. 그럼 NP-2027 카테고리 새로 만들고, 수량이 20개 맞으시죠?

  네, 맞습니다. 바로 좀 처리 부탁드릴게요.

  알겠습니다. 뭐, 처리하고 바로 다시 연락드리겠습니다.

  네, 감사합니다. 그럼 들어가세요.

  네.'
