id: call_ja_056
name: 'JA call #56'
language: ja-JP
text: '受信者：はい、[REDACTED_NAME]です。

  発信者：あ、お疲れ様です、[REDACTED_NAME]です。えーと、来月の**棚卸し**の件なんですけど、今、ちょっと大丈夫ですか？

  受信者：はい、はい、大丈夫ですよ。

  発信者：ありがとうございます。あのー、**スケジュール**の件でご相談でして、来月の第2週の月火…あ、いや、ごめんなさい、第3週でした。第3週の月曜にA棟、火曜にB棟っていう感じで進めたいんですけど、そのー、いかがでしょうか？
  [雑音]

  受信者：あ、もしもし？ すみません、ちょっと今、聞こえにくくて…えーと、もう一度お願いします。

  発信者：あ、失礼しました。えー、第3週の月曜がA棟、火曜がB棟での**棚卸し**です。

  受信者：なるほど、第3週の月火ですね。うーん、はい、承知しました。それで大丈夫です。

  発信者：よかったです。それで、あの…なんだっけ…ああ、そうだ。つきましては、そちらの担当者を、えーっと、2…いや3名くらい割り当てていただきたいんですが、来週金曜までにリストをもらえますか？

  受信者：はい、承知しました。じゃあ3名ですね。来週金曜までにリストを、えー、提出します。[咳]

  発信者：助かります。では、よろしくお願いします。

  受信者：はい。では、失礼します。

  発信者：失礼します。'
