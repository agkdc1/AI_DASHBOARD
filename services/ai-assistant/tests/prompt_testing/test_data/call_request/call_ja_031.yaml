id: call_ja_031
name: 'JA call #31'
language: ja-JP
text: '（プルルル…）


  受信者: 「はい、物流部の[REDACTED_NAME]です。」


  発信者: 「あ、お疲れ様です、営業の[REDACTED_NAME]です。えーと、今、少しよろしいでしょうか？」


  受信者: 「お疲れ様です。はい、はい、大丈夫ですよ。」


  発信者: 「ありがとうございます。あのー、本日発送分のデータなんですけど、そのー、システムで**送り状**をですね、発行しようとしたら、なんか2件…あ、違う、3件でした。3件ほど**エラー**が出ちゃいまして。[雑音]」


  受信者: 「あ、本当ですか。うーん、こちらでも確認しますね。[一時停止]…ああ、これ、おそらく[REDACTED_ADDRESS]の住所が、まぁ、長すぎるのが原因じゃないですかね。」


  発信者: 「ですよね。それで、あの…なんだっけ…あ、そうそう、お客様に確認したら、建物名を省略してOKとのことでしたので、今修正しました。データを再送するので、差し替えをお願いできますでしょうか？」


  受信者: 「**はい**、承知いたしました。新しいデータが届き次第、すぐに再発行しますね。」


  発信者: 「助かります。では、すぐにお送りしますので、よろしくお願いいたします。」


  受信者: 「承知しました。では、失礼いたします。」


  発信者: 「失礼いたします。」'
