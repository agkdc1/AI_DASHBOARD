id: call_kr_022
name: 'KR call #22'
language: ko-KR
text: 'A: 여보세요, 어... 기술지원팀 [REDACTED_NAME]입니다.


  B: 네, [REDACTED_NAME]님. 아, 수고 많으십니다.


  A: 네, 안녕하세요. 음... 다름이 아니라, 저희 이번에 **서버** 정기 **유지보수** 건 때문에 연락드렸거든요. [잡음] 아, 혹시 지금
  통화 괜찮으세요?


  B: 아, 네네, 괜찮습니다. 말씀하세요.


  A: 네. 그게, 다음 주 금요일... 아니, 토요일 새벽이네요. 토요일 새벽으로 일정이 잡혔는데, 이게 그러니까... 사용자들한테 공지가 좀
  필요할 것 같아서요.


  B: 아, 네. 알겠습니다. 저기, 혹시 시스템 중단 시간은 얼마나 되죠? [일시정지] 아, 여보세요?


  A: 아, 네, 네. 들립니다. 음... 새벽 2시부터 약 세... 아니, 네 시간 정도 걸릴 예정입니다. 괜찮으실까요?


  B: 네 시간... 아, 네. 문제없습니다. 해당 내용으로 바로 공지 올리도록 하겠습니다.


  A: 아, 네. 감사합니다. 그럼 잘 부탁드립니다.


  B: 네, 알겠습니다. 수고하세요.


  A: 네, 그럼 들어가세요.'
expected:
  valid_json_keys:
  - title
  - description
  - due_date
  - priority
  - decisions
  title_contains:
  - 유지보수
  - 서버
  priority_range:
  - 2
  - 4
  has_decisions: true
