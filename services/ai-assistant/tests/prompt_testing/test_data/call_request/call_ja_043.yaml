id: call_ja_043
name: 'JA call #43'
language: ja-JP
text: '（プルルル…ガチャ）


  受信者: 「もしもし、はい、物流課の[REDACTED_NAME]です。」


  発信者: 「あ、お疲れ様です。[REDACTED_NAME]ですけど、今、ちょっとよろしいですか？」


  受信者: 「あ、お疲れ様です。はい、はい、大丈夫ですよ。」


  発信者: 「ありがとうございます。あのー、来月の**フォークリフト**の定期**点検**の件でして。えーっと、業者さんが来るのが、第一…あ、違う、えーと第二週の火曜で確定しまして。」


  受信者: 「[雑音] あ、すみません、もう一度お願いします。ちょっと聞こえにくくて…」


  発信者: 「あ、すみません。えー、第二週の火曜日です。」


  受信者: 「第二週の火曜ですね。はい、承知しました。」


  発信者: 「はい。それで、そのー、事前に日常の**点検**リストで確認をお願いしたいんです。もし、なんか…[咳]…気になる箇所があれば、えー、今週中…いや、来週の月曜までには教えていただけますか。」


  受信者: 「あ、来週月曜までですね。はい、わかりました。リストを確認して、何かあれば、はい、すぐに報告します。」


  発信者: 「助かります。では、よろしくお願いします。」


  受信者: 「はい、承知しました。では、失礼します。」


  発信者: 「はい、失礼します。」'
