id: call_ja_048
name: 'JA call #48'
language: ja-JP
text: 'もしもし、管理部の[REDACTED_NAME]です。お疲れ様です。


  [雑音] あ、お疲れ様です。[REDACTED_NAME]です。あ、ちょっと聞こえにくい…もう一度お願いします。


  あ、すみません。管理部の[REDACTED_NAME]です。あのー、今、少しよろしいですか？


  はい、はい。大丈夫ですよ。


  ありがとうございます。えーと、例の**フォークリフト**の件なんですけど、定期**点検**の日程が決まりまして。えー、来月の、えーっと、3日…あ、ごめん、5日の金曜日で業者さんが来れるそうなんですが、そのー、ご都合いかがですか？


  5日ですか。うーん…[一時停止] ああ、5日なら大丈夫です。それで、あの…なんだっけ…えーと、特にこちらで準備するものは…


  あ、ありがとうございます！助かります。準備としては、あ、いや、そうじゃなくて、事前に簡単なチェックだけお願いしたくて。まあ、リストは後でピーディーエフでお送りしますね。


  はい、承知しました。じゃあ、確認しておきます。


  はい、では、よろしくお願いします。失礼します。


  はい、失礼しまーす。'
