id: call_kr_037
name: 'KR call #37'
language: ko-KR
text: '여보세요, [REDACTED_NAME]입니다. 수고 많으십니다.


  아, 네 [REDACTED_NAME] 팀장님. 수고하십니다. 어... 혹시 무슨 일이신가요?


  네, 저기, 좀 긴급한 일인데요. 그... 에스케이유... 아니, **SKU-Y200** 제품 있잖아요. 오늘 출하된 물량에 **불량품**이 섞여
  나갔다는 보고가... [일시정지] 아, 지금 막 들어와서요.


  네? 아... 잠깐만요, 잘 안 들리는데... 다시 한번만요? **불량품**이라고요?


  네, 네. 그러니까, 한... 30개? 아니, 한 50개 정도 되는 것 같은데, 뭐 정확한 수량은 파악 중입니다. 음... 일단 출하를 바로 중지시켜
  주셔야 할 것 같아요.


  아, 알겠습니다. 심각하네요. 그럼 제가 즉시 출하 중단시키고, 어... 고객사에도 바로 연락을... [잡음]


  네, 네. 부탁드립니다. 제가 대체품 수배하고 있으니 그 내용도 전달해 주십시오.


  네, 알겠습니다. 그럼 처리하고 다시 연락드리겠습니다.


  네, 그럼. 실례하겠습니다.'
