name: 'JA call #38'
language: ja-JP
text: '（通話開始）


  **受信者:** はい、[REDACTED_NAME]です。

  **発信者:** もしもし、お疲れ様です。[REDACTED_NAME]です。あ、あのー、今ちょっと大丈夫ですか？

  **受信者:** あ、[REDACTED_NAME]さん。お疲れ様です。はい、はい、大丈夫ですよ。

  **発信者:** ありがとうございます。えーと、先日お話ししてた新商品の件なんですけど、あの、**NP-2027**の**在庫登録**をですね、ちょっとお願いしたくて。
  [雑音]

  **受信者:** あ、はい。**NP-2027**ですね。うーん、承知しました。

  **発信者:** それで、あの…InvenTreeに、あ、違う、えーと、既存のカテゴリーで大丈夫なので、初回ロットを登録してほしくて。数量が、えー、たしか30…いや、ごめん、20個でした。

  **受信者:** はい、承知しました。えー、NP-2027を20個ですね。いつまでに必要でしょうか？

  **発信者:** 来週の月曜の朝までにはお願いしたいんですけど…[一時停止]…、まぁ、大丈夫そうですかね？

  **受信者:** 月曜朝までですね。はい、はい、対応します。

  **発信者:** 助かります。ありがとうございます。では、よろしくお願いします。

  **受信者:** はい、承知しました。失礼します。

  **発信者:** 失礼します。


  （通話終了）'
