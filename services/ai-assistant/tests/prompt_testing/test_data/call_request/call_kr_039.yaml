id: call_kr_039
name: 'KR call #39'
language: ko-KR
text: '수신자: 여보세요, [REDACTED_NAME]입니다.

  발신자: 아, [REDACTED_NAME] 팀장님. 어, 저 [REDACTED_NAME]인데요. 수고 많으십니다. 지금 잠깐 괜찮으실까요?

  수신자: 네, 네. 괜찮습니다. [잡음] 어, 무슨 일이시죠?

  발신자: 아, 그게, 좀 긴급한 건인데... 그... 에스케유... 아니, **SKU-W400** 제품에서요, 어, **불량품**이 발견됐다는...
  아, 아니, 섞여서 출하된 것 같다는 보고가 있어서요.

  수신자: 네? 아, 저기... 지금 잘 안 들리는데, 다시 한번만요. 불량품이라고요?

  발신자: 네, 맞습니다. 그러니까, 일단 해당 제품 출하를 바로 중지해 주셔야 할 것 같습니다. [일시정지] 그리고... 음... 이미 나간 물량이
  있는지... 그것도 확인 부탁드립니다.

  수신자: 아, 네, 알겠습니다. 심각하네요. 바로 출하 중지하고, 음, 재고랑 출하 내역 확인해서 다시 연락드리겠습니다.

  발신자: 네, 감사합니다. 그럼 잘 부탁드립니다. 실례하겠습니다.

  수신자: 네, 들어가세요.'
