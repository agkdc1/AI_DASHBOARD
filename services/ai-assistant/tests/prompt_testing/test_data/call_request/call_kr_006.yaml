id: call_kr_006
name: 'KR call #6'
language: ko-KR
text: '**[발신자: [REDACTED_NAME]]**

  여보세요? [REDACTED_NAME]입니다. 아, 수고 많으십니다.


  **[수신자: [REDACTED_NAME]]**

  네, 네. 수고하십니다. [REDACTED_NAME]입니다.


  **[발신자: [REDACTED_NAME]]**

  어... 다름이 아니라, 저기... 부품 **재고** 관련해서 음... 문의 좀 드리려고요. 그... **P-A1234**... 아, 아니, 피-에이-일이삼사
  맞죠? 그거 **재고**가 혹시 얼마나 남아 있는지... [기침]


  **[수신자: [REDACTED_NAME]]**

  아, 네... 잠시만요. [잡음] 아, 전화가 좀 끊기네요. 다시 한번만요? 피-에이... 뭐라고 하셨죠?


  **[발신자: [REDACTED_NAME]]**

  아, 네. 피-에이-일이삼사요. **P-A1234** **재고**입니다.


  **[수신자: [REDACTED_NAME]]**

  아, 네네. 확인해 볼게요. [일시정지] 음... 지금 보니까, 어... 한... 10개? 아니, 12개 남았네요. 그러니까... 거의 없다고
  봐야겠네요.


  **[발신자: [REDACTED_NAME]]**

  아, 12개요... 알겠습니다. 저희가 다음 주 생산에 바로 써야 해서... 아, 잠깐, 그러면 추가 발주를... 아니, 발주를 바로 좀 진행해
  주실 수 있을까요?


  **[수신자: [REDACTED_NAME]]**

  네, 알겠습니다. 그럼 지금 바로 발주 넣도록 처리하겠습니다.


  **[발신자: [REDACTED_NAME]]**

  네, 정말 감사합니다. 그럼 잘 부탁드립니다.


  **[수신자: [REDACTED_NAME]]**

  네. 그럼 들어가세요.'
