id: call_ja_002
name: 'JA call #2'
language: ja-JP
text: '[電話の音]

  はい、もしもし、[REDACTED_NAME]です。


  あ、お疲れ様です。[REDACTED_NAME]です。えーと、今、お時間ちょっとよろしいでしょうか？


  あ、[REDACTED_NAME]さん、お疲れ様です。はい、はい、大丈夫ですよ。


  ありがとうございます。あのー、急ぎで確認したい件がありまして。えっと、注文番号…エスオーの、SO-2024-5678なんですけど、これ、今日の出荷って、あの、まだ間に合いますかね？


  あ、ごめんなさい、ちょっと今、周りが… [雑音] もう一度お願いできますか？エスオーの…


  あ、はい。エスオーの、2024-5678です。


  はい、はい。2024-5678ですね。うーん、確認しますね。[一時停止] …あ、はい、大丈夫です。今日の最終便になんとか間に合いますね。


  あ、ほんとですか、よかったです！じゃあ、そのー、その便で出荷をお願いします。それで、あの…送り先は、[REDACTED_ADDRESS]で変更なし、でよかったでしたっけ？


  はい、承知いたしました。[REDACTED_ADDRESS]ですね。あ、いや、違う、えーと…[咳] あ、はい、そちらで合ってます。そのように手配します。


  助かります。では、よろしくお願いします。


  はい、承知しました。では、失礼いたします。


  はい、失礼しますー。'
