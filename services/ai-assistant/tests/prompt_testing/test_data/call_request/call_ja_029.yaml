id: call_ja_029
name: 'JA call #29'
language: ja-JP
text: '（プルルル…ガチャ）


  受信者: 「もしもし、はい、[REDACTED_NAME]です。」


  発信者: 「あ、お疲れ様です。[雑音] えーと、システム部の[REDACTED_NAME]ですけど、今、ちょっとよろしいですか？」


  受信者: 「あ、お疲れ様です。[REDACTED_NAME]さん。はい、はい、大丈夫ですよ。」


  発信者: 「ありがとうございます。あのー、先日お話ししてた、**サーバー**の件なんですけど…えー、**メンテナンス**の日程をですね、来週の土曜の深夜で進めたいと思ってまして。」


  受信者: 「あ、はい。土曜日ですね。あ、ちょっと聞こえにくい...もう一度お願いできますか？」


  発信者: 「あ、すみません。えーと、来週の土曜の深夜です。時間があの、午前1時から…あ、違う、えーと、午前1時から大体4時間くらいなんで、5時、朝の5時くらいまでを予定してまして。その間、あの、システムが…
  [一時停止] 停止しますので、事前に皆さんへのご周知をお願いできますでしょうか。」


  受信者: 「はい、はい、承知いたしました。午前1時から5時ですね。えー、そのー、周知ですね。分かりました。じゃあ、部署内に共有しておきます。」


  発信者: 「助かります。あ、ごめん、それで、えっと、また詳細はピーディーエフ、いや、メールでお送りしますね。では、失礼します。」


  受信者: 「はい、承知しました。よろしくお願いします。失礼します。」'
