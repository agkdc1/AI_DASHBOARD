id: call_ja_047
name: 'JA call #47'
language: ja-JP
text: '[受信者]: はい、[REDACTED_NAME]です。

  [発信者]: あ、もしもし、[REDACTED_NAME]です。お疲れ様ですー。

  [受信者]: お疲れ様です。

  [発信者]: えーと、今、ちょっと大丈夫ですかね？あのー、来月の**フォークリフト**の、えー、定期**点検**の件なんですけど…。

  [受信者]: ああ、はい、はい。大丈夫ですよ。

  [発信者]: 業者さんの日程が、えーと、来月の…あ、違う、再来週だ。再来週の水曜に決まりまして。 [雑音] で、そのー、事前に現場の方で、なんか、**点検**リストに沿って…あ、すみません、確認をお願いしたくて。

  [受信者]: あ、もしもし？すみません、ちょっと聞こえにく…もう一度お願いします。

  [発信者]: あ、失礼しました。リストに沿って事前に確認をお願いしたいんです。

  [受信者]: はい、承知しました。再来週の水曜ですね。リストを確認して、何かあれば…うーん、前日までにご連絡すれば良いですか？

  [発信者]: はい、お願いします。特に3号機か…いや、4号機だったかな、ちょっと調子悪いって話があったんで、そこ重点的にお願いします。

  [受信者]: 了解です。では、そのように対応します。

  [発信者]: 助かります。では、よろしくお願いします。失礼します。

  [受信者]: はい、失礼しまーす。'
