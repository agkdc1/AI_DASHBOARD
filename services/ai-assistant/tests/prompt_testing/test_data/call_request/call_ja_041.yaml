id: call_ja_041
name: 'JA call #41'
language: ja-JP
text: '（電話の呼び出し音）


  受信者: はい、[REDACTED_NAME]です。

  発信者: もしもし、お疲れ様です。[REDACTED_NAME]です。あのー、今、ちょっと大丈夫ですか？

  受信者: [雑音] あ、はい、お疲れ様です。大丈夫ですよ。

  発信者: あ、よかった。えーと、例の新商品の件なんですけど、NP-2027の、そのー、在庫登録をお願いしたくて。

  受信者: あー、はいはい。えっと、NP...にごー...？あ、ごめん、もう一回お願いします。

  発信者: あ、失礼。えー、NP-ニーゼロニーナナです。初回ロットの、えーっと、30...いや、20個だったかな。まぁ、それを登録してもらいたくて。

  受信者: [一時停止] はい、承知いたしました。NP-2027を20個で在庫登録ですね。

  発信者: そうです、はい。それで、あのー、カテゴリーがまだ無いはずだから、それも…新規でお願いできますか？

  受信者: はい、承知いたしました。対応しておきます。

  発信者: 助かります。では、よろしくお願いします。

  受信者: はい、失礼いたします。

  発信者: 失礼します。'
