id: call_ja_053
name: 'JA call #53'
language: ja-JP
text: 'はい、[REDACTED_NAME]です。


  あ、もしもし、お疲れ様です。[REDACTED_NAME]です。えーと、今、お時間よろしいでしょうか？ [雑音]


  お疲れ様です。はい、はい、大丈夫ですよ。


  あのー、急ぎで申し訳ないんですが、そのー、先ほど出荷した、えー、エスケーユー…あ、**SKU-X100**ですね、これに**不良品**が混ざってる可能性が、[一時停止]、あの、判明しまして…。


  えっ、本当ですか？ うーん、承知しました。すぐに倉庫に連絡して、えーと、出荷を止めさせます。


  ありがとうございます。ただ、午前便で一件だけ、えーと、[REDACTED_ADDRESS]の[REDACTED_NAME]様宛てが、もう出てしまっているみたいでして…。


  そうですか…。


  **はい**。ですので、あ、違う、えーと、そちらのお客様には私からお詫びと、まぁ、代替品手配の連絡を入れますので、まずは出荷停止の対応をお願いできますでしょうか。


  承知いたしました。すぐに対応します。


  助かります。**では**、また後ほど状況を共有します。**失礼します**。


  はい、承知しました。**失礼します**。[電話の音]'
