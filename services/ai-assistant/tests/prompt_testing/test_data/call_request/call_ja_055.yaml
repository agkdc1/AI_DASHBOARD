id: call_ja_055
name: 'JA call #55'
language: ja-JP
text: 'はい、[REDACTED_NAME]です。


  もしもし、お疲れ様です、[REDACTED_NAME]です。あのー、今、ちょっとよろしいでしょうか？


  はい、はい、大丈夫ですよ。


  ありがとうございます。えーと、来月の棚卸しの件なんですが、そのー、スケジュールの案を考えまして。A棟を月曜、B棟は…あ、違う、えーと、A棟を15日、B棟を16日で進めたいのですが、ご都合いかがでしょう？


  あ、すみません、ちょっと聞こえにくくて…[雑音] もう一度お願いします。


  あ、失礼しました。えー、棚卸しのスケジュールですが、15日と16日ではいかがでしょうか？


  はい、はい、承知しました。15と16ですね。その日程で問題ありません。


  よかったです。では、そのスケジュールで進めますね。つきましては、担当者を、えーっと、2…いや、3名ほどアサインをお願いしたいのですが、来週金曜までに…[一時停止]
  ああ、そうそう、リストアップをお願いできますでしょうか。


  承知しました。まぁ、来週金曜ですね。対応します。


  はい。では、よろしくお願いします。失礼します。


  はい、失礼します。'
