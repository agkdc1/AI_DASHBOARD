id: call_kr_015
name: 'KR call #15'
language: ko-KR
text: '여보세요?

  네, [REDACTED_NAME]입니다.

  아, [REDACTED_NAME] 대리님, 저 [REDACTED_NAME]입니다. 수고 많으십니다. 어, 지금 잠깐 통화 괜찮으세요?

  네, 네. 괜찮습니다. 어, 무슨 일이시죠?

  어, 저기, 다름이 아니라 라쿠텐 주문 관련해서요. 음... 그러니까 최근 고객 클레임이 들어온 주문 건인데... [잡음] 아, 잠깐, 그게 아니라,
  최근 주문 건들 배송 상태가 좀 이상해서요.

  아, 잠시만요. 잘 안 들리는데… 라쿠텐 주문이요?

  네. 최근 일주일 치만 봐도 한 세... 아니, 다섯 건 정도가 배송 상태가 업데이트가 안 되고 있어서요. 이게 뭐, 시스템 오류인지...

  아, 그렇군요. 음... 알겠습니다. 그럼 제가 일단 물류팀 쪽에 확인 요청하고, 원인 파악해서 내일 오전까지 회신 드릴게요.

  네, 알겠습니다. 그렇게 부탁드립니다.

  네, 그럼 수고하세요.

  네, 그럼 실례하겠습니다.'
expected:
  valid_json_keys:
  - title
  - description
  - due_date
  - priority
  - decisions
  title_contains:
  - 라쿠텐
  - 주문
