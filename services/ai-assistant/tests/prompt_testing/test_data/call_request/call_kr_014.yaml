id: call_kr_014
name: 'KR call #14'
language: ko-KR
text: '여보세요, [REDACTED_NAME]입니다.

  아, 네 [REDACTED_NAME] 대리님. 수고 많으십니다.

  네, 과장님. 어... 지금 통화 괜찮으세요? 저기, 다름이 아니라 라쿠텐 주문 관련해서요.

  네, 네, 괜찮습니다. 말씀하세요. 아, 잠시만요. [잡음]... 네, 무슨 일이죠?

  음... 어제 들어온 라쿠텐 주문 중에... 아니, 그게 아니라 오늘 아침에 확인한 주문 데이터가 좀 이상해서요. 수량이 어... 한 3개? 아니,
  5개 정도가 누락된 것 같아요.

  아, 누락이요? 그러니까... 시스템 연동 문제일 수도 있겠네요. [일시정지]

  네, 그런 것 같습니다. 그래서 제가 일단 수동으로 수정은 했는데, 원인 파악을...

  아, 네. 알겠습니다. 그럼 일단 [REDACTED_NAME] 대리님이 로그 먼저 확인해 주시겠어요? 그게 빠를 것 같네요.

  네, 그렇게 해도 괜찮을까요? 알겠습니다. 그럼 확인하고 바로 보고드리겠습니다.

  네, 수고하세요.

  네, 들어가세요.'
expected:
  valid_json_keys:
  - title
  - description
  - due_date
  - priority
  - decisions
  title_contains:
  - 라쿠텐
  - 주문
  priority_range:
  - 2
  - 4
  has_decisions: true
