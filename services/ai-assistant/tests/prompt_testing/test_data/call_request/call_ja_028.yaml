id: call_ja_028
name: 'JA call #28'
language: ja-JP
text: 'はい、[REDACTED_NAME]です。


  あ、もしもし、お疲れ様です。[REDACTED_NAME]です。えーと、今、ちょっとお時間よろしいでしょうか。


  お疲れ様です。はい、はい、大丈夫ですよ。


  ありがとうございます。えー、先日お話ししていた、あのー、**サーバー**の**メンテナンス**の件なんですけど…。[一時停止]


  あ、はい。どうなりました？


  えーとですね、来週の土曜に実施する方向で、そのー、進めたいと思ってるんですが。時間は深夜の、えっと、2時から…いや、ごめん、朝5時までですね。あ、違う、やっぱり6時までです。その間システムが止まるので、つきましては、あの…ユーザー様への通知をお願いできますでしょうか。


  あ、ちょっと聞こえにくい…[ノイズ] もう一度お願いします。


  あ、すみません。ユーザー様への通知をお願いしたい、という件です。


  はい、かしこまりました。承知しました。えー、では、その内容で通知の準備を、まぁ、進めておきます。


  助かります。では、また詳細はメールでお送りしますね。よろしくお願いします。


  はい、お待ちしております。失礼します。


  失礼します。'
