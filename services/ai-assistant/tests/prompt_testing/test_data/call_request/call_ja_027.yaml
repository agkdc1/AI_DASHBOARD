id: call_ja_027
name: 'JA call #27'
language: ja-JP
text: 'もしもし、営業部の[REDACTED_NAME]です。


  あ、お疲れ様です。えーと、システム部の[REDACTED_NAME]です。今、ちょっとお時間よろしいでしょうか？


  お疲れ様です。はい、はい、大丈夫ですよ。


  ありがとうございます。えーっと、来週のサーバーの件なんですが、あのー、**メンテナンス**を実施する件でして。あ、すみません、来週じゃなくて再来週ですね。金曜の深夜、えー、土曜日の午前2時から…いや、午前1時から4時間ほどを予定しています。その間、あの、システムがですね…[一時停止]


  あ、もしもし？すみません、ちょっと聞こえにくくて…もう一度お願いします。再来週の土曜の午前1時で合ってますか？


  はい、そうです。その**サーバー**メンテナンスの間、システムが停止するので、事前に部署内でご周知いただきたく…。つきましては、その…


  承知いたしました。えーと、通知用のテンプレートって、なんか、ありますか？


  はい、ございます。後ほどメールでお送りしますので。


  助かります。では、メールを確認後、対応いたします。


  はい、よろしくお願いいたします。では、失礼します。


  はい、失礼します。[電話の音]'
