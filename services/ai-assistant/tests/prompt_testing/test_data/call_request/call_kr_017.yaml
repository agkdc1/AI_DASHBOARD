id: call_kr_017
name: 'KR call #17'
language: ko-KR
text: 'A: 여보세요?

  B: 네, [REDACTED_NAME]입니다.

  A: 아, [REDACTED_NAME] 대리님. 어, 수고 많으십니다. 저 [REDACTED_NAME]인데요, 그 오전에 입고된 반품 건 때문에
  연락드렸습니다.

  B: 네, 수고하십니다. 아, 그거요. 혹시 RMA-002 말씀하시는 거죠?

  A: 네, 맞습니다. 음... 방금 확인했는데 제품 외장에... 아니, 그게 아니라 약간 긁힘이 좀 있네요. 기능은 괜찮은데, 뭐, 이대로는 재판매가
  좀... [일시정지]

  B: [잡음] 아, 잠시만요. 잘 안 들리는데... 다시 한번만요? 아, 긁힘이 있다고요?

  A: 아, 네, 네. 긁힘이 있어서요. 저기, 그래서 환불 쪽으로 진행해야 할 것 같은데 어떻게 할까요?

  B: 음... 그렇군요. 알겠습니다. 그럼 고객에게는 그냥 반품 처리하고 환불 진행해 주세요. 어... 해당 RMA-002, 아, 그러니까 알엠에이-영영이
  제품은 폐기하는 걸로 하죠.

  A: 네, 알겠습니다. 그럼 환불 및 폐기 처리하고 다시 보고드리겠습니다.

  B: 네, 수고하세요.

  A: 네, 들어가세요.'
