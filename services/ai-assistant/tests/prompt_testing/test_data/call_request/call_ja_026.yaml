id: call_ja_026
name: 'JA call #26'
language: ja-JP
text: '発信者: もしもし、えーと、[REDACTED_NAME]です。お疲れ様です。


  受信者: あ、[REDACTED_NAME]さん、お疲れ様です。はい、はい。


  発信者: あのー、お忙しいところすみません。先日お話ししていた、サーバーのメンテナンスの件でして。


  受信者: あ、はい。どうなりました？ [雑音] あ、すみません、ちょっと聞こえにくくて…もう一度お願いします。


  発信者: あ、失礼しました。サーバーの件です。そのー、日程なんですけど、来週の金曜、あ、違う、土曜の夜で考えています。


  受信者: 土曜の夜間ですね。うーん、[一時停止] 大丈夫です。はい、その日程で問題ありません。


  発信者: ありがとうございます。えー、システム停止は3時間…いや、最大で4時間くらいかと。それで、あの…関係部署への通知をお願いしたいんですが…。


  受信者: 承知いたしました。すぐに展開します。


  発信者: 助かります。では、詳細はまた追って連絡します。失礼します。


  受信者: はい、お待ちしてます。お疲れ様です。失礼します。'
expected:
  valid_json_keys:
  - title
  - description
  - due_date
  - priority
  - decisions
  title_contains:
  - メンテナンス
  - サーバー
  priority_range:
  - 2
  - 4
  has_decisions: true
