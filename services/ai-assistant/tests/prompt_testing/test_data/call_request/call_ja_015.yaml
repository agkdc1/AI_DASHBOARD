id: call_ja_015
name: 'JA call #15'
language: ja-JP
text: 'もしもし、[REDACTED_NAME]です。


  お疲れ様です、[REDACTED_NAME]です。あのー、今、ちょっとよろしいですか？[雑音]


  あ、[REDACTED_NAME]さん、お疲れ様です。はい、はい、大丈夫ですよ。


  ありがとうございます。えーと、先日あった楽天経由の注文の件なんですけど、あのー、お客様からちょっと問い合わせが入ってまして。えー、電話番号が[REDACTED_PHONE]の…あ、いや、ご注文番号の下4桁が3345の方です。


  あ、はい。えーっと、なんか問題ありましたっけ？


  はい、そのー、注文された商品数が、えー、3つ…いや、5つだったかな。とにかく、届いた数と違うっていうご連絡でして。それで、あの…


  ああ、なるほど。承知しました。


  それで、まぁ今後のためにも、一度、楽天からの注文確認フローを見直したいと考えてまして。来週あたり、お時間いただけないでしょうか？


  はい、わかりました。来週ですね、調整します。


  助かります。では、また日程の連絡をします。失礼します。


  はい、お待ちしております。失礼いたします。'
