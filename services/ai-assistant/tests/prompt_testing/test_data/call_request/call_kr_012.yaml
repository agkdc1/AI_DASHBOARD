id: call_kr_012
name: 'KR call #12'
language: ko-KR
text: '여보세요, [REDACTED_NAME]B 팀장님? 저 [REDACTED_NAME]A입니다. 아, 수고 많으십니다.


  아, 네, [REDACTED_NAME]A씨. 수고하십니다. 어, 무슨 일이시죠? 아, 잠시만요. [잡음] 네, 말씀하세요.


  음, 저기, 최근에 그... **라쿠텐** 쪽 **주문** 처리에서 문제가... 아니, 그게 아니라 클레임이 좀 늘어나는 것 같아서요.


  아, 네네, 그 건 말이죠. 뭐랄까, 배송 지연 문의가, 어... 3건... 아니 5건 정도 있었던가요?


  네, 맞습니다. 그래서, 아, 한번 프로세스를 다시 보는 게 좋을 것 같아서요. [일시정지] 혹시 다음 주에 잠깐 미팅 가능하실까요?


  아, 네, 좋습니다. 그럼, 음... 화요일 오후 2시쯤 어떠세요? 그때면 제가 PO... 아니, 그 주문서 데이터도 정리해 둘 수 있을 것 같은데.


  네, 좋습니다! 그럼 화요일 2시에 뵙겠습니다. 감사합니다.


  네, 알겠습니다. 그럼 들어가세요.'
expected:
  valid_json_keys:
  - title
  - description
  - due_date
