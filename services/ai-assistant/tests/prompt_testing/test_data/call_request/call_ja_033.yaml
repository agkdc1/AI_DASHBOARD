id: call_ja_033
name: 'JA call #33'
language: ja-JP
text: 'もしもし、[REDACTED_NAME]さんの携帯でよろしいでしょうか。お疲れ様です、物流の[REDACTED_NAME]です。


  あ、はい、はい。[REDACTED_NAME]さん、お疲れ様です。どうしましたか？


  あ、お疲れ様です。えーと、今ですね、今日の出荷分の**送り状**を作ってたんですけど、そのー、[REDACTED_NAME]さん担当の分で1件、システム上で**エラー**が出てまして。


  え、本当ですか？すみません。[雑音] えーっと、どれだろう…


  えー、エスケーユーがですね、えっと、AB-10…あ、違う、AB-1105のやつです。なんか、そのー、[REDACTED_ADDRESS]のデータが…いや、住所じゃなくて郵便番号かな。それが原因っぽいんですけど…。


  あー、なるほど。承知いたしました。えー、すみません、すぐ確認します。[一時停止] えーと、じゃあ、システムの方で修正して、再度連携すれば大丈夫ですかね？


  あ、はい、それで大丈夫です。ありがとうございます、助かります。では、よろしくお願いします。失礼します。


  はい、失礼します。'
