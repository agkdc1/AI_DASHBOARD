id: call_ja_049
name: 'JA call #49'
language: ja-JP
text: '（電話の呼び出し音）


  **受信者:** もしもし、品質管理部の[REDACTED_NAME]です。


  **発信者:** あ、お疲れ様です、営業の[REDACTED_NAME]です。あのー、今ちょっとよろしいですか？


  **受信者:** [REDACTED_NAME]さん、お疲れ様です。はい、はい、大丈夫ですよ。


  **発信者:** すみません、[雑音] えーとですね、先日の納品分、あの、**SKU-X100**、あ、エスケーユーのエックス100なんですけど、**不良品**が混じってたって連絡がありまして…。


  **受信者:** えっ、本当ですか？うーん、申し訳ありません。えー、不良の数は...いや、内容はどんな感じですか？


  **発信者:** えっと、なんか、外装に傷があるものが、えーっと、3...いや5個だったかな、見つかったそうで。それで、あの…、至急、代替品を送ってほしいと。


  **受信者:** [一時停止] 承知しました。そのー、代替品はすぐ手配します。あ、違う、えーと、まず現ロットの在庫を全部確認しますね。


  **発信者:** はい、はい、お願いします。それで代替品の発送をお願いできますか？


  **受信者:** はい、もちろんです。こちらで進めます。


  **発信者:** 助かります。では、また連絡お待ちしてます。


  **受信者:** かしこまりました。では、取り急ぎ失礼します。


  **発信者:** 失礼します。'
