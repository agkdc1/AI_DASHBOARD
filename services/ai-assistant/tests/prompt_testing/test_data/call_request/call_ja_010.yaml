id: call_ja_010
name: 'JA call #10'
language: ja-JP
text: '**受信者:** 「はい、購買部の[REDACTED_NAME]です。」

  **発信者:** 「あ、お疲れ様です、製造部の[REDACTED_NAME]です。えーと、今、ちょっとよろしいでしょうか？」

  **受信者:** 「はい、はい、お疲れ様です。大丈夫ですよ。」

  **発信者:** 「ありがとうございます。あのー、部品の件で、そのー、P-D3456の在庫なんですけど、システムで見たら結構減ってまして…。来週の生産で使う分で、あの…」

  **受信者:** 「あ、ピーのディーサンヨンゴロク、ですね。えーっと、確認しますね。[一時停止] [雑音] あー、はい、確かに在庫が残りわずかですね。」

  **発信者:** 「ですよね。なので、えー、急ぎで50...いや、60個ほど追加発注お願いしたいんですが、いけますでしょうか？」

  **受信者:** 「60ですね。承知しました。急ぎで手配かけます。」

  **発信者:** 「助かります。ありがとうございます。[咳]」

  **受信者:** 「いえいえ。では、後ほど正式な発注依頼を…あ、違う、えーと、システムから発注申請をお願いします。」

  **発信者:** 「はい、承知いたしました。すぐに作成します。では、失礼します。」

  **受信者:** 「はい、失礼いたします。」'
