id: call_ja_013
name: 'JA call #13'
language: ja-JP
text: '（電話の呼び出し音）


  はい、[REDACTED_NAME]です。


  もしもし、お疲れ様です。[REDACTED_NAME]です。えーと、今ちょっとよろしいでしょうか？


  お疲れ様です。はい、はい、大丈夫ですよ。


  ありがとうございます。あのー、楽天経由の注文で、1件確認したいことがありまして。えー、今日の午前に入ったやつなんですけども。


  はい、はい。


  それで、在庫を今見たら、えーっと、3…いや、2個しかなくて。ただ、ご注文は5個で入ってるんですよ。 [一時停止] それで、そのー、お客様に連絡して分納にするか、あ、違う、えーと、一部をキャンセルいただくか確認が必要でして…。なんか、私ちょっと今立て込んでて…


  [雑音] あー、なるほど。承知しました。うーん、じゃあ僕の方でお客様に電話しておきますよ。


  あ、本当ですか！助かります。では、その件、お願いしてもよろしいでしょうか。


  はい、大丈夫です。対応しておきます。


  ありがとうございます。では、お忙しいところすみませんでした。失礼します。


  はい、お疲れ様です。失礼します。'
