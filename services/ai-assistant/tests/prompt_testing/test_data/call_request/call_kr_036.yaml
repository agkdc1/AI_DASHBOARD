id: call_kr_036
name: 'KR call #36'
language: ko-KR
text: '여보세요, 물류팀 [REDACTED_NAME]입니다.

  아, [REDACTED_NAME] 팀장님. 저 [REDACTED_NAME]입니다. 수고 많으십니다.

  네, 네, 수고하십니다. 어, 무슨 일이시죠?

  아, 저기, 좀 긴급한 건인데요. 그… **SKU-X100**, 그러니까 에스케이유-엑스 백이요. 어… 일부 제품에서 **불량품**이 발견됐는데…
  이게 오늘 오전에 출하가… [일시정지] 아, 죄송합니다, 이미 나간 것 같아요.

  네? 아… 잠깐만요, 지금… 잘 안 들려서… [잡음] 다시 한번만요.

  아, 그러니까 **SKU-X100** 제품이요! **불량품**인데 오늘 출하된 것 같아서요. 아니, 그게 아니라… 일단 모든 출하를 중지하고,
  배송된 고객사에도 연락을 좀…

  **네, 알겠습니다.** 바로 출하 중지하고, 음… 배송 목록 확인해서 연락 돌리겠습니다.

  네, 감사합니다. 그럼 바로 좀 부탁드립니다.

  네. 알겠습니다. 그럼 실례하겠습니다.

  네.'
