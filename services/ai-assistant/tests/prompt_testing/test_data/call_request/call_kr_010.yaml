id: call_kr_010
name: 'KR call #10'
language: ko-KR
text: '(따르르릉... 따르르릉...)


  **수신자:** 여보세요, [REDACTED_NAME]입니다.


  **발신자:** 아, [REDACTED_NAME] 과장님, 저 [REDACTED_NAME]입니다. 수고 많으십니다.


  **수신자:** 네, [REDACTED_NAME] 대리님. 어... 근데 지금 좀... [잡음] 여보세요?


  **발신자:** 아, 여보세요? 그, 다름이 아니라 부품 **P-E7890** **재고** 관련해서 연락드렸습니다. 음... 지금 **재고**가
  거의 없는 것 같아서요.


  **수신자:** 아, **P-E7890** 말씀이시죠? 잠시만요, 확인 좀... [일시정지] 어... 이게 시스템 상으로는... 아, 아니, 20개가
  아니라 15개 남았네요. 거의 다 썼네요.


  **발신자:** 네? 15개요? 아... 생각보다 더 없군요. 저기, 그럼 다음 주까지 추가 발주를 좀...


  **수신자:** 네, 네, 알겠습니다. 바로 발주 처리해야겠네요. 몇 개 정도 필요하세요?


  **발신자:** 음... 일단 50개... 아니, 넉넉하게 100개 정도로 부탁드립니다.


  **수신자:** 알겠습니다. 100개로 바로 발주 넣겠습니다.


  **발신자:** 네, 감사합니다. 그럼 잘 부탁드립니다.


  **수신자:** 네, 수고하세요.


  **발신자:** 네, 들어가세요.'
