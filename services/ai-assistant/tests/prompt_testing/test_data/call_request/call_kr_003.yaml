id: call_kr_003
name: 'KR call #3'
language: ko-KR
text: 'A: 여보세요?

  B: 아, 네, [REDACTED_NAME] 과장님. 수고하십니다. 저 [REDACTED_NAME]인데요. [기침]

  A: 아, 네, 안녕하세요. 어, 무슨 일이시죠?

  B: 네, 저기... 그 주문 건 때문에 전화드렸는데요. 음... 주문 번호가 에스오-2025-0001... 아, 아니, 잠시만요. 네, 에스오-2025-0001
  맞습니다. 이 건 오늘 중으로 출하 가능할까요?

  A: 아, 에스오...-0001이요? 아, 잠깐만요... 지금 확인해볼게요. [잡음] 음... 아, 네 확인했습니다. 오늘 오후 출하... 아니,
  정확히는 3시 출하 물량에 포함되어 있습니다.

  B: 아, 정말요? 다행이네요. 그럼 뭐 문제없이 진행되는 거죠?

  A: 네, 네, 맞습니다. 그럼 출하 완료되면 다시 연락드리겠습니다.

  B: 네, 알겠습니다. 감사합니다. 수고하세요. 실례하겠습니다.

  A: 네, 들어가세요.'
