id: call_ja_058
name: 'JA call #58'
language: ja-JP
text: '（受信者）

  もしもし、[REDACTED_NAME]です。


  （発信者）

  あ、お疲れ様です。[REDACTED_NAME]です。えーと、今ちょっとよろしいでしょうか？


  （受信者）

  お疲れ様です。はい、はい、大丈夫ですよ。


  （発信者）

  あのー、来月の**棚卸し**の件なんですけど、そのー、**スケジュール**をですね、えー、月曜にA棟、火曜にB棟で…あ、ごめん、逆ですね。月曜がB棟で、火曜がA棟でした。これで進めたいんですが、問題ないでしょうか？


  （受信者）

  あ、すみません、ちょっと今[ノイズ]…あ、もしもし？もう一度お願いします。


  （発信者）

  あ、失礼しました。えーっと、来月の**棚卸し**、月曜にB棟、火曜にA棟の**スケジュール**でどうかなと。


  （受信者）

  はい、承知しました。えー、その日程で大丈夫です。ありがとうございます。


  （発信者）

  よかったです。それで、あの…なんだっけ…ああそうそう、各棟の担当者なんですけど、えーっと、3…いや5人ずつくらいでお願いできますか？


  （受信者）

  承知しました。5名ずつですね。来週中にはアサインします。


  （発信者）

  ありがとうございます。では、よろしくお願いします。失礼します。


  （受信者）

  はい、失礼しますー。[電話の音]'
