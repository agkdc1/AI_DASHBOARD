id: call_ja_021
name: 'JA call #21'
language: ja-JP
text: '[電話の音]

  もしもし、お疲れ様です。[REDACTED_NAME_A]です。


  あ、お疲れ様です。[REDACTED_NAME_B]です。はい、はい。


  あのー、今お時間よろしいでしょうか？えーと、先週、あ、いや先日ですね、ご依頼のありました**返品**の件でして。管理番号が、えー、アールエムエーのゼロゼロサン、**RMA-003**の件なんですが、[雑音]
  あ、ちょっと聞こえにくいですかね…？


  あ、いえ、大丈夫です。もう一度お願いします。


  あ、失礼しました。そのー、現物を確認したところ、外装に結構、あ、違う、目立つ損傷がありまして。それで、そのー…


  あー、そうですか。うーん、承知しました。まぁ、そうなると再販はちょっと難しいですね。


  **はい**、そのように判断しております。つきましては、お客様への返金処理を進めてしまってよろしいでしょうか？


  **はい**、問題ありません。[咳] **では**、返金処理を進めてください。あと、念のため簡単な報告書も作成しておいてもらえますか。


  承知いたしました。**では**、そのように手配いたします。


  はい、よろしくお願いします。**失礼します**。


  **失礼します**。'
