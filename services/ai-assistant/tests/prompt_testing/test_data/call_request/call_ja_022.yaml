id: call_ja_022
name: 'JA call #22'
language: ja-JP
text: 'はい、品質管理の[REDACTED_NAME]です。


  あ、もしもし、[REDACTED_NAME]さん、お疲れ様です。えーと、営業の[REDACTED_NAME]ですけど、今、ちょっとよろしいですか？


  あ、[REDACTED_NAME]さん、お疲れ様です。はい、はい、大丈夫ですよ。


  ありがとうございます。[雑音] あのー、先日お願いしていた返品の件なんですけど、そのー、管理番号がえーっと、アールエムエーの…あ、そうだ、`RMA-001`の現物って、なんかもう見てもらえましたかね？


  ああ、はい。先ほど確認しました。うーん、ご報告の通り、外装の破損が結構ひどくて。これ、まぁ、再販はちょっと厳しいかなと…いや、無理ですね、はい。


  [咳] あ、そうですか…ご確認ありがとうございます。じゃあ、えっと、お客様へは返金処理ということで進めちゃって、あ、大丈夫でしょうか？


  はい、お願いします。こちらの`返品`された商品は、あの、廃棄処分で進めておきますので。


  承知しました。では、そのように対応します。ありがとうございます。失礼します。


  はい、お疲れ様です。失礼します。'
