id: call_kr_027
name: 'KR call #27'
language: ko-KR
text: '여보세요, [REDACTED_NAME]입니다.

  아, 네. 수고 많으십니다.

  네, 수고하십니다. 저기, 다름이 아니라 오늘 출하 건 관련해서요. 음... **운송장**을 발행하는데, 어... 데이터 **오류**가 좀, 아니,
  오류가 한 두 건 정도 발생해서요.

  아, 네. 네. [잡음] 잠시만요... 아, 어떤 내용인가요?

  그... 주소 정보가 약간 불완전한 것 같은데, 아, 그러니까 [REDACTED_NAME] 님 앞으로 가는 건 말인데요. 이게 주소가... 어...
  [REDACTED_ADDRESS]로 되어 있는데, 이게 좀...

  아, 그거요? 아, 잠깐만요, 그거 제가 확인해봤는데, [REDACTED_ADDRESS] 뒤에 상세 주소가 빠진 것 같아요. 제가 지금 바로 수정하겠습니다.

  아, 네. 그럼 데이터 확인하고 바로 수정해서... 아, 아니, 수정 후 다시 연락 주실 필요는 없고요. 바로 출하 진행해 주시면 됩니다.

  네, 알겠습니다. 그럼 그렇게 처리하겠습니다.

  네, 그럼 부탁드립니다. [일시정지] 실례하겠습니다.

  네, 들어가세요.'
expected:
  valid_json_keys:
  - title
  - description
  - due_date
  - priority
  - decisions
  title_contains:
  - 운송장
  - 오류
  priority_range:
  - 2
  - 4
  has_decisions: true
