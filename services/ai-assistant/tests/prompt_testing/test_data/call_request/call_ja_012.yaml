id: call_ja_012
name: 'JA call #12'
language: ja-JP
text: 'はい、[REDACTED_NAME]です。


  あ、もしもし、お疲れ様です。[REDACTED_NAME]です。えーと、今お時間よろしいでしょうか？


  はい、はい、大丈夫ですよ。[雑音]


  ありがとうございます。あのー、部品の件でご相談なんですけど、**P-A1234**の**在庫**の件でして。


  ああ、P-A1234ですね。


  はい。さっき確認したら、えーっと、残り…あ、ごめん、50じゃなくて48個でした。そのー、来週の生産を考えると、**ちょっと**これだと厳しいかなと思いまして。


  あ、もうそんなに少ないんですね。[一時停止]


  それで、あの…追加で発注を…あ、違う、発注依頼をお願いしたいんですけど、**なんか**200個くらいでどうかなと。


  あ、すみません、**ちょっと**聞こえにくくて…もう一度お願いします。


  あ、失礼しました。200個です、200。


  ああ、200個ですね。**はい**、わかりました。**まぁ**、それくらいあれば大丈夫でしょう。すぐに手配しましょう。**では**、[REDACTED_NAME]さんの方で発注書を作成して、回してもらえますか？


  承知いたしました。すぐに作成します。よろしくお願いいたします。


  はい、お願いします。


  はい、**失礼します**。


  お疲れ様ですー。'
