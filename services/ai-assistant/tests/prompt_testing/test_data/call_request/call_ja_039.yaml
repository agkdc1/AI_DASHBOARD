id: call_ja_039
name: 'JA call #39'
language: ja-JP
text: '[電話の音]

  もしもし、[REDACTED_NAME]です。

  あ、お疲れ様です。[REDACTED_NAME]です。あ、ちょっと聞こえにくい... [雑音] もう一度お願いします。

  あ、お疲れ様です！すみません、聞こえますか？

  あ、聞こえました。お疲れ様です。はい、はい、大丈夫ですよ。

  ありがとうございます。そのー、お願いしたいことがありまして…あ、違う、えーと、新商品の**NP-2028**の**在庫登録**の件なんですけど。

  ああ、はいはい。エヌピーのにーぜろにーはち、ですね。

  はい。それで、あの…InvenTreeの方にですね、初回ロットを…えーっと、30個…あ、ごめん、50個ですね、50個を登録してもらえませんか？ [咳]

  承知しました。えーと、NP-2028を50個、**在庫登録**ですね。 [一時停止] 期限はありますか？

  あ、はい。急で申し訳ないんですが、来週月曜の朝までとかって…可能ですかね？

  月曜朝ですね。うーん、まぁ、大丈夫かと思います。承知しました。

  助かります。では、よろしくお願いします。

  はい、承知いたしました。では、失礼します。

  はい、失礼します。'
