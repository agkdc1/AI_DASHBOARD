id: call_ja_044
name: 'JA call #44'
language: ja-JP
text: 'はい、[REDACTED_NAME]です。


  あ、もしもし、お疲れ様です。[REDACTED_NAME]です。あのー、今ちょっとよろしいですか？


  お疲れ様です。はい、はい、大丈夫ですよ。


  えーと、来月のそのー、フォークリフトの定期点検の件なんですけど、[雑音] えー、業者さんの日程が来月の、あ、違う、第二週の、あ、ごめん、第一週の火曜で確定したので、まぁ、一応連絡しとこうと思いまして。


  あ、はい、承知しました。来月第一火曜ですね。はい。


  はい。それで、あの…なんだっけ…[一時停止]ああ、そうそう。事前に現場で確認してほしい項目がなんかいくつかあって。もし何か不具合とか気になるところがあれば、それに追記しておいてもらえますか？


  はい、わかりました。リストを確認して、事前に見ておきます。


  助かります。じゃあ、また後で。よろしくお願いします。


  はい、承知しました。では、失礼します。


  失礼します。'
