text: 'もしもし、[REDACTED_NAME]です。

  あ、お疲れ様です、[REDACTED_NAME]です。今、少しよろしいでしょうか？

  はい、お疲れ様です。大丈夫ですよ。

  ありがとうございます。えーと、急で申し訳ないんですが、先ほど出荷された商品、SKU-W400、あ、エスケーユーのW400ですね、あれに、なんか不良品が混入している可能性が発覚しまして…。

  えっ、本当ですか！？ [雑音] あ、ちょっと聞こえにくい…もう一度お願いします。

  あ、すみません。そのー、エスケーユーのW400に不良品が…。それで、あの…出荷をいったん、あ、違う、完全に止めていただきたくて。

  はい、はい、承知しました。うーん、すぐに関連部署の出荷をすべて停止します。合わせて、納品先のお客様への連絡と、代替品の在庫確認も、えっと、行います。

  助かります。では、また連絡お待ちしております。

  承知いたしました。失礼します。

  失礼します。'
