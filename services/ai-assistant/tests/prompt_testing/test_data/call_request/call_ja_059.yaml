id: call_ja_059
name: 'JA call #59'
language: ja-JP
text: '（プルルル…ガチャ）


  受信者: 「はい、[REDACTED_NAME]です。」


  発信者: 「あ、もしもし、お疲れ様です。[REDACTED_NAME]です。えーと、今、お時間ちょっとよろしいでしょうか？」


  受信者: 「はい、はい、お疲れ様です。大丈夫ですよ。」


  発信者: 「ありがとうございます。あのー、来月の**棚卸し**の件なんですけど、**スケジュール**を、そのー、ご相談したくて…。えーと、A棟を火曜、B棟を…あ、違う、えーと、B棟を水曜で進めたいんですが、どうでしょうか。」


  受信者: 「[雑音]…あ、すみません、ちょっと聞こえにくくて…もう一度お願いできますか？」


  発信者: 「あ、失礼しました。えー、A棟が火曜、B棟が水曜です。いかがでしょう。」


  受信者: 「あ、はい、承知しました。うーん、その日程で問題ないです。では、その方向で進めましょう。」


  発信者: 「ありがとうございます。それで、あの…必要な人員が、えーっと、3…いや5名でしたっけ？」


  受信者: 「はい、5名でお願いします。」


  発信者: 「承知しました。では、担当者の割り当てを来週金曜までに…あ、ごめん、来週木曜までにお願いできますでしょうか。」 [咳]


  受信者: 「はい、わかりました。まぁ、木曜までにリストアップしておきます。」


  発信者: 「ありがとうございます。では、よろしくお願いします。失礼します。」


  受信者: 「はい、お疲れ様です。」'
