id: call_ja_008
name: 'JA call #8'
language: ja-JP
text: 'もしもし、お疲れ様です。[REDACTED_NAME]です。あのー、今、ちょっとよろしいですか？


  あ、[REDACTED_NAME]さん、お疲れ様です。はい、はい、大丈夫ですよ。


  ありがとうございます。えーと、部品の**在庫**の件で確認したいんですが、型番が、えー、**P-B5678**、これの今の状況って、そのー、わかりますか？ [雑音]


  **P-B5678**ですね。少々お待ちくださいね…うーん、システム上だと…あ、ごめん、ちょっと待ってください、こっちのデータだと…えーと、実質**在庫**が、あれ、30…いや、20個しかないですね。


  あ、20個ですか…えーと、来週の生産で使うので、ちょっとそれだと…ああ、そうか、足りないですね。急ぎで、あの、100個ほど追加で発注をお願いしたいんですけど、いけますかね？


  **はい**、承知いたしました。ええ、すぐに手配します。


  あ、助かります。**では**、えー、発注書の作成、よろしくお願いします。


  かしこまりました。後ほど共有します。**では**。


  はい、よろしくお願いします。**失礼します**。


  **失礼します**。'
