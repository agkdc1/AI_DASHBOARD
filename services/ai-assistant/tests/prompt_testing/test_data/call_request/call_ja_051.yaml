id: call_ja_051
name: 'JA call #51'
language: ja-JP
text: '[電話の音]

  はい、もしもし、[REDACTED_NAME_A]です。お疲れ様です。

  あ、[REDACTED_NAME_A]さん、お疲れ様です、[REDACTED_NAME_B]です。もしもし？あ、ちょっと聞こえにくい...

  あ、もしもし、聞こえますか？えーと、緊急で。あのー、本日出荷分の、**エスケーユー**のゼットさんびゃく、あ、違う、**SKU-Z300**なんですけど、なんか製造ラインで**不良品**が見つかって。それで、あの…もしかしたら出荷分にも混じってる可能性が、そのー、あるみたいで。

  え、[一時停止]本当ですか？うーん、それはまずいですね。

  はい。つきましては、すぐに出荷を全面ストップしていただけますか？

  はい、はい、承知しました。今すぐ止めます。すでに出てしまった分は、えーっと、どうしましょう？

  ありがとうございます。あ、ごめん、そっちは私がリストアップして顧客に連絡しますので。

  了解です。では、こちらは出荷停止を最優先で対応します。

  助かります。では、よろしくお願いします。[咳]失礼します。

  はい、失礼します。'
