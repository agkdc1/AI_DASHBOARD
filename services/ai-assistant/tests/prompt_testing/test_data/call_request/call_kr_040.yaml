id: call_kr_040
name: 'KR call #40'
language: ko-KR
text: '발신자: [REDACTED_NAME]A

  수신자: [REDACTED_NAME]B


  [REDACTED_NAME]B: 여보세요?

  [REDACTED_NAME]A: 아, [REDACTED_NAME]B 씨, 저 [REDACTED_NAME]A입니다. 수고 많으십니다.

  [REDACTED_NAME]B: 아, 네, 안녕하세요. 어, 무슨 일이세요?

  [REDACTED_NAME]A: 네, 음... 저기, 좀 급한 건인데요. 어제 나간 그... SKU-X100, 아, 아니 에스케이유-X100 제품
  있잖아요. 거기에 불량품이 한... 서너 개, 아 아니, 좀 섞여서 나간 것 같아서요.

  [REDACTED_NAME]B: 네? 아... 잠깐만요... [잡음] 아, 죄송합니다. 전화가 좀 끊겨서요. 불량품이 발견되었다고요?

  [REDACTED_NAME]A: 아, 네, 네. 그러니까 SKU-X100 제품에요. 지금 바로 출고될 물량부터... 아니, 일단 창고에 있는 건
  전부 출하 중지시켜 주세요.

  [REDACTED_NAME]B: 네, 알겠습니다. SKU-X100 전량 출하 중단하겠습니다. 그럼... 그, 이미 발송된 고객사 쪽은 어떻게 할까요?

  [REDACTED_NAME]A: 아, 그게 문제인데... [일시정지] 우선 리스트 확인해서 바로 연락을... 좀 돌려주셔야 할 것 같아요.

  [REDACTED_NAME]B: 네, 알겠습니다. 그럼 처리하고 바로 보고드리겠습니다.

  [REDACTED_NAME]A: 네, 부탁드립니다.

  [REDACTED_NAME]B: 네, 들어가세요.'
