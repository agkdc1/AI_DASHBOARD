id: call_ja_001
name: 'JA call #1'
language: ja-JP
text: 'もしもし、お疲れ様です。営業部の[REDACTED_NAME]です。


  あ、はい、お疲れ様です。[REDACTED_NAME]です。


  あのー、ちょっと急ぎで確認したいことがありまして。えーと、注文番号のエスオーのにーぜろにーよん…あ、違う、SO-2024-1234です。これの本日中の出荷って、うーん、どうかなと思いまして…。


  エスオーのにーぜろにーよんのいちにーさんよん…ですね。[一時停止] えー、ちょっと待ってくださいね…[雑音]…あ、はい、はい。大丈夫です。そのー、今日の最終便に、あ、いや、今日の便で出荷できます。


  あ、本当ですか！助かります！では、それでお願いします。送り先は[REDACTED_ADDRESS]で合ってますよね？


  はい、承知しました。その住所で手配を進めます。


  ありがとうございます。お忙しいところすみません。では、よろしくお願いします。


  はい、はい、承知いたしました。失礼します。


  失礼します。'
