id: call_ja_018
name: 'JA call #18'
language: ja-JP
text: 'もしもし、[REDACTED_NAME]です。

  あ、お疲れ様です、[REDACTED_NAME]です。えーと、今、ちょっとだけお時間よろしいですか？

  はい、はい、大丈夫ですよ。[雑音]

  ありがとうございます。あのー、**楽天**の**注文**の件でちょっと確認したいことがありまして。えーっと、注文番号の下4桁が…なんだっけ…あ、そうだ、7531の件なんですけど。

  あー、7531ですね、はい。[一時停止] うーん、ありました。これがどうかしましたか？

  そのー、なんか在庫数がシステム上だと2個になってるんですけど、えーと、実在庫はたしか…1個、あ、違う、ゼロでしたっけ？ ちょっと記憶が曖昧で…。

  ああ、なるほど。えー、こっちのデータだと確かに1個引き当たってますね。ゼロではないです。あ、でもこれ、もしかしたら…

  はい。あ、ちょっと聞こえにくい…もう一度お願いします。

  あ、ごめん、こっちの別システムだと、そのー、引当が失敗してるかも。なので、お客様には一度、在庫不足の連絡を入れた方が良さそうですね。

  はい、わかりました。じゃあ、そのように対応します。

  はい、お願いします。

  では、取り急ぎ失礼します。

  はい、はーい。お疲れ様です。失礼します。'
