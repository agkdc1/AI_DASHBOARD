id: call_kr_021
name: 'KR call #21'
language: ko-KR
text: '여보세요, IT팀 [REDACTED_NAME]입니다.

  네, [REDACTED_NAME] 과장님. 수고하십니다. 기획팀 [REDACTED_NAME]입니다.

  아, 네, 안녕하세요. 어... 저기, 다름이 아니라 다음 주 **서버** **유지보수** 건 때문에 연락드렸습니다.

  아, 네, 네. [잡음] 아, 죄송한데 잘 안 들려서... 다시 한번만요.

  아, 네. 그... 다음 주 **서버** **유지보수** 작업이요. 토요일 새벽 2시부터... 음, 한 2시간, 아니 3시간 정도? 아, 죄송합니다.
  2시간으로 확정됐습니다.

  아, 토요일 새벽이요. 알겠습니다.

  네. 그래서 그 시간 동안에는 그룹웨어 **서버** 접속이 좀... 아, 그러니까, 접속이 안 될 거라 미리 공지를 좀 부탁드리려고요.

  음... 알겠습니다. 그럼 저희가... [일시정지] 아, 네, 바로 공지 올리겠습니다.

  감사합니다. **그럼** 잘 부탁드립니다. **실례하겠습니다**.

  네, 수고하세요.'
expected:
  valid_json_keys:
  - title
  - description
  - due_date
  - priority
  - decisions
  title_contains:
  - 유지보수
  - 서버
  priority_range:
  - 2
  - 4
  has_decisions: true
