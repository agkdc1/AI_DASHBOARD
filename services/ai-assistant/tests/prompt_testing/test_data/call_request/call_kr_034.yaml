id: call_kr_034
name: 'KR call #34'
language: ko-KR
text: '여보세요, [REDACTED_NAME]입니다.

  아, 네, [REDACTED_NAME]님. 수고 많으십니다.

  네, 수고 많으세요. 음... 저기, 다름이 아니라 신상품 관련해서요. [잡음] 아, 혹시 지금 통화 괜찮으세요?

  네, 네, 괜찮습니다. 말씀하세요.

  아, 그... 이번에 새로 나온 NP-2026 있잖아요. 이거 그... 재고 등록을 좀 부탁드리려구요.

  아, 네. 엔피 이공이... 어, 잠깐만요, 잘 안 들려서요. 엔피 이공이육(NP-2026) 맞으시죠?

  네, 맞아요. NP-2026. 그거 초도 물량을... 어... 5개였나? 아, 아니요, 죄송합니다. 10개로 재고 등록 좀 부탁드릴게요.

  알겠습니다. 그럼 NP-2026, 신규로 10개 재고 등록. 네, 그렇게 바로 진행하겠습니다.

  네, 감사합니다. 아, 그리고... 아니에요, 그건 다음에. 그럼 부탁드립니다.

  네, 처리하고 연락드리겠습니다. [기침] 그럼 들어가세요.

  네, 수고하세요.'
