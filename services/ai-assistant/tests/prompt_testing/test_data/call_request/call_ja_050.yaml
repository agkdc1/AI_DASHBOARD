id: call_ja_050
name: 'JA call #50'
language: ja-JP
text: '（[電話の音]）

  もしもし、[REDACTED_NAME]です。お疲れ様です。


  あ、お疲れ様です。[REDACTED_NAME]です。はい、はい。


  すみません、今、えーと、ちょっとよろしいでしょうか。あのー、緊急でして。で、あの、先ほどお客様からご連絡がありまして…。[雑音]


  え、何ですか？あ、ちょっと聞こえにくい...もう一度お願いします。


  はい、すみません。えっと、本日出荷したエスケーユーのY200、**SKU-Y200**なんですが、そのー、一部に**不良品**が混入している可能性があると…。数量が、えーっと、3...いや5ロットだったかな。あ、ごめん、3ロットです。


  え、本当ですか。それはまずいですね。で、お客様には？


  いえ、これからです。すぐにお詫びのご連絡をして、代替品の手配を進めたいのですが、よろしいでしょうか？ [咳]


  はい、お願いします。状況は分かり次第、また共有してください。


  承知いたしました。では、すぐに対応します。失礼します。


  お願いします。失礼します。'
