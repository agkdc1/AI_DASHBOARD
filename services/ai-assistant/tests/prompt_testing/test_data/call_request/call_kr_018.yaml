id: call_kr_018
name: 'KR call #18'
language: ko-KR
text: '여보세요, CS팀 [REDACTED_NAME]입니다.

  아, 네, [REDACTED_NAME] 대리님, 안녕하세요. 저기, 영업팀 [REDACTED_NAME]입니다.

  네, 네, 수고 많으십니다. 어, 무슨 일이시죠?

  어, 다름이 아니라 오전에 문의드렸던 그 **반품** 건 때문에요. **RMA-003** 제품 혹시 확인하셨을까 해서... [잡음] 아, 지금
  통화 괜찮으세요?

  아, 네. 괜찮습니다. 음, 제가 방금 확인했는데, 박스는 괜찮지만 제품 본체에 스크래치가 좀 있네요.

  아, 그렇군요. 스크래치가... 아니, 그게 아니라 고객에게는 바로 환불 처리를 진행해도 괜찮을까요?

  **네**, 뭐 그 정도는 괜찮을 것 같아요. 바로 진행해 주세요. 대신 해당 제품은, 어, 불량 재고로... 아, 잠시만요. 재고가 3개, 아니
  2개였네요. 2개 불량 등록 부탁드립니다.

  알겠습니다. **네**, 그럼 고객 환불 처리 후 불량 등록하도록 하겠습니다.

  **네**, 감사합니다. **그럼** 부탁드립니다.

  **네**, **수고하세요**. 실례합니다.'
