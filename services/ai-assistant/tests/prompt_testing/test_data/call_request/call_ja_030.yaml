id: call_ja_030
name: 'JA call #30'
language: ja-JP
text: '（プルルル… ガチャ）


  **受信者:** はい、営業二課の[REDACTED_NAME]です。


  **発信者:** あ、もしもし、お疲れ様です。システム部の[REDACTED_NAME]です。今、**ちょっと**大丈夫ですか？


  **受信者:** あ、[REDACTED_NAME]さん、お疲れ様です。はい、はい、大丈夫ですよ。


  **発信者:** ありがとうございます。**えーと**、先日お伝えしていた**サーバー**の**メンテナンス**の件なんですけど、[雑音] **あのー**、日程が固まりまして。来週の...**あ、ごめんなさい、再来週でした**。再来週の金曜の夜からになりました。


  **受信者:** あ、再来週の金曜ですね。承知しました。


  **発信者:** はい。**そのー**、夜間なんですけど、システムが、**うーん**、**3...いや4時間くらい**止まる見込みでして。それで、**あの**...事前にクライアント様へのご案内をお願いしたく...


  **受信者:** はい、承知いたしました。**まぁ**、夜間なら影響は少ないかと。すぐに通知の準備をします。


  **発信者:** 助かります。では、また詳細はピーディーエフ、**あ、いや、メールで**お送りしますね。


  **受信者:** わかりました。よろしくお願いします。では。


  **発信者:** はい、失礼します。'
