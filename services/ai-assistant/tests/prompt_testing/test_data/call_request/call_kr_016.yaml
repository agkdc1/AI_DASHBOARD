id: call_kr_016
name: 'KR call #16'
language: ko-KR
text: '(통화 시작)


  **수신자:** 여보세요, [REDACTED_NAME]입니다.


  **발신자:** 아, 네, 과장님. 수고 많으십니다. 저 [REDACTED_NAME]입니다. 어... 혹시 지금 통화 괜찮으신가요?


  **수신자:** 네, 네, 괜찮아요. [잡음] 아, 목소리가 조금 울리는데... 다시 한번 말씀해주시겠어요?


  **발신자:** 아, 네! 저기, 그 **반품** 건 때문에 연락드렸습니다. 그 관리번호 **RMA-001** 있잖아요. 음, 방금 입고돼서 확인해봤는데...
  아, 그러니까 제품에 손상이 좀 있네요.


  **수신자:** 손상이요? 아... 잠시만요. [일시정지] 네, 그거 고객 과실은 아닌 걸로 확인됐으니까, 어... 그냥 환불 처리로 진행해주세요.


  **발신자:** 아, 네, 알겠습니다. 그럼 바로... 아니, 오늘 중으로 처리하고 다시 보고드리겠습니다. 뭐, 다른 특이사항은 없었습니다.


  **수신자:** 네, 알겠어요. 수고하세요.


  **발신자:** 네, 그럼 들어가세요.


  (통화 종료)'
