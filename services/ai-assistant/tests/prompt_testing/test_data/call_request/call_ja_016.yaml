id: call_ja_016
name: 'JA call #16'
language: ja-JP
text: '[電話の音]


  もしもし、お疲れ様です。[REDACTED_NAME]です。


  あ、お疲れ様です。[REDACTED_NAME]です。あ、ちょっと聞こえにくい...もしもし？


  あ、すみません。えーと、今お時間よろしいでしょうか。ちょっと確認したいことがありまして。


  はい、はい、大丈夫ですよ。


  ありがとうございます。あのー、楽天の注文の件なんですけど、えー、昨日入ったやつで…あ、違う、一昨日ですね。そのー、私がピーディーエフで送ったリストにあった注文で、数量が確か3...いや5個だったと思うんですが、[咳]
  あの、そのステータスが、なんか、まだ未処理のままでして…。


  [一時停止] あー、すみません。えーっと、確認します。…ああ、はい、これですね。すみません、まだです。ちょっと、あの、別の緊急対応が入ってしまって…。


  あ、そうだったんですね。承知しました。まぁ、急ぎというわけではないんですが、本日中にはお願いできますでしょうか。


  はい、もちろんです。この後すぐに処理します。ご迷惑おかけしました。


  いえいえ、とんでもないです。では、よろしくお願いします。失礼します。


  はい、失礼します。'
expected:
  valid_json_keys:
  - title
  - description
  - due_date
  - priority
