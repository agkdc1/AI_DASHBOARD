id: call_ja_017
name: 'JA call #17'
language: ja-JP
text: 'はい、[REDACTED_NAME]です。


  あ、もしもし、お疲れ様です。[REDACTED_NAME]です。あのー、今、ちょっと大丈夫ですか？


  お疲れ様です。はい、はい、大丈夫ですよ。


  ありがとうございます。えーと、急で申し訳ないんですが、[雑音] 楽天からの注文の件で一つ確認したいことがありまして。


  はい、楽天の注文ですね。


  ええ。なんか、お客様から問い合わせがあって。えーっと、注文番号…あ、違う、注文番号じゃなくて、えーと、お客様のお名前が[REDACTED_NAME]様からのご注文で…。そのー、商品が、たしか3つ…いや、5個でしたっけ、5個届いてないという連絡が…。


  あ、[REDACTED_NAME]様ですね。え、5個ですか。うーん、承知しました。すぐに、あの、発送履歴を確認します。


  助かります。それで、もし不足分があれば、本日中に発送対応をお願いできますでしょうか。


  はい、承知いたしました。確認して、すぐに対応します。


  ありがとうございます。では、よろしくお願いします。失礼します。


  はい、では、失礼いたします。'
