id: call_ja_007
name: 'JA call #7'
language: ja-JP
text: '（プルルル…ガチャ）


  受信者: 「はい、資材管理部の[REDACTED_NAME]です。」


  発信者: 「もしもし、お疲れ様です。えーと、営業の[REDACTED_NAME]ですが、あのー、今、少しよろしいでしょうか。」


  受信者: 「あ、[REDACTED_NAME]さん、お疲れ様です。はい、はい、大丈夫ですよ。」


  発信者: 「ありがとうございます。ちょっと急ぎで確認したいのですが、部品番号P-A1234の**在庫**って、そのー、今どれくらいありますかね？」


  受信者: 「P-A1234ですね。うーん、少々お待ちください…[キーボードを打つ音]…ああ、かなり減ってますね。実質引き当て可能なのは、えーっと…5個、いや、3個ですね。」


  発信者: 「あ、3個ですか。やっぱりそうですか…。それで、あの…来週の案件で急に20個、あ、違う、えーと、30個ほど必要になりまして。追加で発注をお願いできませんでしょうか？」
  [咳]


  受信者: 「30個ですね。はい、承知しました。至急で手配かけますので、来週頭には間に合うかと思います。」


  発信者: 「助かります！では、発注手続き、よろしくお願いします。」


  受信者: 「はい、了解です。では。」


  発信者: 「はい、ありがとうございます。失礼します。」


  受信者: 「お疲れ様です。失礼します。」'
