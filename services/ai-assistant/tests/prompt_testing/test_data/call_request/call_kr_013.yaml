id: call_kr_013
name: 'KR call #13'
language: ko-KR
text: '여보세요?

  아, 네, [REDACTED_NAME] 대리님. 저 [REDACTED_NAME]입니다. 수고 많으십니다.

  아, 네, 어, [REDACTED_NAME]씨. 안녕하세요. [잡음] 아, 여보세요? 목소리가 조금...

  아, 네! 지금은 잘 들리시나요?

  네, 네, 이제 괜찮아요. 무슨 일이세요?

  음, 다름이 아니라, 그 최근에 **라쿠텐** 쪽 **주문** 건에서... 그러니까, 클레임이 한 두 건? 아니, 세 건 정도 들어온 것 같아서요.
  어, 그래서 저기, 처리 프로세스를 한번 다시 검토해야 할 것 같은데... [일시정지]

  아, 저도 그거 뭐, 좀 신경 쓰였어요. 맞아요. 그럼 다음 주 월요일 오전에... 아, 잠깐, 월요일 오전은 제가 좀 바빠서. 오후는 어떠세요?

  네! 오후 좋습니다. 그럼 제가 회의실 예약하고 다시 연락드리겠습니다.

  네, 알겠습니다.

  네, 그럼 이만 끊겠습니다. 감사합니다.

  네, 수고하세요.'
expected:
  valid_json_keys:
  - title
  - description
  - due_date
  - priority
  - decisions
  title_contains:
  - 라쿠텐
  - 주문
