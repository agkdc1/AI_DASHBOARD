id: call_kr_007
name: 'KR call #7'
language: ko-KR
text: '여보세요, [REDACTED_NAME]입니다. 수고 많으십니다.

  아, 네, [REDACTED_NAME]님. 수고하십니다. 어, 그런데 목소리가 좀... [잡음] 아, 지금은 괜찮네요.

  아, 다행이네요. 저기, 다름이 아니라 재고 때문에 전화드렸는데요. 그... 모델명 P-B5678 부품 재고가, 음, 거의 다 떨어져서요.

  아, P-B5678이요? 어, 지금 얼마나 남아있죠?

  네, 제가 방금 확인했을 때... 아, 그러니까, 20개가 안 됐어요. 한 15개? 정도 남았습니다. 다음 주 생산 일정 고려하면, 뭐...

  아, 알겠습니다. 네네. 그럼 바로 발주 넣어야겠네요. 음... 100개 정도 추가하면 될까요?

  아니, 그게 아니라... 요즘 출고량이 많아서 150개는 해야 할 것 같습니다.

  알겠습니다. 그럼 150개로 발주 넣고 다시 연락드리겠습니다.

  네, 그럼 잘 부탁드립니다. 들어가세요.

  네, 감사합니다. 실례합니다.'
