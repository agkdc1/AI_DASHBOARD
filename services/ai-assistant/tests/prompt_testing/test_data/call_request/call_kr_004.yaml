id: call_kr_004
name: 'KR call #4'
language: ko-KR
text: '[전화벨 소리]


  **수신자:** 네, 물류팀 [REDACTED_NAME]입니다.


  **발신자:** 아, 네, 과장님. 수고 많으십니다. 영업부 [REDACTED_NAME]입니다. 음... 저기, 주문 건 때문에 전화드렸는데요.


  **수신자:** 네, [REDACTED_NAME] 대리님. 어... 어떤 건이죠?


  **발신자:** 그, 주문 번호 에스오(SO)-이공이오(2025)에... 아, 아니, 다시 공일이삼(0123)이요. 혹시 그 건 오늘 출하가 가능할까요?
  고객사에서 뭐, 좀 많이 급하다고 하셔서요.


  **수신자:** 에스오-이공이오-공일이삼... [잡음] 아, 잠시만요. 지금 확인 좀... [일시정지] 아, 네네, 확인했고요. 음... 오늘
  오후에 출하 예정으로 잡혀있네요. 네, 문제없이 가능합니다.


  **발신자:** 아, 정말요? 다행이다. 아니, 그게 아니라 어제는 어렵다고 들어서... 알겠습니다. 그럼 오늘 꼭 좀 부탁드리겠습니다!


  **수신자:** 네, 알겠습니다. 그렇게 진행하겠습니다.


  **발신자:** 감사합니다. 그럼 수고하세요.


  **수신자:** 네, 들어가세요.'
