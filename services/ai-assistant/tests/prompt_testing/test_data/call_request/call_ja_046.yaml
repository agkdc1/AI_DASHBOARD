text: 'もしもし、現場の[REDACTED_NAME]です。


  あ、お疲れ様です、管理部の[REDACTED_NAME]です。えーと、今、ちょっとお時間よろしいでしょうか？


  はい、お疲れ様です。はい、はい、大丈夫ですよ。


  ありがとうございます。あのー、来月の**フォークリフト**の定期**点検**の件なんですが、えー、日程がですね、来月の、えーっと、3日...あ、ごめん、5日に決まりました。
  [雑音] あ、もしもし、聞こえてますか？


  あ、はい、大丈夫です。来月の5日ですね。


  **はい**。それで、そのー、前日までに、なんか現場のフォークリフトで不具合とか...いや、そうじゃなくて、気になる点がないか確認をお願いできればと...。


  はい、承知しました。来月の5日ですね。[一時停止] うーん、事前に確認して、もし何かあればご報告します。


  助かります。**では**、よろしくお願いいたします。


  はい、承知いたしました。**失礼します**。


  **お疲れ様です**。**失礼します**。'
