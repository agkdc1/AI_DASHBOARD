id: call_ja_025
name: 'JA call #25'
language: ja-JP
text: 'はい、営業部の[REDACTED_NAME]です。


  お疲れ様です。システム部の[REDACTED_NAME]です。えーと、今、少しお時間よろしいでしょうか？


  あ、[REDACTED_NAME]さん、お疲れ様です。はい、はい、大丈夫ですよ。


  ありがとうございます。あのー、来週の**サーバー**の定期**メンテナンス**の件でご連絡しました。えー、日程がですね、来週の土曜深夜…あ、もしもし？ [雑音]


  あ、すみません、ちょっと聞こえにくくて…もう一度お願いします。


  あ、失礼しました。えーっと、来週の**サーバー**の**メンテナンス**日程が、来週土曜深夜、午前2時から…あ、違う、えーと、午前2時から5時の3時間で確定しました。


  承知しました。土曜の夜間ですね。そのー、その間はシステムが完全に停止するという認識で合ってますか？


  はい、その通りです。で、それで、あの…つきましては、営業部の方からお客様への事前告知をお願いしたいのですが、ご対応は可能でしょうか？


  はい、承知いたしました。うん、まぁ、こちらで案内文を作成して、今週中に通知しておきます。


  ありがとうございます、助かります。[一時停止] では、詳細はこの後メールでもお送りしますね。


  承知しました。では、失礼します。


  はい、失礼します。'
