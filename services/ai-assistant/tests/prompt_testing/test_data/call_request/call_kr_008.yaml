id: call_kr_008
name: 'KR call #8'
language: ko-KR
text: '(전화벨 소리)


  **수신자:** 네, [REDACTED_NAME]입니다.


  **발신자:** 여보세요, 아, [REDACTED_NAME]입니다. 수고 많으십니다.


  **수신자:** 아, 네, [REDACTED_NAME]님. 어, 안녕하세요. [잡음] 무슨 일이시죠?


  **발신자:** 네, 저기, 다름이 아니라, 그 부품 **재고** 관련해서요. 음... P-C... 아, 아니, **P-C9012**요. 그 모델
  말입니다.


  **수신자:** 아, P-C9012요. 네, 네. 아, 잠시만요... 네, 그게 왜요?


  **발신자:** 이제 저희 쪽 재고가 거의 다 떨어져서요. 확인해 보니까, 한... 어... 서른 개? 아니, 스무 개 정도밖에 안 남은 것 같아서요.
  그래서, 그... 다음 주 발주를...


  **수신자:** 아, 벌써 그렇게 됐나요? 어... [일시정지] 알겠습니다. 그럼, 어, 수량을... 아니, 바로 추가 발주 처리하겠습니다. 그러니까,
  뭐 걱정 안 하셔도 됩니다.


  **발신자:** 아, 네! 정말 감사합니다. 그럼 잘 부탁드립니다.


  **수신자:** 네, 네. 알겠습니다.


  **발신자:** 그럼 들어가세요.


  **수신자:** 네, 수고하세요.'
