id: call_kr_025
name: 'KR call #25'
language: ko-KR
text: 'A: 여보세요, 기획팀 [REDACTED_NAME]입니다.

  B: [잡음] 아, 네, [REDACTED_NAME]님. 안녕하세요. 저기, 시스템팀 [REDACTED_NAME]입니다.

  A: 네, 어, 수고하십니다.

  B: 네. 다름이 아니라, 그 정기 **서버** **유지보수** 건으로 연락드렸는데요. 음, 다음 주 토요일 새벽 2시부터 5시... 아, 아니,
  6시까지로 일정이 잡혔거든요. [일시정지] 그동안 시스템 접속이 안 될 예정이라서요.

  A: 아... 다음 주 토요일 새벽이요. 알겠습니다. 음, 네, 네. 그, 문제는 없을 것 같습니다.

  B: 아, 네, 감사합니다. 그럼 이제 사용자분들께 사전 공지 좀...

  A: 아, 네! 알겠습니다. 제가 바로 공지... 아니, 팀원들한테 먼저 공유하고 올리도록 하겠습니다.

  B: 네, 감사합니다. 그럼 잘 부탁드립니다.

  A: 네, 수고하세요.

  B: 네, 그럼 실례하겠습니다.'
