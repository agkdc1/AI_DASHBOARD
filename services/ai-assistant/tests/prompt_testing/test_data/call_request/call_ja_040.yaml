id: call_ja_040
name: 'JA call #40'
language: ja-JP
text: '（通話開始）


  受信者: はい、[REDACTED_NAME]です。

  発信者: もしもし、お疲れ様です。[REDACTED_NAME]です。あ、あのー、今ちょっと大丈夫ですか？

  受信者: お疲れ様です。はい、はい、大丈夫ですよ。

  発信者: ありがとうございます。えーと、新商品の件で、例の**NP-2026**、あ、ごめん、エヌピーニーゼロニーロクの初回ロットがさっき届きまして。[雑音]
  そのー、**在庫登録**をお願いしたくて、えー、電話しました。

  受信者: あ、はい、承知しました。**NP-2026**ですね。数量はいくつになりますか？

  発信者: えーっと、10…いや、12個だったかな。あ、12個ですね。それで、あの…InvenTreeへの登録なんですけど…

  受信者: はい。12個で**在庫登録**ですね。承知しました。期限とかって、うーん、ありますか？

  発信者: [一時停止] あ、そうですね、来週の月曜…あ、違う、来週の火曜まで、火曜の午前中まででお願いできますか。まぁ、急ぎではないんですが。

  受信者: はい、承知いたしました。火曜の午前中までですね。対応します。

  発信者: 助かります。では、よろしくお願いします。

  受信者: はい、失礼いたします。

  発信者: はい、失礼します。


  （通話終了）'
