id: meeting_mix_001
name: Cross-team shipping coordination
language: mixed
transcript: '[REDACTED_NAME_1]：お疲れ様です。えーと、じゃあ始めますね。早速ですけど、[REDACTED_NAME_2]さん、来週の件、お願いできますか。


  [REDACTED_NAME_2]：네, 수고하십니다. 음, 다음 주 화요일에 대량 **출하** 건이 있습니다. 지금 확인된 에스오(SO)만으로도
  **200**건이 넘을 것 같아요. (はい、お疲れ様です。えーと、来週の火曜日に大量出荷の件があります。今確認できているエスオーだけで200件を超えると思います。)


  [REDACTED_NAME_3]：うわ、200...あ、違う、200件超えでしたね。ちょっと多いですね、かなり。なんか特別なキャンペーンでもありましたっけ？


  [REDACTED_NAME_1]：ですねぇ…。あのー、いつもの集荷だと、まぁ、厳しいですよね。それで、あの…なんだっけ…そうそう、トラックに乗り切らない可能性も。
  [咳]


  [REDACTED_NAME_2]：네, 맞아요. 그러니까, 오후 4시 집하만으로는 시간이 부족할 것 같습니다. (はい、そうです。なので、午後4時の集荷だけでは時間が足りないと思います。)


  [REDACTED_NAME_1]：わかりました。じゃあ、**決定事項**として、来週火曜日のその大量**出荷**に合わせて、運送会社に追加集荷を依頼しましょう。これは確定で。


  [REDACTED_NAME_3]：承知しました。 [雑音]


  [REDACTED_NAME_1]：**アクションアイテム**ですが、[REDACTED_NAME_3]さん、ヤマトさんに連絡して、午前中にもう一回来てもらう調整を…金曜までに...あ、いや、木曜までにお願いできますか？その方が安心なので。


  [REDACTED_NAME_3]：はい、承知です。木曜中に調整して、すぐ共有します。


  [REDACTED_NAME_2]：아, 알겠습니다. 그럼 이번 건을 계기로, 이런 경우의 대응 매뉴얼을 업데이트하는 게 좋겠어요. (あ、了解です。では今回の件を機に、こういう場合の対応マニュアルを更新するのが良さそうです。)


  [REDACTED_NAME_1]：あ、いいですね！確かに。じゃあ今回のフローを、**ドキュメント更新**として既存の『出荷手順書』に追記しましょうか。[REDACTED_NAME_2]さん、下書きお願いできます？


  [REDACTED_NAME_2]：네, 제가 작성하겠습니다. (はい、私が作成します。)


  [REDACTED_NAME_1]：ありがとうございます。じゃ、今日は以上です。お疲れ様でしたー。'
expected:
  action_items:
    min_count: 1
  decisions:
    min_count: 1
    contains_keywords:
    - 出荷
    - '200'
    - 출하
  doc_updates:
    min_count: 1
