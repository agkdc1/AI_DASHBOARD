id: meeting_ja_005
name: New product launch planning
language: ja-JP
transcript: '[REDACTED_NAME]：はい、お疲れ様です。えーと、じゃあ早速ですけど、新商品NP-2026の件、進めましょうか。


  [REDACTED_NAME]：お願いします。


  [REDACTED_NAME]：えー、まず、あのー、一番大事な価格なんですけど。原価とか見て、そのー、まぁ、3,500円でどうかなと思ってまして。


  [REDACTED_NAME]：3,500円ですか。うーん、なるほど。[電話の音] あ、すみません。えっと、競合の価格って、たしか…3千…いや、3,800円と、3,300円ぐらいでしたっけ？


  [REDACTED_NAME]：はい、そんな感じですね。なので、まぁ、うちの品質考えたら悪くない線かなと。なんか、強気すぎず弱気すぎず。


  [REDACTED_NAME]：そうですね、妥当だと思います。じゃあ、それでいきましょうか。


  [REDACTED_NAME]：はい。じゃあ、**新商品**の「**NP-2026**」、価格は税抜き…あ、違う、えーと、税込みで**3,500円**で決定ということにします。


  [REDACTED_NAME]：承知しました。で、プロモーションの件なんですけど、あの…なんだっけ…ウェブ用の写真、あれって進捗どうなってます？


  [REDACTED_NAME]：あー、それがですね、撮影用の最終サンプルがまだ来てなくて。あのー、[咳] ちょっと、まだ進められてない状況でして。


  [REDACTED_NAME]：あ、ごめん、ごめん！俺のほうで止まってたか。すぐ製造に確認して、明日中には渡せるようにします。


  [REDACTED_NAME]：ありがとうございます。じゃあ、**アクションアイテムですけど、[REDACTED_NAME]は来週水曜までに商品撮影を完了**させます。


  [REDACTED_NAME]：助かります。あと、システムへのエスケーユー…SKUの登録も必要ですよね。


  [REDACTED_NAME]：あ、それ私の方でやっておきます。**アクションアイテムとして、[REDACTED_NAME]が来週月曜までに在庫システムにNP-2026を登録します。**いや、そうじゃなくて金曜までには必ず。


  [REDACTED_NAME]：了解です。じゃあ、そんな感じで進めましょう。皆さん、引き続きよろしくお願いします。 [雑音]'
expected:
