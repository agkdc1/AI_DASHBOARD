id: meeting_mix_005
name: System migration planning
language: mixed
transcript: '[REDACTED_NAME_1]：えー、皆さんお疲れ様です。えーと、本日はですね、システムマイグレーションの計画について、あのー、もう少し具体的に進めたいと思います。


  [REDACTED_NAME_2]：네, 안녕하세요. 음, 지금 진행 상황을 다시 한번 좀... 말씀해주시겠어요? (はい、こんにちは。えーっと、今の進捗状況をもう一度ちょっと…お話しいただけますか？)


  [REDACTED_NAME_1]：はい。えーと、現行システムをコンテナ化して、そのー、K8s…ケーエイツ？クラスターへ移行する方針は、まぁ、決まってるんですが、問題は、あの、どうやって進めるか、ですね。あ、いや、いつ、どうやって、ですね。


  [REDACTED_NAME_3]：そうですね…なんか、いきなり本番はリスク高すぎるんで、やっぱりテスト環境をちゃんと… [雑音]


  [REDACTED_NAME_2]：아, 맞아요. 그러니까, 마이그레이션 일정을 잡기 전에, 테스트 계획이 먼저 필요한 것 같아요. (あ、そうです。なので、マイグレーションのスケジュールを立てる前に、テスト計画がまず必要だと思います。)


  [REDACTED_NAME_1]：なるほど。じゃあ、えー、それでいきましょう。**決定事項**ですね。**来月中にK8s上に**테스트**環境を構築して、そこでしっかり検証してから段階的に**マイグレーション**を進める**。この方針で、あの、問題ないでしょうか？


  [REDACTED_NAME_3]：はい、大丈夫です。


  [REDACTED_NAME_1]：じゃあ、**アクションアイテム**ですが、[REDACTED_NAME_3]さん、来週の…水曜、いや火曜までで大丈夫かな？テスト項目を洗い出した計画書のドラフトをお願いします。


  [REDACTED_NAME_3]：承知しました。来週火曜ですね。


  [REDACTED_NAME_2]：아, 잠깐, 그리고 중요한 게 있는데, 운영 매뉴얼도 업데이트가 필요합니다. 아니, 그게 아니라... 새 시스템에
  맞게 완전히 새로 만들어야 할 수도 있어요. (あ、ちょっと、それと重要なことですが、運用マニュアルも更新が必要です。いや、そうじゃなくて…新しいシステムに合わせて完全に作り直す必要があるかもしれません。)


  [REDACTED_NAME_1]：あー、そうでしたね！それで、あの…なんだっけ…ああそうだ、**ドキュメント更新**！[REDACTED_NAME_2]さん、まずは現行マニュアルからの差分洗い出しをお願いできますか？


  [REDACTED_NAME_2]：네, 제가 맡겠습니다. (はい、私がやります。) [電話の音]


  [REDACTED_NAME_1]：助かります。では本日はここまでで。お疲れ様でした。


  [REDACTED_NAME_2]・[REDACTED_NAME_3]：お疲れ様でした。/ 수고하셨습니다.'
