id: meeting_ja_002
name: Shipping process meeting
language: ja-JP
transcript: '[REDACTED_NAME]: お疲れ様です。えーと、じゃあ始めますね。今日は、あのー、出荷プロセスの件でちょっと共有がありまして。


  [REDACTED_NAME]: お疲れ様です。はい。


  [REDACTED_NAME]: お願いします。


  [REDACTED_NAME]: 早速なんですけど、ヤマトさんから連絡があって、来週から集荷の締め切り時間が変わるそうです。えー、最終が16時…あ、違う、えーと、15時になるって話で。


  [REDACTED_NAME]: えっ、15時ですか！ [咳] うーん、それは結構きついですね…。今日の分も、えーっと、30...いや、50件近くあったんで、14時以降の注文は当日無理になっちゃいますね、ほぼ。


  [REDACTED_NAME]: ですよね。まぁ、先方の都合なんで、これはもう受け入れるしかないかなと。**というわけで、決定事項として、来週月曜からヤマトの最終集荷は15時で確定します。**


  [REDACTED_NAME]: 承知しました。


  [REDACTED_NAME]: で、それに伴って、いくつか対応が必要で。それで、あの…なんだっけ…ああそうそう、マニュアルの件なんだけど。[REDACTED_NAME]さん、社内の出荷業務マニュアル、あのピーディーエフのやつ、更新お願いできますか？


  [REDACTED_NAME]: はい、わかりました。集荷時間と、あと受注締めの時間も変える感じですかね？


  [REDACTED_NAME]: あ、そうですね。エスオー、つまり受注オーダーの締め時間も前倒しで修正お願いします。**アクションアイテム①として、[REDACTED_NAME]さんは金曜までにマニュアル更新、お願いします。**


  [REDACTED_NAME]: 承知しました。


  [電話の音]


  [REDACTED_NAME]: あ、ごめん。で、もう一つ。そのー、これを機に、ちょっと他社も検討したいと思ってて。[REDACTED_NAME]さん、佐川急便に見積もり依頼してもらえませんか？いや、そうじゃなくて、[REDACTED_NAME]さんの方がいいか。


  [REDACTED_NAME]: あ、はい。私がやります。


  [REDACTED_NAME]: ありがとう。**アクションアイテム②で、[REDACTED_NAME]さん、佐川に連絡して新しい見積もり取得をお願いします。**月末の契約更新に間に合わせたいんで、来月の15日あたりを目処にもらえると助かります。


  [REDACTED_NAME]: わかりました。動いてみます。


  [REDACTED_NAME]: はい、じゃあ今日は以上です。皆さん、よろしくお願いします。お疲れ様でした。'
expected:
  action_items:
    min_count: 2
  decisions:
    min_count: 1
    contains_keywords:
    - 集荷
    - 15時
    - ヤマト
