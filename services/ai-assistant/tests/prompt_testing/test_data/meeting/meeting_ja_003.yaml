id: meeting_ja_003
name: Rakuten order review
language: ja-JP
transcript: '[REDACTED_NAME]：はい、お疲れ様です。えーと、時間なんで始めますかね。今日の議題は、あのー、楽天の注文レビューの件です。なんか最近、ちょっと低評価が続いてるのが気になってて。


  [REDACTED_NAME]：お疲れ様です。そうなんですよ。特に先週あったやつで、「住所変更をお願いしたのに反映されてない」っていうレビューが一件…。[REDACTED_ADDRESS]に送るはずが、古い住所のまま発送しちゃって。


  [REDACTED_NAME]：あー、それか。あれ、メールで連絡来てたやつだっけ？


  [REDACTED_NAME]：はい。えー、そのー、注文直後に問い合わせフォームから連絡いただいてたんですけど、出荷担当が見落としてて…。いや、見落としたっていうか、確認のフローが、ちょっと…


  [REDACTED_NAME]：まぁ、朝のバタバタしてる時間だと抜けちゃうこともあるよな。[雑音] うーん、どうすっかな。


  [REDACTED_NAME]：あの、現状だと注文データをCSVで落として、それを基に出荷指示書作ってるじゃないですか。そのタイミングだと、もう備考欄しか見ないんですよね。あ、違う、えーと、備考欄すらCSVに出てこないか。


  [REDACTED_NAME]：そうそう。だから、注文が入ったらまずRMSで一件ずつ内容と、あとメールも確認するっていうのを徹底しないとダメだね。それで、あの…なんだっけ…


  [REDACTED_NAME]：はい、そのフローの再徹底ですね。じゃあ、アクションアイテムとして、僕の方で改めてチェックリスト作って、来週月曜朝に共有します。


  [REDACTED_NAME]：うん、頼むよ。それともう一点、これは利益の話なんですが、仕入れ値がまた上がってきてて。そろそろ楽天の注文分も値上げしないと、正直しんどい。


  [REDACTED_NAME]：[咳] ですよね…。もうさすがに…。でもお客さん離れないすかね。


  [REDACTED_NAME]：そこが怖いんだけどね。でももう、これ以上は無理だ。競合も見ながらだけど、えーっと、3...いや、5%くらいは上げたい。特に売れ筋のエスケーユー（SKU）から。


  [REDACTED_NAME]：5%ですか…。まぁ、他も上げてきてるし、しょうがないですかね。


  [REDACTED_NAME]：よし。じゃあ、決定事項として、楽天の注文に関しては、来月から主要商品を対象に5%の値上げを実施する方向で準備を進めましょう。具体的な告知とかはまた来週。


  [REDACTED_NAME]：承知しました。


  [REDACTED_NAME]：はい、じゃあ今日は以上です。お疲れ様でしたー。'
