id: meeting_kr_001
name: 재고 점검 회의
language: ko-KR
transcript: '[REDACTED_NAME]1: 자, 어... 그럼 2월 재고 점검 회의 시작합시다. [REDACTED_NAME]2 대리,
  지난주 정기 실사 결과 공유 좀 해줘요.


  [REDACTED_NAME]2: 네, 팀장님. 음... 전반적으로는 시스템이랑 거의 맞았는데, 저기... 에스케이유-B5501 제품에서 좀 차이가
  발견됐습니다. 시스템상으로는 재고가 50개인데, 실사는 38개로... 그러니까, 12개가 부족합니다.


  [REDACTED_NAME]3: 12개나요? 꽤 큰데요. 혹시 뭐 입고할 때 오류가 있었나...


  [REDACTED_NAME]2: 입고 기록은 다 확인했는데 특이사항은 없었습니다. 아, 잠깐만요. 그게 아니라... 아마 지난주 영업팀에서 급하게
  요청했던 건 때문인 것 같습니다. [잡음] 그때 수기 전표로만 처리하고 시스템에 입력을...


  [REDACTED_NAME]1: 아, 그 건. 또 전산 누락이네. 뭐... 바쁘다 보면 그럴 수 있죠. [기침] 알겠습니다. 그럼 결정하죠. 다음
  주 정기 **재고** **실사** 전까지 해당 **SKU**의 입출고 기록을 전수 재확인하는 것으로 합니다. 이게 오늘 결정 사항입니다.


  [REDACTED_NAME]2: 네, 알겠습니다, 팀장님.


  [REDACTED_NAME]1: **(액션 아이템)** 그래서 [REDACTED_NAME]2 대리는 그 긴급 출고 건 수기 전표랑 시스템 로그
  다시 대조해서 정확한 원인 파악하고, 내일 오전까지 저한테 보고해주세요.


  [REDACTED_NAME]2: 네. 바로 확인해서 보고드리겠습니다.


  [REDACTED_NAME]1: 아, 그리고 **(문서 업데이트)** 이참에 [REDACTED_NAME]3 씨가 재고 관리 매뉴얼에 ''긴급 출하
  시 전산 입력 확인 절차'' 항목 좀 명확하게 추가해서 업데이트 부탁해요.


  [REDACTED_NAME]3: 네, 알겠습니다. 바로 정리해서 반영하겠습니다.


  [REDACTED_NAME]1: 좋습니다. 그럼 오늘은 여기까지 하죠. 수고했어요.'
expected:
  action_items:
    min_count: 1
  decisions:
    min_count: 1
    contains_keywords:
    - 재고
    - SKU
    - 실사
  doc_updates:
    min_count: 1
