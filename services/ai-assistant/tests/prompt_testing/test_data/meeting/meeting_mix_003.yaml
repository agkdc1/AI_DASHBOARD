id: meeting_mix_003
name: New marketplace onboarding
language: mixed
transcript: 'はい、えーと、ではお時間になりましたので始めさせていただきます。よろしくお願いします。


  [REDACTED_NAME]: よろしくお願いします。


  [REDACTED_NAME]: 네, 잘 부탁드립니다.


  [REDACTED_NAME]: えー、先日の会議で決まりました通り、新しい**마켓플레이스**として**Yahoo**!ショッピングへの**出店**が決定しました。それで、あの…早速なんですけど、具体的な準備を進めたいと思ってます。


  [REDACTED_NAME]: 아, 드디어 결정됐군요. 그럼, 뭐부터 시작해야 할까요? (あ、ついに決まったんですね。では、何から始めればいいですか？)


  [REDACTED_NAME]: そうですね、まず商品登録を急ぎたいんですが…[咳] あのー、[REDACTED_NAME]さんにお願いしたいのが、商品データ。CSVの準備を来週の…あ、違う、来週木曜日までにお願いできますか？


  [REDACTED_NAME]: 承知しました。木曜ですね。えーと、対象商品はどのあたりで…売れ筋の、なんか、20...いや、まずは15商品くらいでいいですか？エスケーユーのリストを先に共有しますか？


  [REDACTED_NAME]: うーん、そうですね、まずは15でいきましょうか。それで、あの…なんだっけ…ああそうそう、画像もお願いします。[雑音]


  [REDACTED_NAME]: 알겠습니다. 상품 데이터 준비랑 병행해서, 어, 저희 내부 가이드라인도 업데이트해야 할 것 같아요. 기존 매뉴얼에
  야후 쇼핑 파트를 추가하는 작업이요. (承知しました。商品データの準備と並行して、ええと、うちの社内ガイドラインも更新しないといけないと思います。既存マニュアルにYahoo!ショッピングのパートを追加する作業です。)


  [REDACTED_NAME]: あ、そのー、確かに。いいですね、ありがとうございます。じゃあ、[REDACTED_NAME]さん、そのドキュメント更新もお願いできますか。まぁ、まずはドラフトで構わないので。


  [REDACTED_NAME]: 네, 알겠습니다. 그, 제가 바로 시작하겠습니다. (はい、承知しました。えっと、私がすぐに始めます。)


  [REDACTED_NAME]: はい、では本日のアクションアイテムは、[REDACTED_NAME]さんの商品データ15点の準備、期限は来週木曜。それと[REDACTED_NAME]さんの出店マニュアル更新。これで進めましょう。お願いします。'
expected:
  action_items:
    min_count: 1
  decisions:
    min_count: 1
    contains_keywords:
    - Yahoo
    - 마켓플레이스
    - 出店
