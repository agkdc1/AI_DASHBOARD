id: meeting_kr_002
name: 배송 프로세스 회의
language: ko-KR
transcript: '[REDACTED_NAME]1: 자, 그럼 어... 오늘 배송 프로세스 관련해서 회의 시작할게요. 최근에 배송 지연 클레임이
  좀 늘고 있어서요. [잡음]


  [REDACTED_NAME]2: 네, 맞아요. 특히 오후 늦게 주문한 고객들한테서... 음, 문의가 좀 있었어요. 저희 지금 쓰는 택배사 집하
  마감 시간이랑 좀 안 맞는 것 같아요.


  [REDACTED_NAME]3: 그니까요. 저희가 오후 주문이 거의... 주문 건수가 한 서른... 아니, 한 300개쯤 되나? 암튼 많은데,
  그걸 다 싸서 보내려니까 시간이 뭐 맨날 빠듯하죠.


  [REDACTED_NAME]1: 네, 그래서 알아봤는데, 아... 새로운 업체 쪽에서 오후 4시에 **집하**를 마감하면 당일 출고로 빠르게 처리해
  줄 수 있다고 제안이 왔습니다. 어떻게 생각하세요?


  [REDACTED_NAME]3: 오후 4시요? 아니, 그게 아니라... 너무 이른 거 아닌가요? 저희 보통 5시 주문까지 당일 포장하려고 하는데,
  현실적으로 4시까지 포장을 다 끝내기는 좀...


  [REDACTED_NAME]2: 저도 그게 좀 걱정되네요. 저기, 주문 마감 시간을 앞당기면 고객들 불만이 클 거고. 그렇다고 포장 인력을 갑자기
  늘리기도...


  [REDACTED_NAME]1: 그렇죠. 그래서, 그... 뭐였더라... 아 맞다. 제 생각에는 주문 마감은 그대로 두고요. **오후 4시까지
  포장 완료된 건은 새 업체로 먼저 집하 요청해서 빠른 배송을 보장하고, 그 이후 건들은 기존 업체로 보내는 걸로 이원화**하는 건 어떨까 합니다.
  일단 이렇게 테스트 운영을 해보는 거죠.


  [REDACTED_NAME]3: 아, 그렇게 나누는 거면 괜찮겠네요. 그럼 일단 당일 나가는 물량은 확실히 늘어나니까요. 좋은 방법 같습니다.


  [REDACTED_NAME]1: 좋습니다. 그럼 그렇게 결정하죠. [기침] [REDACTED_NAME]2님, 이 변경된 내용을 바탕으로 **내부
  배송 업무 매뉴얼을 다음 주 월요일까지 업데이트해서 공유**해 주세요.


  [REDACTED_NAME]2: 네, 알겠습니다. 작업해서 바로 공유드리겠습니다.


  [REDACTED_NAME]1: 그리고 [REDACTED_NAME]3님은 새 배송 업체와 계약을 마무리해야 하니, **이번 주 금요일까지 세부
  조건 조율해서 최종 견적서**를 받아주세요.


  [REDACTED_NAME]3: 네, 바로 연락해서 처리하겠습니다. 아, 잠시만요, 다시 말하면... 견적서 받고 계약서 초안까지 검토하면 되는
  거죠?


  [REDACTED_NAME]1: 네, 맞습니다. 그렇게 진행해주세요. 감사합니다. 그럼 오늘 회의는 이걸로 마치겠습니다.'
