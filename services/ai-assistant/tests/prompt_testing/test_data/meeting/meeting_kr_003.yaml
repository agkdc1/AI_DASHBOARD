id: meeting_kr_003
name: 주문 처리 개선 회의
language: ko-KR
transcript: '[REDACTED_NAME]: 자, 그럼... 어... 주문 처리 개선 회의 시작하겠습니다. 다들 아시겠지만 저번 주에 라쿠텐
  쪽에서 클레임이 한 두... 아니, 두 건 있었죠? 출하 지연 문제요.


  [REDACTED_NAME]: 네, 확인했습니다. 그게, 음... 저희가 주문 확인 메일을 수동으로 보내다 보니까, 그러니까... 주문이 몰리는
  시간대에 누락이 된 것 같습니다. 고객이 주문 접수됐는지 문의하시다가 결국 클레임으로 이어진 거고요.


  [REDACTED_NAME]: 역시 수동 처리가 문제였군요. [기침] 지금 절차가 정확히 어떻게 되죠?


  [REDACTED_NAME]: 현재 주문이 들어오면요, 저희가 시스템에서 일일이 확인하고... 어... 템플릿 복사해서 메일을 보내고 있는데,
  피크 타임에는 하루에 30... 아니, 한 50건 정도 되니까 실수가 좀 생기는 것 같아요.


  [REDACTED_NAME]: 으음... 그게 병목 현상이네요. 그래서 말인데, 아예 이참에 **라쿠텐** **주문** 확인 프로세스를 **자동**으로
  처리하는 건 어떨까요?


  [REDACTED_NAME]: 아, 자동화 말씀이시죠? 네, 저도 그게 필요하다고 생각했습니다. 그래서 제가 미리 좀 알아봤는데, 저희가 쓰는
  시스템에서 라쿠텐 API 연동을 지원하더라고요. 뭐, 설정만 좀 손보면 될 것 같습니다.


  [REDACTED_NAME]: 오, 정말요? 다행이네요. 그럼 망설일 이유가 없겠어요. 좋습니다. 그럼 오늘 회의에서 결정하죠. **라쿠텐**에서
  들어오는 **주문**은 확인 메일 발송을 **자동**화하는 것으로. 이걸로 클레임도 줄이고, 뭐... 우리 업무 시간도 아낄 수 있겠죠. [잡음]


  [REDACTED_NAME]: 네, 알겠습니다.


  [REDACTED_NAME]: 그럼 [REDACTED_NAME]씨, 이 작업 바로 좀 맡아주시겠어요? 다음 주... 수요일까지 API 연동 설정을
  완료하는 것을 목표로 부탁드립니다.


  [REDACTED_NAME]: 네, 알겠습니다. 다음 주 수요일까지 완료해서 보고드리겠습니다.


  [REDACTED_NAME]: 좋습니다. 그럼 오늘 회의는 여기까지 하죠. 다들 수고 많으셨습니다.'
expected:
  action_items:
    min_count: 1
  decisions:
    min_count: 1
    contains_keywords:
    - 라쿠텐
    - 주문
    - 자동
  doc_updates:
    min_count: 0
