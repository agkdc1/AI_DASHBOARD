id: meeting_ja_006
name: Quarterly supplier review
language: ja-JP
transcript: '[REDACTED_NAME]：はい、お疲れ様です。えーと、じゃあ時間なんで、四半期のサプライヤーレビュー始めますか。[REDACTED_NAME]さん、いつものA社とB社の状況からお願い。


  [REDACTED_NAME]：はい、お疲れ様です。えー、まずA社ですけど、納期遵守率95%で、品質トラブルもゼロ。まぁ、相変わらず優等生ですね。


  [REDACTED_NAME]：うーん、A社は安心だね。で、問題のB社はどうなってる？


  [REDACTED_NAME]：[咳] はい…。それがですね、あのー、納期遵守率が、えーと、82%...あ、ごめん、80%まで落ち込んでまして。特に先月、特定のエスケーユーで2週間遅れが出て、現場がちょっとバタつきました。


  [REDACTED_NAME]：80%か…また落ちたな。原因は聞いたの？なんか、いつも同じこと言ってない？


  [REDACTED_NAME]：はい、そのー、先方の担当者曰く、また人員不足が…と。改善しますとは言うんですけど、具体的な計画は出てこない状況でして…。


  [REDACTED_NAME]：いや、そうじゃなくて、もっと具体的にどうするのか聞かないとダメだよ。それで、あの…リスクヘッジの話だけど、[REDACTED_NAME]さん、前に調べてもらってたC社、どうなった？


  [REDACTED_NAME]：はい、見積もりは取れてます。価格はB社より、えーっと、3...いや5%くらい安いです。ただ、取引実績がないんで品質面は未知数ですね。[電話の音]


  [REDACTED_NAME]：なるほどね…。いきなり全量切り替えは怖いな。よし、じゃあこれは決定事項にしよう。新規**サプライヤー**の**C社**に、まずは少ロットで**試験発注**をかけます。それで品質と納期対応を見ましょう。


  [REDACTED_NAME]：賛成です。それが現実的ですね。


  [REDACTED_NAME]：じゃあアクションアイテムね。まず[REDACTED_NAME]さん、B社には来週中に改善計画を出すように正式に要求して。アクションアイテム2つ目、[REDACTED_NAME]さんはC社への試験発注のピーオー、PO作成をお願い。あと、忘れないうちに承認サプライヤーリストのドキュメントも、「C社：評価中」で更新しておいてください。


  [REDACTED_NAME]：はい、承知しました。発注とリスト更新、進めておきます。


  [REDACTED_NAME]：よし、じゃあ今日はここまで。皆さん、対応よろしく。お疲れ様でした。'
expected:
  action_items:
    min_count: 2
  decisions:
    min_count: 1
    contains_keywords:
    - サプライヤー
    - C社
    - 試験発注
  doc_updates:
    min_count: 1
