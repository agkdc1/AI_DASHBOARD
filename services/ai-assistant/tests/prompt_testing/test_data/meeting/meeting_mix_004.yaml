id: meeting_mix_004
name: Quality control improvements
language: mixed
transcript: '[REDACTED_NAME]：えーと、じゃあ始めましょうか。先月の品質管理の件、[REDACTED_NAME]さん、報告お願いします。


  [REDACTED_NAME]：네, 바로 보고드리겠습니다. 음… 지난달 최종 불량률이 0.5%로 집계됐습니다. 목표가 0.4%였으니까, 뭐, 조금
  높게 나왔습니다.

  （はい、すぐにご報告します。えーと…先月の最終不良率が0.5%と集計されました。目標が0.4%だったので、まあ、少し高く出ました。）


  [REDACTED_NAME]：0.5%か…うーん、高いな。 [咳] 原因は特定できてます？特に多かった不良って何でしょう。


  [REDACTED_NAME]：네, 확인해 보니까요, B라인 최종 검사에서 미세 흠집 불량이 한 30… 아니, 300개 정도, 전체의 60%를 차지했습니다.
  작업자 간의 판단 기준이… 아니, 그게 아니라, 기준 자체가 좀 모호해서 생긴 문제 같습니다.

  （はい、確認したところ、Bラインの最終検査で微細な傷の不良が30…いや、300個くらい、全体の60%を占めていました。作業者間の判断基準が…いや、そうではなくて、基準自体が少し曖昧で生じた問題のようです。）


  [REDACTED_NAME]：あ、すみません。現場見てても、なんか、人によってOK/NGの判断がバラバラな感じはありますね。あ、ごめん、そうじゃなくて、基準書はあるんですけど、写真が古くて分かりにくいっていう声が…。


  [REDACTED_NAME]：なるほどね。じゃあ基準の見直しが急務か。 [雑音] それで、あの…なんだっけ…ああ、そうそう、対策はどうする？


  [REDACTED_NAME]：찬성입니다. 그럼 새로운 **品質** 목표를 설정하고, 기준을 명확히 하는 게 좋겠습니다。思い切って、来月からの**불량**率は**0.3%**以下を目標にするのはどうでしょうか？


  [REDACTED_NAME]：いいですね、それ。よし、じゃあ**決定事項**として、来月からの不良率目標は**0.3%**以下でいきましょう。それで、[REDACTED_NAME]さんに**アクションアイテム**なんですが、新しい基準を盛り込んだ**品質管理マニュアル**の改訂案、作成をお願いできますか？


  [REDACTED_NAME]：네, 알겠습니다. 그 매뉴얼에 맞춰서 현장에서 쓰는 **검품 체크리스트**도 업데이트하겠습니다. 다음 주 금요일까지
  초안을 ピーディーエフで 공유하겠습니다.

  （はい、承知しました。そのマニュアルに合わせて、現場で使う**検品チェックリスト**も更新します。来週の金曜日までに草案をPDFで共有します。）


  [REDACTED_NAME]：了解です。じゃあ、それでお願いします。'
expected:
  action_items:
    min_count: 1
  decisions:
    min_count: 1
    contains_keywords:
    - 品質
    - 불량
    - 0.3%
  doc_updates:
    min_count: 1
