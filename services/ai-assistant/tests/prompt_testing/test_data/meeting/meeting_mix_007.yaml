id: meeting_mix_007
name: Annual planning kickoff
language: mixed
transcript: '[REDACTED_NAME]：えーと、お疲れ様です。皆さん、集まりましたかね。じゃあ、あのー、来年度のAnnual planning kickoff、始めたいと思います。


  [REDACTED_NAME]：はい、よろしくお願いします。


  [REDACTED_NAME]：네, 안녕하세요. 잘 부탁드립니다.


  [REDACTED_NAME]：早速ですけど、来年の目標ですね。えー、まぁ色々厳しいとは思うんですが、全社目標として、**事業計画**全体の**매출**をですね、前年比**120%**で…いきたいなと。


  [REDACTED_NAME]：ひゃ、120%ですか…！うーん、かなり高いですね。そのー、何か具体的な案はもうあるんですか？ [咳]


  [REDACTED_NAME]：ええ。一番大きいのは新規チャネルの開拓かなと。それで、あの…なんだっけ…ああそうそう、韓国側での展開を強化したい。[REDACTED_NAME]さん、그쪽
  상황 어때요? (そちらの状況どうですか？)


  [REDACTED_NAME]：음... 네. 120% 가려면, 어, 한국 신규 채널이 중요하죠. 지금 후보가 두세 개… 아니, 한 3개 정도 있는데,
  아, 잠깐, 다시 말하면, A몰이랑 B플랫폼이 유력해요. 그러니까 젊은 층 타겟이면 B가 더 나을 것 같습니다. (うーん…はい。120%を目指すなら、えー、韓国の新規チャネルが重要ですね。今候補が2、3個…いや、3個くらいありますが、あ、ちょっと、言い直すと、AモールとBプラットフォームが有力です。なので若年層ターゲットならBの方が良いと思います。)


  [REDACTED_NAME]：なるほど、Bプラットフォームね。ありがとうございます。じゃあ、アクションアイテムとして、[REDACTED_NAME]さんは日本側、[REDACTED_NAME]さんは韓国側で、そのBプラットフォームの初期費用と手数料を、来週…あ、いや、再来週の月曜までにまとめてください。


  [REDACTED_NAME]：承知しました。確か手数料が、えーっと、3...いや5%くらいだったかと記憶してますが、ちゃんと調べます。


  [REDACTED_NAME]：알겠습니다. [電話の音] 아, 죄송합니다. 바로 조사해서 공유할게요. (承知しました。あ、すみません。すぐに調査して共有します。)


  [REDACTED_NAME]：はい、お願いします。じゃあ今日の決定事項として「来年度の**매출**目標は前年比**120%**」で確定します。これを受けて、[REDACTED_NAME]さん、今日の議事録と合わせて、全社共有用の**事業計画**の概要書、あのピーディーエフじゃなくてGoogleドキュメントの方、更新しておいてください。


  [REDACTED_NAME]：はい、かしこまりました。'
