text: 'おつですー。

  ちょっと質問いい？

  例の製品のBOMの件なんだけど、新しい部品表の構成をシステムに登録する手受ってどうやるんだっけ？

  BOMデータはあるんだけど、製品構成として反映させるのを忘れちゃって。教えてくれると助かる！'
