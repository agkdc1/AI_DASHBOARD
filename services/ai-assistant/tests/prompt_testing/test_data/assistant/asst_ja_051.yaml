id: asst_ja_051
name: 'JA assistant #51'
language: ja-JP
question: 送り状の印刷でエラーが出ます。どうすればいいですか。初心者向けに簡単に説明してください。
expected:
  language: ja
  must_contain_any:
  - 送り状
  - 印刷
  - エラー
  must_not_contain:
  - 実行しました
  min_length: 50
text: 'すいません、ちょっといいですか？

  送り状の印刷をしようとしたら、なんかエラーが出ちゃって…。

  このエラーの解決する手受、どうやるんでしたっけ？'
