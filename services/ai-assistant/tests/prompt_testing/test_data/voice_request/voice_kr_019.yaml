text: 어, 저기, 바쁘신데 죄송한데요. 음... 뭐 하나만 좀 부탁드릴게요. [일시정지] 그, 저희 재고 관리하는 InvenTree 있잖아요.
  거기에 어... 새로운 부품을, 아 아니, 부품이 아니라 새로운 카테고리를 하나 추가해야 하거든요. 그러니까... [기침] 아, 죄송합니다. 그
  '전자부품'으로... 아니, '전자부품-커넥터'라는 이름으로요. 뭐, 시간 되실 때 그거 하나만 좀... 네. 부탁드릴게요.
