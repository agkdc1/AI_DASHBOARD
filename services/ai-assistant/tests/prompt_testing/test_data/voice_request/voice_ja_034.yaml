text: あ、[REDACTED_NAME]さん、お疲れ様です。えーと、あのー、ちょっとお願いしたいことがあって。[一時停止] なんか、さっき楽天のほうで、えー、新しい注文が…えーっと、3...いや4件だったかな、入ってたみたいで。そのー、それを確認して、あ、いや、確認っていうか、まぁ、いつもの発送準備まで進めてもらえますか？[雑音]
  それで、あの…そう、急ぎなんだけど、今日の夕方、あ、ごめん、16時ぐらいまでには対応しておいてくれると、そのー、助かります。じゃあ、よろしくねー。
