text: あ、えー、お疲れ様です。[REDACTED_NAME]です。あのー、ちょっとご相談なんですけど、[一時停止] そのー、3階の複合プリンターの件でして。なんか最近、紙詰まりがすごく頻繁で…えーっと、週に３、いや５回くらいかな…それで、あの…業務が止まっちゃうんで、[咳]
  一度業者さんに、あ、違う、メーカーさんか。いや、とにかく業者さんにしっかりとしたメンテナンスをお願いできませんかね。えー、できれば来週の火曜…あ、ごめん、月曜日までにお願いできると、まぁ、大変助かります。よろしくお願いします。[雑音]
