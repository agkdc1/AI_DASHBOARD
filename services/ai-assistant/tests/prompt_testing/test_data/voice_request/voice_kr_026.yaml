text: 어, 저기... 다음 주 회의 때 필요한 자료 좀 부탁드릴게요. 음... [기침] 그러니까, 지난 3분기... 아니, 4분기였나? 아,
  죄송해요, 4분기 매출 자료 중심으로요. 뭐, 그... 저번에 보여주셨던 그 표 있잖아요... 아, 하여튼 그거 중심으로 정리해 주시면 좋을 것
  같아요. [일시정지] 기한은 내일 오전까지... 아니, 오후 3시까지 가능할까요?
