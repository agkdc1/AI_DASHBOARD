id: voice_kr_029
name: 'KR voice it #29'
language: ko-KR
text: 아, 저기... [REDACTED_NAME]인데요. 저희, 어... 그, 사무실에 있는 프린터 있잖아요. 그게 자꾸 용지가, 아 아니,
  용지가 아니라... 그... 뭐랄까... [기침] 토너가 이상한 건지 인쇄가 계속 번져서요. 그래서, 저기... 그 모델명이... 에이치피...
  어... 4... 아니 5천 번대였나? 아무튼, 어... 그거 정비 신청을 좀 해야 할 것 같은데... [일시정지] 혹시, 음... 내일까지...
  아, 아니요, 가급적이면 오늘 중으로 좀 처리 가능할까요? 네, 급해서요. 부탁드립니다.
