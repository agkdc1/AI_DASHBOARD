text: あ、お疲れ様です。[REDACTED_NAME]です。えーと、ちょっとお願いしたいことがあるんですけど。あのー、楽天の方で、なんか新しい注文が、えーっと、3...いや5件だったかな、えー、入ってるみたいで。[咳]
