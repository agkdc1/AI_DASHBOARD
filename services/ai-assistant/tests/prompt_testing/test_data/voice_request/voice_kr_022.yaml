name: 'KR voice orders #22'
language: ko-KR
text: 아, 저기, [REDACTED_NAME] 씨. 그... 라쿠텐 쪽에서 들어온 신규 주문 말인데요, 음, 어제 새로 들어온 게 한 세...
  아니, 다섯 건 정도 있었던 것 같은데, 그거 확인 좀... [일시정지] 아, 네, 그거 확인 좀 부탁드릴게요. 뭐, 이게 좀 급한 주문이라서요,
  그러니까 오늘 중으로 처리 시작... 아, 아니, 확인하고 바로 발주까지 진행해 주시면 좋을 것 같아요. 네, 그럼 잘 부탁드립니다. [잡음]
