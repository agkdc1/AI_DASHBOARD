language: ko-KR
text: 아, [기침] 수고 많으십니다. 저기, 그… 아마존 주문 건 말인데요, 음… 주문 번호가 에스오... 아, 아니 에스케이유로 시작하는 거요.
  그거 결제가 오전에 된 줄 알았는데, 아, 잠깐, 방금 막 확인됐네요. [일시정지] 어, 그래서 그거 바로 출하 준비 시작해 주시면 감사하겠습니다.
  네, 뭐... 부탁드릴게요.
