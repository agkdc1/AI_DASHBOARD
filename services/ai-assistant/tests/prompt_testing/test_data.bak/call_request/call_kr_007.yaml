id: call_kr_007
name: 'KR call #7'
language: ko-KR
text: '여보세요, [REDACTED_NAME]입니다. 수고 많으십니다.

  아, 네, [REDACTED_NAME]님. 수고하십니다.

  다름이 아니라 재고 관련해서 전화드렸는데요, 부품 P-B5678 재고가 많이 줄었습니다.

  아, 그래요? 지금 얼마나 남아있나요?

  네, 현재 20개밖에 남지 않아서요. 다음 주 생산분을 고려하면 추가 발주가 필요할 것 같습니다.

  알겠습니다. 그럼 바로 발주 넣도록 하겠습니다. 100개 정도 추가하면 될까요?

  네, 좋습니다. 잘 부탁드립니다.

  네, 그럼 처리하고 다시 연락드리겠습니다. 들어가세요.

  네, 감사합니다. 실례합니다.'
