id: call_kr_022
name: 'KR call #22'
language: ko-KR
text: 'A: 여보세요, 기술지원팀 [REDACTED_NAME]입니다.

  B: 네, [REDACTED_NAME]님. 수고 많으십니다.

  A: 네, 수고하십니다. 다름이 아니라, **서버** 정기 **유지보수** 관련해서 연락드렸습니다. 다음 주 토요일 새벽으로 일정이 잡혔는데,
  사용자들에게 공지 부탁드립니다.

  B: 아, 네. 알겠습니다. 혹시 시스템 중단 시간은 얼마나 되나요?

  A: 새벽 2시부터 약 3시간 정도 중단될 예정입니다. 괜찮으실까요?

  B: 네, 문제없습니다. 해당 내용으로 바로 공지 올리도록 하겠습니다.

  A: 감사합니다. 그럼 잘 부탁드립니다.

  B: 네, 수고하세요.

  A: 네, 그럼 들어가세요.'
