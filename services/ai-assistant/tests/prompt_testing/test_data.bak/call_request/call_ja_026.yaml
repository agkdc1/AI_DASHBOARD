id: call_ja_026
name: 'JA call #26'
language: ja-JP
text: '発信者: もしもし、[REDACTED_NAME]です。お疲れ様です。


  受信者: あ、[REDACTED_NAME]さん、お疲れ様です。


  発信者: お忙しいところすみません。先日お話ししていた、サーバーのメンテナンスの件でご連絡しました。


  受信者: はい、どうなりましたでしょうか。


  発信者: 日程なんですが、来週の土曜日の夜間で最終調整したいと考えています。その間、システムが数時間停止する見込みです。


  受信者: 土曜日の夜間ですね。承知しました。その日程で問題ありません。


  発信者: ありがとうございます。では、その日程で進めますので、お手数ですが関係部署とユーザーへの事前通知をお願いしてもよろしいでしょうか。


  受信者: はい、承知いたしました。すぐに通知文を作成して展開します。


  発信者: 助かります。では、また詳細はメールで共有しますね。


  受信者: はい、お待ちしております。


  発信者: では、失礼します。


  受信者: お疲れ様です。失礼します。'
expected:
  valid_json_keys:
  - title
  - description
  - due_date
  - priority
  - decisions
  title_contains:
  - メンテナンス
  - サーバー
