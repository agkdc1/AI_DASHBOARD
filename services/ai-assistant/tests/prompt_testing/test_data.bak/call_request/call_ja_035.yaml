id: call_ja_035
name: 'JA call #35'
language: ja-JP
text: 'お疲れ様です、[REDACTED_NAME]です。


  お疲れ様です、[REDACTED_NAME]です。


  すみません、今ちょっとよろしいですか？本日出荷分の**送り状**の件でして、システム上でいくつか**エラー**が出ているみたいなんです。


  あ、そうなんですね。ちなみに原因はわかりますか？


  はい、3件ほど出てまして、どうも住所の入力不備が原因のようです。お手数ですが、そちらで内容を確認して修正をお願いできますでしょうか。


  **はい**、承知しました。すぐに確認して修正します。データは共有フォルダのままで大丈夫ですか？


  はい、そちらのデータでお願いします。今日の集荷に間に合わせたいので、なるべく急いでいただけると助かります。


  かしこまりました。すぐに対応します。


  **では**、よろしくお願いします。**失礼します**。


  はい、**失礼します**。'
