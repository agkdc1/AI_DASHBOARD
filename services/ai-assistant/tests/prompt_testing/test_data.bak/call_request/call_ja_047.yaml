id: call_ja_047
name: 'JA call #47'
language: ja-JP
text: '[受信者]: はい、[REDACTED_NAME]です。

  [発信者]: もしもし、[REDACTED_NAME]です。お疲れ様です。

  [受信者]: あ、お疲れ様です。

  [発信者]: 今ちょっとよろしいですか？来月のフォークリフトの定期点検の件なんですけど。

  [受信者]: はい、大丈夫です。

  [発信者]: 業者さんの日程が決まりまして、来月の第一週、水曜日に来てもらうことになりました。つきましては、事前に現場のほうで点検リストに沿って確認をお願いしたいのですが。

  [受信者]: はい、承知しました。来月第一週の水曜ですね。リストを確認して、何かあれば前日までに連絡すればよろしいですか？

  [発信者]: はい、そのようにお願いします。もし不具合があれば、先に業者へ伝えておきたいので。

  [受信者]: 了解です。では、そのように対応します。

  [発信者]: 助かります。では、よろしくお願いします。失礼します。

  [受信者]: はい、失礼します。'
