id: call_kr_025
name: 'KR call #25'
language: ko-KR
text: 'A: 여보세요, 기획팀 [REDACTED_NAME]입니다.

  B: 아, [REDACTED_NAME]님 안녕하세요. 시스템팀 [REDACTED_NAME]입니다.

  A: 네, 수고하십니다. 무슨 일이시죠?

  B: 다름이 아니라, 정기 **서버** **유지보수** 건으로 연락드렸습니다. 다음 주 토요일 새벽 2시부터 6시까지로 일정이 잡혔는데, 그동안
  시스템 접속이 안 될 예정입니다.

  A: 아, 다음 주 토요일 새벽이요. 알겠습니다. 문제없습니다.

  B: 네, 감사합니다. 그럼 사용자분들께 사전 공지 좀 부탁드려도 될까요?

  A: 네, 알겠습니다. 제가 바로 공지 올리도록 하겠습니다.

  B: 감사합니다. 그럼 잘 부탁드립니다.

  A: 네, 알겠습니다.

  B: 그럼 끊겠습니다. 실례합니다.

  A: 네, 수고하세요.'
expected:
  valid_json_keys:
  - title
  - description
  - due_date
  - priority
