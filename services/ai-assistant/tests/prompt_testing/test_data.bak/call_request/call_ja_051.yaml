text: 'はい、もしもし、[REDACTED_NAME_A]です。お疲れ様です。

  お疲れ様です、[REDACTED_NAME_B]です。どうしましたか？

  すみません、緊急で。本日出荷分の**SKU-Z300**なんですが、製造ラインで**不良品**が確認されまして。もしかしたら、既に出荷された分にも混じっているかもしれません。

  え、本当ですか？それは大変だ。

  はい。つきましては、すぐに出荷を全面ストップしていただけますか？

  はい、承知しました。今すぐ止めます。すでに出てしまった分はどうしましょうか？

  ありがとうございます。そちらは私がリストアップして顧客に連絡します。代替品の手配も進めますので。

  了解です。では、こちらは出荷停止を最優先で対応します。

  助かります。では、よろしくお願いします。失礼します。

  はい、失礼します。'
