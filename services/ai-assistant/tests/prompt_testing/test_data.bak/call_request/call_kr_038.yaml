id: call_kr_038
name: 'KR call #38'
language: ko-KR
text: '[REDACTED_NAME] (발신자): 여보세요, [REDACTED_NAME]입니다. 수고 많으십니다.


  [REDACTED_NAME] (수신자): 네, [REDACTED_NAME]입니다. 수고하십니다. 무슨 일이시죠?


  [REDACTED_NAME] (발신자): 긴급하게 드릴 말씀이 있습니다. 방금 출하된 **SKU-Z300** 제품에 **불량품**이 포함되었다는
  보고가 있었습니다.


  [REDACTED_NAME] (수신자): 네? 알겠습니다. 그럼 어떻게 조치할까요?


  [REDACTED_NAME] (발신자): 즉시 출하를 중지하고, 고객사에 연락해서 상황을 설명해 주세요. 대체품 수배도 바로 시작해야 합니다.


  [REDACTED_NAME] (수신자): 네, 알겠습니다. 바로 처리하겠습니다.


  [REDACTED_NAME] (발신자): 그럼 부탁드립니다. 자세한 내용은 메일로 보내겠습니다.


  [REDACTED_NAME] (수신자): 네, 확인하겠습니다. 그럼 이만 실례하겠습니다.'
