id: call_ja_012
name: 'JA call #12'
language: ja-JP
text: 'はい、[REDACTED_NAME]です。


  お疲れ様です、[REDACTED_NAME]です。今お時間よろしいでしょうか？


  はい、大丈夫ですよ。


  ありがとうございます。部品**P-A1234**の**在庫**の件でご相談なんですが、先ほど確認しましたら残り50個を切っていまして。来週の生産を考えると、早めに手配した方が良いかと思いまして。


  ああ、P-A1234ですね。承知しました。もうそんなに少ないんですね。


  つきましては、200個ほど追加発注をお願いしたいのですが、いかがでしょうか。


  **はい**、わかりました。すぐに手配しましょう。**では**、[REDACTED_NAME]さんの方で発注書を作成して、回してもらえますか？


  承知いたしました。すぐに作成します。よろしくお願いいたします。


  はい、お願いします。


  **失礼します**。


  お疲れ様です。'
