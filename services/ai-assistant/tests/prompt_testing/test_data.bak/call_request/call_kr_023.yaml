id: call_kr_023
name: 'KR call #23'
language: ko-KR
text: '여보세요, 시스템팀 [REDACTED_NAME]입니다.

  아, 네, [REDACTED_NAME] 과장님. 수고 많으십니다.

  네, 수고하십니다. 다름이 아니라 정기 **서버** **유지보수** 건으로 연락드렸습니다.

  아, 네네. 일정이 잡혔나요?

  네, 다음 주 토요일 새벽 2시부터 5시까지로 확정되었습니다. 작업 시간 동안 시스템 접속이 안 될 예정이라, 사용자분들께 사전 공지를 좀 부탁드립니다.

  다음 주 토요일 새벽 2시부터 5시요. 알겠습니다. 바로 공지 올리겠습니다.

  네, 감사합니다. 그럼 잘 부탁드립니다.

  네, 들어가세요.'
expected:
  valid_json_keys:
  - title
  - description
  - due_date
  - priority
  - decisions
  title_contains:
  - 유지보수
  - 서버
