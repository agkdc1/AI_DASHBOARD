text: 'もしもし、[REDACTED_NAME]です。お疲れ様です。


  お疲れ様です。[REDACTED_NAME]です。どうされましたか？


  すみません、ちょっと緊急でして。本日発送分で、品番**SKU-Y200**の一部に**不良品**が混ざって出荷されてしまった可能性があるんです。すぐに出荷を停止していただくことはできますでしょうか？


  えっ、本当ですか！？ 承知しました、すぐ確認します。…はい、まだ物流センターにあるようです。止められます！


  よかったです。では、すぐに出荷停止をお願いします。併せて、該当のお客様へのご連絡と、代替品の手配も進めていただけますか？


  **はい**、承知しました。こちらで対応して、状況を改めてご報告します。


  助かります。では、よろしくお願いします。失礼します。


  失礼します。'
