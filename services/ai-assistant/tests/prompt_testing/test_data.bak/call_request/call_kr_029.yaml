id: call_kr_029
name: 'KR call #29'
language: ko-KR
text: 'A: 여보세요, [REDACTED_NAME]입니다.

  B: 네, [REDACTED_NAME] 대리님. 수고 많으십니다.

  A: 네, 수고하십니다. 다름이 아니라 오늘 출하 건의 운송장 관련해서 연락드렸습니다.

  B: 아, 운송장이요? 무슨 문제 있었나요?

  A: 네, 배송 주소 정보에 오류가 두 건 발견되었습니다. 제가 방금 메일로 상세 내용을 보내드렸으니 확인 후 수정 부탁드립니다.

  B: 네, 알겠습니다. 지금 바로 확인하고 처리하겠습니다.

  A: 감사합니다. 그럼 부탁드립니다.

  B: 네, 수고하세요.'
