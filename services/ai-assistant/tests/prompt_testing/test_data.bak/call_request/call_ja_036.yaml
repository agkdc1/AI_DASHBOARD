id: call_ja_036
name: 'JA call #36'
language: ja-JP
text: 'はい、[REDACTED_NAME]です。


  お疲れ様です、[REDACTED_NAME]です。今、少しお時間よろしいでしょうか？


  はい、お疲れ様です。大丈夫ですよ。


  ありがとうございます。先ほど出荷チームから連絡がありまして、本日発送分のデータで作成した**送り状**のうち、数件で**エラー**が出ているとのことなんです。


  あ、本当ですか。どのような内容でしょう？


  はい、住所情報が不完全という理由でシステムから弾かれてしまったものが3件あるようです。大変恐縮なのですが、至急ご確認いただき、修正をお願いできますでしょうか。


  はい、承知いたしました。すぐに共有フォルダを確認して修正します。


  助かります。今日の最終集荷に間に合わせたいので、何卒よろしくお願いいたします。修正後、ご一報いただけますか。


  はい、わかりました。では、取り急ぎ失礼します。


  よろしくお願いいたします。失礼します。'
expected:
  valid_json_keys:
  - title
  - description
  - due_date
  - priority
  - decisions
  title_contains:
  - 送り状
  - エラー
