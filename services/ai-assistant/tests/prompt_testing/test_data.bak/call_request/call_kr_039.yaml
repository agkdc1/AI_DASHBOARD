id: call_kr_039
name: 'KR call #39'
language: ko-KR
text: '수신자: 여보세요, [REDACTED_NAME]입니다.

  발신자: 아, [REDACTED_NAME] 팀장님. 수고 많으십니다. 저 [REDACTED_NAME]입니다. 지금 잠깐 통화 괜찮으세요?

  수신자: 네, 괜찮습니다. 무슨 일이시죠?

  발신자: 긴급하게 연락드렸습니다. **SKU-W400** 제품에 **불량품**이 섞여서 이미 출하된 것 같다는 연락을 받았습니다.

  수신자: 네? 정말입니까? 알겠습니다.

  발신자: 즉시 해당 제품 출하를 중지해 주시고, 이미 나간 물량에 대해서는 고객 연락을 저희가 진행하겠습니다. 대체품 재고도 확인 부탁드립니다.

  수신자: 네, 알겠습니다. 바로 출하 중지하고 재고 확인해서 다시 연락드리겠습니다.

  발신자: 감사합니다. 그럼 잘 부탁드립니다. 실례하겠습니다.

  수신자: 네, 들어가세요.'
