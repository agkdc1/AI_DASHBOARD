id: call_kr_037
name: 'KR call #37'
language: ko-KR
text: '여보세요, [REDACTED_NAME]입니다. 수고 많으십니다.


  네, [REDACTED_NAME] 팀장님. 수고하십니다. 무슨 일이십니까?


  긴급한 일로 연락드렸습니다. 다름이 아니라 **SKU-Y200** 제품에 문제가 생겼습니다. 오늘 출하된 물량 중에 **불량품**이 섞여 나간
  것으로 확인됐습니다.


  네? 알겠습니다. 상황이 심각하군요.


  네, 그래서 즉시 출하를 중지시켜 주시고, 고객사에도 바로 연락해서 상황 설명 및 사과를 부탁드립니다. 제가 지금 대체품을 수배하고 있으니, 그
  내용도 전달해 주십시오.


  알겠습니다. 그럼 제가 즉시 출하를 중단시키고 고객에게 연락하도록 하겠습니다.


  네, 부탁드립니다. 그럼 처리 후 다시 연락 주세요. 실례하겠습니다.


  네, 알겠습니다. 수고하십시오.'
