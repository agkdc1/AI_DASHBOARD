id: call_kr_024
name: 'KR call #24'
language: ko-KR
text: '네, [REDACTED_NAME]입니다.

  여보세요? 아, [REDACTED_NAME] 팀장님. 수고 많으십니다.

  네, 수고하십니다. 다름이 아니라, 서버 유지보수 관련해서 연락드렸습니다.

  아, 네. 말씀하세요.

  다음 주 토요일 새벽에 정기 서버 유지보수 작업이 예정되어 있습니다. 작업 시간 동안 시스템 접속이 중단될 예정이라, 미리 팀원분들께 공지 좀
  부탁드립니다.

  네, 알겠습니다. 중단 시간은 어떻게 되나요?

  새벽 1시부터 5시까지, 총 4시간입니다.

  네, 확인했습니다. 새벽 1시부터 5시. 바로 공지하도록 하겠습니다.

  감사합니다. 그럼 잘 부탁드립니다.

  네, 수고하세요.

  네, 그럼 이만 끊겠습니다.'
expected:
  valid_json_keys:
  - title
  - description
  - due_date
  - priority
  - decisions
  title_contains:
  - 유지보수
  - 서버
  priority_range:
  - 2
  - 4
  has_decisions: true
