text: 'もしもし、お疲れ様です。[REDACTED_NAME]です。今、少しよろしいでしょうか。


  あ、[REDACTED_NAME]さん、お疲れ様です。はい、大丈夫ですよ。


  ありがとうございます。在庫の件でご相談なんですが、部品のP-C9012です。そろそろ在庫が少なくなってきているかと思いまして。


  ああ、P-C9012ですね。確認します…はい、おっしゃる通りで、残り50個を切っていますね。


  そうですか。来週の生産計画を考えると、早めに200個ほど追加発注をお願いしたいのですが、いかがでしょうか。


  はい、承知いたしました。200個ですね。急ぎで手配します。では、こちらで発注書を作成しておきます。


  助かります。よろしくお願いいたします。では、失礼いたします。


  はい、お疲れ様です。失礼します。'
