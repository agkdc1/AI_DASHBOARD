id: call_ja_031
name: 'JA call #31'
language: ja-JP
text: '（プルルル…）


  受信者: 「はい、物流部の[REDACTED_NAME]です。」


  発信者: 「お疲れ様です、営業の[REDACTED_NAME]です。今、少しお時間よろしいでしょうか？」


  受信者: 「お疲れ様です。はい、大丈夫ですよ。」


  発信者: 「ありがとうございます。先ほどお送りした本日発送分のデータなのですが、システム上で**送り状**を印刷しようとしたところ、3件ほど**エラー**で弾かれてしまいまして。」


  受信者: 「あ、本当ですか。こちらでも確認しますね。…ああ、確かに。おそらく[REDACTED_ADDRESS]の住所が不完全なのが原因かもしれませんね。」


  発信者: 「はい、おそらく。今、お客様に確認が取れましたので、修正したデータを再送付します。そちらで差し替えをお願いできますでしょうか。」


  受信者: 「**はい**、承知いたしました。新しいデータが届き次第、すぐに再発行します。」


  発信者: 「助かります。では、すぐにお送りしますので、よろしくお願いいたします。」


  受信者: 「承知しました。では、失礼いたします。」


  発信者: 「失礼いたします。」'
expected:
  valid_json_keys:
  - title
  - description
  - due_date
  - priority
  - decisions
  title_contains:
  - 送り状
  - エラー
  priority_range:
  - 3
  - 4
  has_decisions: true
