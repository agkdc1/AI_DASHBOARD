id: call_kr_005
name: 'KR call #5'
language: ko-KR
text: '여보세요?

  네, [REDACTED_NAME]입니다.

  아, [REDACTED_NAME] 과장님, 안녕하세요. 영업팀 [REDACTED_NAME]입니다. 수고 많으십니다.

  네, [REDACTED_NAME] 대리님. 수고하십니다. 무슨 일이세요?

  다름이 아니라, 주문 번호 SO-2026-0456 관련해서 문의드렸습니다. 혹시 이 건 오늘 출하 가능할지 확인 부탁드려도 될까요?

  SO-2026-0456이요. 잠시만요... (잠시 후) 네, 확인했습니다. 오늘 오후 출하 예정으로 잡혀 있네요.

  아, 그렇군요. 혹시 가능하면 오전에 바로 출하 처리해주실 수 있을까요? 고객사에서 좀 급하게 요청해서요.

  오전에요... 알겠습니다. 제가 물류팀에 요청해서 최대한 오늘 오전 중으로 처리하도록 하겠습니다.

  네, 정말 감사합니다! 그럼 잘 부탁드립니다.

  네, 알겠습니다. 수고하세요.

  네, 들어가세요.'
