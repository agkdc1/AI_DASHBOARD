id: call_ja_034
name: 'JA call #34'
language: ja-JP
text: '（電話の呼び出し音）


  受信者: 「はい、業務部の[REDACTED_NAME]です。」


  発信者: 「お疲れ様です。営業の[REDACTED_NAME]です。今、少しよろしいでしょうか？」


  受信者: 「はい、お疲れ様です。大丈夫ですよ。」


  発信者: 「ありがとうございます。本日出荷分の**送り状**の件でして、システムでデータを取り込んだ際に3件ほど**エラー**が出てしまったんです。」


  受信者: 「あ、本当ですか。申し訳ありません。原因はわかりますか？」


  発信者: 「はい、おそらく住所データが不完全なためかと思われます。対象の管理番号を今からチャットでお送りしますので、元データを確認して修正をお願いできますでしょうか。」


  受信者: 「はい、承知いたしました。すぐに確認して修正します。」


  発信者: 「助かります。集荷の時間が迫っていますので、お手数ですが、よろしくお願いします。では、失礼します。」


  受信者: 「はい、承知しました。失礼します。」'
expected:
  valid_json_keys:
  - title
  - description
  - due_date
  - priority
  - decisions
  title_contains:
  - 送り状
  - エラー
  priority_range:
  - 3
  - 4
  has_decisions: true
