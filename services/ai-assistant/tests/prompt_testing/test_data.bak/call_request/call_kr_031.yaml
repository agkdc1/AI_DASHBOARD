id: call_kr_031
name: 'KR call #31'
language: ko-KR
text: '[REDACTED_NAME]A: 여보세요?

  [REDACTED_NAME]B: 네, 재고관리팀 [REDACTED_NAME]입니다.

  [REDACTED_NAME]A: 아, [REDACTED_NAME] 대리님, 수고 많으십니다. 영업부 [REDACTED_NAME]입니다. 지금 통화
  괜찮으신가요?

  [REDACTED_NAME]B: 네, [REDACTED_NAME] 씨, 괜찮습니다. 무슨 일이시죠?

  [REDACTED_NAME]A: 다름이 아니라, 신상품 NP-2026의 재고 등록을 좀 부탁드리려고 전화드렸습니다.

  [REDACTED_NAME]B: 아, NP-2026 말씀이시군요. 네, 어떻게 해드릴까요?

  [REDACTED_NAME]A: 네, 저희 재고 관리 시스템에 새 카테고리를 만들어서, 초회 입고분 10개를 등록해 주시면 감사하겠습니다.

  [REDACTED_NAME]B: 네, 알겠습니다. 신규 카테고리 생성 후 NP-2026 초회분 10개 재고 등록, 맞으시죠? 확인하고 바로 처리해
  드리겠습니다.

  [REDACTED_NAME]A: 네, 맞습니다. 그럼 부탁드리겠습니다. 감사합니다.

  [REDACTED_NAME]B: 알겠습니다. 그럼 들어가세요.

  [REDACTED_NAME]A: 네, 수고하세요.'
