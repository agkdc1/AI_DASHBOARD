id: call_ja_029
name: 'JA call #29'
language: ja-JP
text: '（プルルル…ガチャ）


  受信者: 「はい、[REDACTED_NAME]です。」


  発信者: 「お疲れ様です、システム部の[REDACTED_NAME]です。今、少しよろしいでしょうか？」


  受信者: 「あ、お疲れ様です。[REDACTED_NAME]さん。はい、大丈夫ですよ。」


  発信者: 「ありがとうございます。先日お話ししていた、**サーバー**の**メンテナンス**の件ですが、日程を来週の土曜日の深夜で進めたいと考えております。」


  受信者: 「土曜日ですね。承知しました。時間は何時ごろになりそうですか？」


  発信者: 「午前1時から5時頃を予定しています。その間システムが停止しますので、事前に皆さんへのご周知をお願いできますでしょうか。」


  受信者: 「はい、承知いたしました。では、その日程で部署内に共有しておきます。」


  発信者: 「助かります。では、また詳細はメールいたします。失礼します。」


  受信者: 「はい、よろしくお願いします。失礼します。」'
expected:
  valid_json_keys:
  - title
  - description
  - due_date
  - priority
  - decisions
  title_contains:
  - メンテナンス
  - サーバー
  priority_range:
