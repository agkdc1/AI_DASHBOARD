id: call_ja_010
name: 'JA call #10'
language: ja-JP
text: '**受信者:** 「はい、購買部の[REDACTED_NAME]です。」

  **発信者:** 「お疲れ様です、製造部の[REDACTED_NAME]です。今少しよろしいでしょうか？」

  **受信者:** 「はい、お疲れ様です。大丈夫ですよ。」

  **発信者:** 「ありがとうございます。先程、システムで確認したのですが、部品番号P-D3456の在庫がかなり少なくなっているようでして。来週の生産で必要になるので、至急50個ほど追加発注をお願いしたいのですが、可能でしょうか？」

  **受信者:** 「ああ、P-D3456ですね。確認します…はい、確かに残りわずかですね。承知しました。急ぎで手配します。」

  **発信者:** 「助かります。ありがとうございます。」

  **受信者:** 「では、後ほど正式な発注書をシステム経由で申請いただけますか？」

  **発信者:** 「はい、承知いたしました。すぐに作成します。では、よろしくお願いします。」

  **受信者:** 「はい。失礼いたします。」

  **発信者:** 「失礼します。」'
