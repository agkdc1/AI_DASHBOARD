id: call_ja_060
name: 'JA call #60'
language: ja-JP
text: 'はい、[REDACTED_NAME]です。


  お疲れ様です、[REDACTED_NAME]です。今、少しよろしいでしょうか？


  はい、大丈夫ですよ。


  ありがとうございます。来月の棚卸しの件でご相談なんですが、全体のスケジュールを来月第一週で組みたいと考えています。具体的にはA棟を月曜、B棟を火曜で進めたいのですが、ご都合いかがでしょうか？


  はい、承知いたしました。その日程で問題ありません。


  よかったです。では、そのスケジュールで進めますので、各棟の担当者の割り当てを来週の金曜日までにお願いできますか。あと、それに合わせて棚卸しマニュアルの更新もお願いします。


  はい、承知しました。担当者を決めて、マニュアルも更新しておきます。


  助かります。では、よろしくお願いいたします。


  はい。失礼いたします。


  失礼します。'
