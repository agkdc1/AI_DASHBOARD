id: call_kr_040
name: 'KR call #40'
language: ko-KR
text: '발신자: [REDACTED_NAME]A

  수신자: [REDACTED_NAME]B


  [REDACTED_NAME]B: 여보세요?

  [REDACTED_NAME]A: 아, [REDACTED_NAME]B씨. 저 [REDACTED_NAME]A입니다. 수고하십니다.

  [REDACTED_NAME]B: 네, 안녕하세요. 무슨 일 있으세요?

  [REDACTED_NAME]A: 네, 긴급한 일로 전화드렸습니다. 어제 출고된 SKU-X100 제품 중에 불량품 일부가 섞여서 나간 것 같습니다.

  [REDACTED_NAME]B: 네? 알겠습니다. 그럼 어떻게 할까요?

  [REDACTED_NAME]A: 우선 지금 나갈 물량부터 즉시 출하를 중지해 주시고, 이미 발송된 고객사 리스트를 확인해서 바로 연락 부탁드립니다.

  [REDACTED_NAME]B: 네, 알겠습니다. SKU-X100 출하 중단하고 바로 연락 조치하겠습니다. 대체품도 바로 준비할까요?

  [REDACTED_NAME]A: 네, 재고 확인해서 바로 수배해주세요.

  [REDACTED_NAME]B: 알겠습니다. 그럼 처리 후 다시 보고드리겠습니다.

  [REDACTED_NAME]A: 그럼 부탁드립니다.

  [REDACTED_NAME]B: 네, 들어가세요.'
