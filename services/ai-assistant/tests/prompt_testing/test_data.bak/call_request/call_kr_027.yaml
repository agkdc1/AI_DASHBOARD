id: call_kr_027
name: 'KR call #27'
language: ko-KR
text: '여보세요, 수고하십니다.

  네, 수고 많으십니다.

  다름이 아니라 오늘 출하 건 관련해서요. **운송장**을 발행하는데 데이터 **오류**가 2건 발생했습니다.

  아, 네. 어떤 내용인가요?

  주소 정보가 불완전한 것 같아요. [REDACTED_NAME] 님 앞으로 가는 건인데, 주소 확인 후 수정 좀 부탁드립니다.

  네, 알겠습니다. 데이터 확인하고 바로 수정하겠습니다. 그럼 수정 후 다시 연락드릴까요?

  아뇨, 수정해서 바로 출하 진행해 주시면 됩니다.

  네, 그렇게 처리하겠습니다.

  그럼 부탁드립니다. 실례하겠습니다.

  네, 들어가세요.'
expected:
  valid_json_keys:
  - title
  - description
  - due_date
  - priority
  - decisions
  title_contains:
  - 운송장
  - 오류
