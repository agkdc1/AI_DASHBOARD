id: call_kr_002
name: 'KR call #2'
language: ko-KR
text: '**発信者:** 여보세요, 영업팀 [REDACTED_NAME]입니다.


  **受信者:** 네, [REDACTED_NAME]입니다. 수고 많으십니다.


  **発信者:** 아, 과장님, 안녕하세요. 다름이 아니라 주문 번호 **SO-2024-5678** 건 때문에 전화드렸습니다. 고객사에서 좀 급하다고
  하셔서요. 혹시 오늘 **출하**가 가능할지 여쭤보려고요.


  **受信者:** SO-2024-5678이요? 잠시만요, 재고 확인 좀 해보겠습니다. ...네, 가능합니다. 마침 오전에 포장까지 다 끝난 상태네요.


  **発信者:** 아, 정말요? 다행입니다! 그럼 바로 진행 부탁드려도 될까요?


  **受信者:** 네, 알겠습니다. 그럼 오늘 오후 첫 집하便으로 바로 내보내겠습니다.


  **発信者:** 네, 감사합니다! 그럼 잘 부탁드립니다. 들어가세요.


  **受信者:** 네, 수고하세요.'
expected:
  valid_json_keys:
  - title
  - description
  - due_date
  - priority
  - decisions
  title_contains:
  - SO-2024-5678
  - 출하
