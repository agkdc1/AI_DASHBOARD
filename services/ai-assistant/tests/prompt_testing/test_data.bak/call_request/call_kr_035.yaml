language: ko-KR
text: '여보세요, [REDACTED_NAME]입니다. 수고 많으십니다.

  네, [REDACTED_NAME]님. 수고하십니다. 무슨 일이세요?

  다름이 아니라 신상품 NP-2027의 재고 등록 때문에 전화드렸습니다.

  아, 네. 말씀하세요.

  InvenTree에 새 카테고리를 만들고 초회 로트 20개를 재고 등록해 주시겠어요?

  네, 알겠습니다. NP-2027 카테고리 새로 만들고 20개 등록하면 되는 거죠?

  네, 맞습니다. 바로 처리 부탁드립니다.

  알겠습니다. 처리하고 다시 연락드리겠습니다.

  네, 감사합니다. 그럼 들어가세요.

  네.'
