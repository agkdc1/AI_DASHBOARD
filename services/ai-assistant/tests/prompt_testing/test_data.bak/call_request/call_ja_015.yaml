id: call_ja_015
name: 'JA call #15'
language: ja-JP
text: '受信者: 「はい、営業部の[REDACTED_NAME]です。」


  発信者: 「お疲れ様です、[REDACTED_NAME]です。今、少しよろしいですか？」


  受信者: 「お疲れ様です。はい、大丈夫です。」


  発信者: 「ありがとうございます。実は、最近の楽天からの注文処理の件でご相談がありまして。お客様からの問い合わせが少し増えているようなんです。」


  受信者: 「ああ、そうなんですね。何か問題が？」


  発信者: 「はい。そこで一度、現在の処理フローを見直したいと考えています。来週あたりに、打ち合わせの時間をいただけないでしょうか。」


  受信者: 「承知しました。来週ですね、大丈夫です。」


  発信者: 「助かります。では、その時までに、現状の問題点や気づいたことを簡単にまとめておいていただけますか？」


  受信者: 「はい、わかりました。まとめておきます。」


  発信者: 「ありがとうございます。では、また日程調整の連絡をしますね。失礼します。」


  受信者: 「はい、お待ちしております。失礼いたします。」'
expected:
  valid_json_keys:
  - title
  - description
  - due_date
  - priority
  - decisions
  title_contains:
  - 楽天
  - 注文
  priority_range:
  - 2
  - 4
  has_decisions: true
