id: call_kr_030
name: 'KR call #30'
language: ko-KR
text: '**수신자:** 여보세요, 물류팀 [REDACTED_NAME]입니다.

  **발신자:** 아, [REDACTED_NAME] 대리님, 수고하십니다. 영업팀 [REDACTED_NAME]입니다.

  **수신자:** 네, 팀장님. 수고 많으십니다. 무슨 일이십니까?

  **발신자:** 다름이 아니라, 오늘 출고 건의 운송장 관련해서 연락드렸습니다. 방금 확인해 보니 시스템에 오류가 2건 발생한 것 같습니다.

  **수신자:** 아, 정말요? 원인이 뭘로 나오나요?

  **발신자:** 주소 정보가 불충분해서 반송된 것으로 보입니다. 제가 해당 운송장 번호를 지금 바로 메신저로 보내드릴 테니, 확인하고 수정 좀
  부탁드립니다.

  **수신자:** 네, 알겠습니다. 바로 확인해서 처리하도록 하겠습니다.

  **발신자:** 감사합니다. 그럼 잘 부탁드립니다.

  **수신자:** 네, 들어가세요.'
expected:
  valid_json_keys:
  - title
  - description
  - due_date
  - priority
  - decisions
  title_contains:
  - 운송장
  - 오류
  priority_range:
  - 3
  - 4
  has_decisions: true
