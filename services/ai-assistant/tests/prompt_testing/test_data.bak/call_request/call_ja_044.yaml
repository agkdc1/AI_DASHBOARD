language: ja-JP
text: 'もしもし、[REDACTED_NAME]です。お疲れ様です。


  お疲れ様です。[REDACTED_NAME]です。


  今ちょっといいかな？来月のフォークリフトの定期点検の件で連絡しました。業者さんの日程が来月第一週の火曜で確定したので、連絡しておこうと思って。


  ああ、はい。承知しました。来月第一火曜ですね。


  それで、事前に現場で確認しておいてほしい項目をリストにして送るんだけど、もし何か不具合とか気になるところがあれば、それに追記しておいてもらえますか？


  はい、わかりました。リストを確認して、事前に見ておきます。


  助かります。じゃあ、またリスト送ったら連絡しますね。よろしくお願いします。


  はい、承知しました。では、失礼します。


  失礼します。'
