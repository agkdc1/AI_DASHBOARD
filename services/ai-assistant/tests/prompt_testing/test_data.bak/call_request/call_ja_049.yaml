id: call_ja_049
name: 'JA call #49'
language: ja-JP
text: '（電話の呼び出し音）


  **受信者:** はい、物流部の[REDACTED_NAME]です。


  **発信者:** お疲れ様です、営業の[REDACTED_NAME]です。今、少しよろしいですか？


  **受信者:** [REDACTED_NAME]さん、お疲れ様です。はい、大丈夫ですよ。


  **発信者:** すみません、ちょっと緊急でして。先ほど納品した商品、**SKU-X100**なんですが、お客様から一部に**不良品**が混じっていたと連絡が入りまして…。


  **受信者:** えっ、本当ですか！？申し訳ありません。すぐ確認します。それで、どうしましょうか。


  **発信者:** はい。まだ出荷していない同じロットの在庫があれば、至急すべて出荷停止をお願いしたいんです。


  **受信者:** 承知いたしました。すぐに関連部署に連絡してラインを止めます。お客様への連絡と代替品の手配は、こちらで進めてよろしいですか？


  **発信者:** はい、お願いします。助かります。では、また進捗を教えてください。


  **受信者:** かしこまりました。では、取り急ぎ失礼します。


  **発信者:** 失礼します。'
