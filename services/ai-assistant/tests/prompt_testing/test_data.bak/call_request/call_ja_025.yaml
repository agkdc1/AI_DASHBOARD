id: call_ja_025
name: 'JA call #25'
language: ja-JP
text: 'はい、営業部の[REDACTED_NAME]です。

  お疲れ様です。システム部の[REDACTED_NAME]です。今、少しお時間よろしいでしょうか？

  あ、[REDACTED_NAME]さん、お疲れ様です。はい、大丈夫ですよ。

  ありがとうございます。来週の**サーバー**の定期**メンテナンス**の件でご連絡しました。日程が来週の土曜深夜、午前2時から5時の間で確定しました。

  承知しました。土曜の夜間ですね。その間はシステムが完全に停止するという認識で合っていますか？

  はい、その通りです。つきましては、営業部からお客様への事前告知をお願いしたいのですが、ご対応は可能でしょうか？

  はい、承知いたしました。こちらで案内文を作成し、今週中に通知しておきます。

  ありがとうございます、助かります。では、詳細はこの後メールでもお送りしますね。よろしくお願いします。

  承知しました。では、失礼します。

  失礼します。'
