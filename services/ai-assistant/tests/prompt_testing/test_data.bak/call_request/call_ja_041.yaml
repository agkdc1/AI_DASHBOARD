id: call_ja_041
name: 'JA call #41'
language: ja-JP
text: '（電話の呼び出し音）


  受信者: はい、[REDACTED_NAME]です。

  発信者: もしもし、お疲れ様です。[REDACTED_NAME]です。今、少しよろしいですか？

  受信者: はい、お疲れ様です。大丈夫です。

  発信者: ありがとう。ちょっとお願いしたいことがあって。例の新商品、NP-2027の件なんだけど。

  受信者: はい。

  発信者: InvenTreeへの在庫登録をお願いしたいんだ。まだカテゴリーがないから、新しく作ってもらって、初回ロット20個を登録してもらえますか？

  受信者: 承知いたしました。新商品NP-2027の在庫登録ですね。

  発信者: そうです。来週月曜の朝までにお願いできると助かります。

  受信者: はい、月曜朝までですね。承知いたしました。

  発信者: 助かります。では、よろしくお願いします。

  受信者: はい、失礼いたします。

  発信者: 失礼します。'
