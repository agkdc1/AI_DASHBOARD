id: call_kr_008
name: 'KR call #8'
language: ko-KR
text: '(전화벨 소리)


  **수신자:** 네, [REDACTED_NAME]입니다.


  **발신자:** 여보세요, [REDACTED_NAME]입니다. 수고 많으십니다.


  **수신자:** 아, 네, [REDACTED_NAME]님. 안녕하세요.


  **발신자:** 다름이 아니라, 부품 재고 관련해서 연락드렸습니다. 저희 쪽에서 사용하는 P-C9012 재고가 현재 50개밖에 남지 않았습니다.


  **수신자:** 아, 벌써 그렇게 됐나요? 알겠습니다. 확인했습니다.


  **발신자:** 네, 그래서 다음 주 중으로 추가 발주를 부탁드려도 될까요?


  **수신자:** 네, 물론입니다. 바로 처리해서 다음 주까지는 입고될 수 있도록 조치하겠습니다.


  **발신자:** 감사합니다. 그럼 잘 부탁드립니다.


  **수신자:** 네, 알겠습니다.


  **발신자:** 그럼 들어가세요.


  **수신자:** 네, 수고하세요.'
