id: call_ja_056
name: 'JA call #56'
language: ja-JP
text: '受信者：はい、[REDACTED_NAME]です。

  発信者：お疲れ様です、[REDACTED_NAME]です。来月の棚卸しの件でご相談なのですが、今お時間よろしいでしょうか。

  受信者：はい、大丈夫ですよ。

  発信者：ありがとうございます。来月のスケジュールですが、A棟を第一月曜日、B棟を翌日の火曜日で進めたいと考えているのですが、いかがでしょうか？

  受信者：承知しました。A棟が月曜、B棟が火曜ですね。問題ありません。

  発信者：よかったです。つきましては、そちらのチームの担当者割り当てを、来週金曜日までにお願いできますでしょうか。

  受信者：はい、承知いたしました。来週金曜までに担当者リストを提出します。

  発信者：助かります。では、よろしくお願いします。

  受信者：こちらこそ。失礼します。

  発信者：失礼します。'
