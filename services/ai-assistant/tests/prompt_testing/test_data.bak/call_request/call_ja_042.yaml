id: call_ja_042
name: 'JA call #42'
language: ja-JP
text: '受信者: 「はい、[REDACTED_NAME]です。」


  発信者: 「あ、もしもし、[REDACTED_NAME]です。お疲れ様です。」


  受信者: 「お疲れ様です。」


  発信者: 「今、少しよろしいでしょうか？」


  受信者: 「はい、大丈夫です。」


  発信者: 「ありがとう。新商品の**NP-2028**の件でお願いがありまして。**在庫登録**を[REDACTED_NAME]さんにお願いしたいのですが。」


  受信者: 「はい、**NP-2028**の**在庫登録**ですね。承知しました。」


  発信者: 「InvenTreeに新カテゴリーを作成して、そこに初回ロット50個を登録してもらえますか。来週月曜の朝までにお願いしたいです。」


  受信者: 「はい、承知いたしました。月曜朝までに対応します。」


  発信者: 「助かります。では、よろしくお願いします。」


  受信者: 「はい、承知いたしました。」


  発信者: 「では、失礼します。」


  受信者: 「失礼いたします。」'
