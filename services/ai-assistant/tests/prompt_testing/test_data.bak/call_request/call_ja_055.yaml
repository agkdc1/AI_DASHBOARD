id: call_ja_055
name: 'JA call #55'
language: ja-JP
text: 'はい、[REDACTED_NAME]です。


  お疲れ様です、[REDACTED_NAME]です。今、少しよろしいですか？


  はい、大丈夫ですよ。


  ありがとうございます。来月の棚卸しの件でご相談なんですが、スケジュールの案を考えまして。A棟を月曜、B棟は火曜で進めたいのですが、ご都合いかがでしょうか？


  はい、その日程で問題ありません。


  よかったです。では、そのスケジュールで進めますね。つきましては、各棟の担当者の割り当てを来週金曜日までにお願いできますでしょうか。


  承知しました。来週金曜ですね。


  はい。あと、棚卸しマニュアルも少し更新が必要なので、そちらも合わせてお願いします。では、よろしくお願いします。


  はい、承知しました。失礼します。'
