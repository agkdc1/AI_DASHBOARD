id: call_kr_028
name: 'KR call #28'
language: ko-KR
text: '여보세요, 물류팀 [REDACTED_NAME]입니다. 수고 많으십니다.

  네, [REDACTED_NAME]님. 안녕하세요. 무슨 일이세요?

  다름이 아니라, 오늘 출고된 건의 **운송장** 관련해서 연락드렸습니다. 시스템을 확인해 보니 주소 입력 **오류**가 두 건 발생한 것 같습니다.

  아, 그래요? 어떤 주문 건인지 알 수 있을까요?

  네, 제가 지금 메일로 주문 번호 보내드리겠습니다. 확인하시고 고객분께 연락해서 정확한 주소로 수정 후 재발송 처리 부탁드려도 될까요?

  네, 알겠습니다. 메일 확인하는 대로 바로 처리하겠습니다.

  감사합니다. 그럼 잘 부탁드립니다.

  네, 수고하세요. 들어가세요.'
expected:
  valid_json_keys:
  - title
  - description
  - due_date
  - priority
  - decisions
  title_contains:
  - 운송장
  - 오류
  priority_range:
  - 3
  - 4
  has_decisions: true
