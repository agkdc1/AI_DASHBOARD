id: call_ja_057
name: 'JA call #57'
language: ja-JP
text: '（プルルル… ガチャ）


  **受信者:** はい、[REDACTED_NAME]です。


  **発信者:** もしもし、お疲れ様です。[REDACTED_NAME]です。今、少しよろしいでしょうか？


  **受信者:** あ、お疲れ様です。はい、大丈夫ですよ。


  **発信者:** ありがとうございます。来月の**棚卸し**の件でご相談なんですが、**スケジュール**を第一週の月曜にA棟、火曜にB棟で進めたいと考えているのですが、いかがでしょうか？


  **受信者:** 月曜がA棟、火曜がB棟ですね。承知しました。それで問題ないと思います。


  **発信者:** ありがとうございます。では、その日程で進めます。つきましては、各担当者の割り当てを来週金曜日までにお願いできますでしょうか。


  **受信者:** 了解です。来週金曜までに割り当てますね。


  **発信者:** よろしくお願いします。**では**、失礼いたします。


  **受信者:** はい、お疲れ様です。**失礼します**。'
