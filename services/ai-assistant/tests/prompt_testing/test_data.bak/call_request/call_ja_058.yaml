language: ja-JP
text: '（受信者）はい、[REDACTED_NAME]です。

  （発信者）あ、お疲れ様です。[REDACTED_NAME]です。今ちょっとよろしいですか？

  （受信者）お疲れ様です。はい、大丈夫です。

  （発信者）来月の**棚卸し**の件なんですが、**スケジュール**をA棟は月曜、B棟は火曜で進めようと思っています。そちらで問題ないでしょうか？

  （受信者）はい、その日程で問題ありません。ありがとうございます。

  （発信者）よかったです。では、その方向で進めますね。つきましては、各棟の担当者の割り当てを、来週の金曜日までに決めていただけますか？

  （受信者）承知しました。来週金曜までに担当者を決めます。

  （発信者）ありがとうございます。あと、棚卸しマニュアルの更新も併せてお願いします。

  （受信者）はい、承知しました。

  （発信者）では、よろしくお願いします。失礼します。

  （受信者）はい、失礼します。'
