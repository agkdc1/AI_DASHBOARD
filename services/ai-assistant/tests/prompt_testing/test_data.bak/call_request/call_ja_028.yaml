language: ja-JP
text: 'はい、[REDACTED_NAME]です。


  もしもし、お疲れ様です。[REDACTED_NAME]です。今、少しよろしいでしょうか。


  お疲れ様です。はい、大丈夫ですよ。


  ありがとうございます。先日お話ししていたサーバーのメンテナンスの件ですが、来週の土曜日に実施する方向で進めたいと思っています。


  承知しました。来週の土曜日ですね。時間は何時頃になりそうでしょうか。


  深夜2時から朝6時までの4時間を予定しています。その間システムが停止しますので、つきましては、事前にユーザー様への通知をお願いできますでしょうか。


  はい、かしこまりました。では、その内容で通知の準備を進めておきます。


  助かります。ありがとうございます。では、また詳細はメールでお送りしますね。よろしくお願いします。


  はい、お待ちしております。失礼します。


  失礼します。'
