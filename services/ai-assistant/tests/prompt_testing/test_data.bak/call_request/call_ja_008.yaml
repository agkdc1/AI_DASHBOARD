text: 'もしもし、お疲れ様です。[REDACTED_NAME]です。今、少しよろしいですか？


  あ、[REDACTED_NAME]さん、お疲れ様です。はい、大丈夫ですよ。


  ありがとうございます。部品の**在庫**について確認したいのですが、型番**P-B5678**の現在の状況、わかりますでしょうか？


  ああ、**P-B5678**ですね。少々お待ちください…ええと、システムで確認したところ、実質**在庫**が残り20個ですね。想定より減っています。


  20個ですか…。来週の生産で使うので、少し足りませんね。急ぎで100個ほど追加発注をお願いしたいのですが、可能でしょうか？


  **はい**、承知いたしました。すぐに手配します。


  助かります。**では**、発注書の作成をよろしくお願いします。


  かしこまりました。後ほど共有しますね。**では**。


  はい、よろしくお願いします。**失礼します**。


  **失礼します**。'
