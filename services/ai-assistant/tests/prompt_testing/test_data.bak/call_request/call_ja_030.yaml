id: call_ja_030
name: 'JA call #30'
language: ja-JP
text: '（プルルル… ガチャ）


  **受信者:** はい、営業部の[REDACTED_NAME]です。


  **発信者:** もしもし、お疲れ様です。システム部の[REDACTED_NAME]です。今、少しよろしいでしょうか？


  **受信者:** あ、[REDACTED_NAME]さん、お疲れ様です。はい、大丈夫ですよ。


  **発信者:** ありがとうございます。先日お話ししていた**サーバー**の**メンテナンス**の件ですが、日程が来週の土曜日に決まりましたのでご連絡です。


  **受信者:** 承知しました。来週の土曜日ですね。


  **発信者:** はい。その間、システムが数時間停止する見込みです。つきましては、お手数ですが、事前にユーザー様へのご通知をお願いできますでしょうか。


  **受信者:** はい、承知いたしました。すぐに社内で展開して、通知を出します。


  **発信者:** ありがとうございます、助かります。では、詳細は追ってメールでも共有しますね。


  **受信者:** わかりました。よろしくお願いします。では。


  **発信者:** はい、失礼します。'
expected:
  valid_json_keys:
  - title
  - description
  - due_date
  - priority
  - decisions
  title_contains:
  - メンテナンス
  - サーバー
  priority_range:
