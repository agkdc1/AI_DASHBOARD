id: call_ja_059
name: 'JA call #59'
language: ja-JP
text: '（プルルル…ガチャ）


  受信者: 「はい、[REDACTED_NAME]です。」

  発信者: 「お疲れ様です、[REDACTED_NAME]です。今、お時間よろしいでしょうか。」

  受信者: 「はい、お疲れ様です。大丈夫ですよ。」

  発信者: 「ありがとうございます。来月の**棚卸し**の件でご相談です。**スケジュール**について、A棟を月曜、B棟を火曜で進めたいと考えているのですが、いかがでしょうか。」

  受信者: 「はい、承知しました。その日程で問題ありません。では、その方向で進めましょう。」

  発信者: 「助かります。つきましては、各担当者の割り当てを来週金曜日までにお願いできますでしょうか。あと、棚卸しマニュアルの更新も必要になります。」

  受信者: 「はい、わかりました。担当者リストと併せて対応しておきます。」

  発信者: 「ありがとうございます。では、以上です。よろしくお願いします。」

  受信者: 「承知いたしました。お疲れ様です。」

  発信者: 「失礼します。」'
