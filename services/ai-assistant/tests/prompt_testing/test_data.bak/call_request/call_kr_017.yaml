id: call_kr_017
name: 'KR call #17'
language: ko-KR
text: 'A: 여보세요?

  B: 네, [REDACTED_NAME]입니다.

  A: 아, [REDACTED_NAME] 대리님, 수고 많으십니다. 저 [REDACTED_NAME]입니다. 오전에 입고된 반품 건 때문에 연락드렸습니다.

  B: 네, 수고하십니다. 아, RMA-002 말씀이시죠? 확인하셨나요?

  A: 네, 방금 확인했는데 제품 외장에 약간의 긁힘이 있습니다. 기능에는 문제가 없는데, 이대로 재판매는 어려울 것 같습니다. 환불 처리로 진행할까요?

  B: 그렇군요. 네, 그렇게 하시죠. 고객에게는 환불 처리 진행해 주시고, 해당 RMA-002 제품은 폐기 처리 부탁드립니다.

  A: 네, 알겠습니다. 그럼 환불 및 폐기 처리 후 다시 보고드리겠습니다.

  B: 네, 수고하세요.

  A: 네, 그럼 들어가세요.'
