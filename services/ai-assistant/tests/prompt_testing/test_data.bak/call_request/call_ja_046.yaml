language: ja-JP
text: 'はい、[REDACTED_NAME]です。


  お疲れ様です、管理部の[REDACTED_NAME]です。今、少しよろしいでしょうか？


  はい、お疲れ様です。大丈夫ですよ。


  ありがとうございます。来月の**フォークリフト**の定期**点検**の件でご連絡しました。日程が来月の3日に決まりましたので、その前日までに、現場で何か不具合や気になる点がないか確認をお願いできますでしょうか？


  承知しました。来月の3日ですね。**はい**、事前に確認して、もし何かあればご報告します。


  助かります。**では**、よろしくお願いいたします。


  はい、承知いたしました。**失礼します**。


  **お疲れ様です**。**失礼します**。'
