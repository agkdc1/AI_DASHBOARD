id: call_ja_032
name: 'JA call #32'
language: ja-JP
text: '（コール音）


  受信者: 「はい、営業事務の[REDACTED_NAME]です。」


  発信者: 「もしもし、お疲れ様です。物流の[REDACTED_NAME]です。今、少しお時間よろしいでしょうか？」


  受信者: 「お疲れ様です。[REDACTED_NAME]さん。はい、大丈夫ですよ。」


  発信者: 「ありがとうございます。本日出荷分の送り状を作成していたところ、システム上で3件ほどエラーが出てしまいまして。どうも住所の入力に問題があるようなんです。」


  受信者: 「あら、本当ですか。申し訳ありません。すぐ確認します。」


  発信者: 「はい、お願いします。該当の受注番号を今からチャットでお送りしますので、データの確認と修正をお願いできますでしょうか。」


  受信者: 「はい、承知いたしました。確認して、修正が完了したら折り返しご連絡します。」


  発信者: 「助かります。では、よろしくお願いいたします。失礼します。」


  受信者: 「はい、失礼します。」'
expected:
  valid_json_keys:
  - title
  - description
  - due_date
  - priority
  - decisions
  title_contains:
  - 送り状
  - エラー
  priority_range:
  - 3
  - 4
  has_decisions: true
