id: call_ja_014
name: 'JA call #14'
language: ja-JP
text: '受信者：「はい、[REDACTED_NAME]です。」


  発信者：「お疲れ様です、[REDACTED_NAME]です。今、少しお時間よろしいでしょうか？」


  受信者：「お疲れ様です。はい、大丈夫ですよ。」


  発信者：「ありがとうございます。ご相談なのですが、最近**楽天**からの**注文**で、発送遅延に関する問い合わせが少し増えてきている件です。つきましては、一度、現在の処理フローを見直したいと思いまして。」


  受信者：「なるほど、承知しました。確かに最近立て込んでいましたね。」


  発信者：「ええ。そこで、来週あたりに30分ほどミーティングの時間をいただけないでしょうか。」


  受信者：「はい、大丈夫です。火曜日の14時以降でしたら空いています。」


  発信者：「ありがとうございます。では火曜14時でお願いします。事前に、現状の課題点を簡単にまとめておいていただけますか？」


  受信者：「はい、承知いたしました。準備しておきます。」


  発信者：「助かります。では、また改めてご連絡します。失礼いたします。」


  受信者：「はい、失礼いたします。」'
