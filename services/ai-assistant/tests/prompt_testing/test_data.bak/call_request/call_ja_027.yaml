id: call_ja_027
name: 'JA call #27'
language: ja-JP
text: 'はい、営業部の[REDACTED_NAME]です。


  お疲れ様です、システム部の[REDACTED_NAME]です。今少しよろしいでしょうか。


  はい、お疲れ様です。大丈夫ですよ。


  ありがとうございます。来週のサーバーのメンテナンスの件でご連絡いたしました。来週土曜日の深夜、午前1時から5時にかけて実施を予定しており、その間システムが停止します。つきましては、事前に部署内でご周知いただけますでしょうか。


  承知いたしました。土曜の深夜ですね。ユーザー向けの通知文のテンプレートなどはありますか？


  はい、ございます。後ほどメールで共有いたしますので、そちらをベースにご案内いただければと思います。


  助かります。では、メールを確認後、対応いたします。


  よろしくお願いいたします。では、失礼します。


  はい、失礼します。'
