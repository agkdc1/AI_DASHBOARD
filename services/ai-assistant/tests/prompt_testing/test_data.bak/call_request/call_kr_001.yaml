id: call_kr_001
name: 'KR call #1'
language: ko-KR
text: '여보세요, 영업팀 [REDACTED_NAME]입니다.


  아, 네. [REDACTED_NAME] 과장님. 수고 많으십니다. 물류팀 [REDACTED_NAME]입니다.


  네, 과장님. 다름이 아니라, 주문번호 SO-2024-1234 건 때문에 연락드렸는데요. 혹시 오늘 바로 출하 가능할지 해서요.


  SO-2024-1234요? 잠시만요, 확인해 보겠습니다... 네, 확인됐습니다. 오늘 오후 출하 문제없습니다.


  아, 다행이네요. 감사합니다. 그럼 오늘 오후 3시 집하에 맞춰서 처리 부탁드립니다.


  네, 알겠습니다. 그렇게 진행하겠습니다.


  네, 감사합니다. 그럼 수고하세요.


  네, 들어가세요.'
