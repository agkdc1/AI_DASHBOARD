id: call_ja_007
name: 'JA call #7'
language: ja-JP
text: '（プルルル…ガチャ）


  受信者: 「はい、資材管理部の[REDACTED_NAME]です。」


  発信者: 「もしもし、お疲れ様です。営業の[REDACTED_NAME]です。今、少しよろしいでしょうか。」


  受信者: 「あ、[REDACTED_NAME]さん、お疲れ様です。はい、大丈夫ですよ。」


  発信者: 「ありがとうございます。急ぎで確認したいのですが、部品番号P-A1234の在庫って、現在どれくらいありますか？」


  受信者: 「P-A1234ですね。少々お待ちください…ああ、かなり減ってますね。実質引き当て可能なのは10個もないです。」


  発信者: 「やっぱりそうですか。来週の案件で急に30個ほど必要になりまして。追加で発注をお願いできませんか？」


  受信者: 「30個ですね。はい、承知しました。至急で手配すれば来週頭には間に合うと思います。」


  発信者: 「助かります！では、発注手続きよろしくお願いします。」


  受信者: 「はい、了解です。では、また何かあれば。」


  発信者: 「はい、ありがとうございます。失礼します。」


  受信者: 「お疲れ様です。失礼します。」'
