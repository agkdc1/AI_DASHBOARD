text: '**[REDACTED_NAME] B:** 여보세요, [REDACTED_NAME] B입니다.


  **[REDACTED_NAME] A:** 아, [REDACTED_NAME] B씨. 저 [REDACTED_NAME] A입니다. 수고 많으십니다.


  **[REDACTED_NAME] B:** 네, 팀장님. 안녕하세요. 무슨 일이세요?


  **[REDACTED_NAME] A:** 네, 다름이 아니라 신상품 NP-2027 관련해서요. 오늘 입고된 거 재고 등록 좀 부탁드리려고요.


  **[REDACTED_NAME] B:** 아, 네. NP-2027 말씀이시죠? 어떻게 진행할까요?


  **[REDACTED_NAME] A:** 네. InvenTree에 새 카테고리 만들고 초회 로트 20개 바로 등록해 주세요.


  **[REDACTED_NAME] B:** 알겠습니다. 신규 카테고리로 NP-2027 생성하고, 입고 수량 20개로 재고 등록하겠습니다.


  **[REDACTED_NAME] A:** 네, 맞습니다. 바로 처리 부탁해요. 그럼 수고하세요.


  **[REDACTED_NAME] B:** 네, 알겠습니다. 들어가세요.'
