id: meeting_mix_007
name: Annual planning kickoff
language: mixed
transcript: '[REDACTED_NAME]：皆さん、お疲れ様です。それでは、来年度の事業計画キックオフミーティングを始めます。


  [REDACTED_NAME]：はい、よろしくお願いします。


  [REDACTED_NAME]：네, 잘 부탁드립니다.


  [REDACTED_NAME]：早速ですが、来年度の全社目標についてです。色々厳しい状況はありますが、挑戦的な目標として、**事業計画**全体の**매출**、つまり売上を前年比**120%**で目指したいと考えています。


  [REDACTED_NAME]：120%ですか…。かなりチャレンジングですね。何か具体的な施策の方向性はありますか？


  [REDACTED_NAME]：ええ。大きな柱として、新規マーケットプレイスへの出店拡大を考えています。[REDACTED_NAME]さん、韓国側の状況はどうですか？


  [REDACTED_NAME]：네, 120% 달성을 위해서는 한국 시장에서의 신규 채널 확보가 필수적입니다. 지금 후보로는 A 쇼핑몰과 B 플랫폼이
  있는데, 특히 젊은 층을 타겟으로 한다면 B가 더 유력할 것 같습니다. (はい、120%達成のためには韓国市場での新規チャネル確保が必須です。現在の候補としてはAショッピングモールとBプラットフォームがありますが、特に若年層をターゲットにするならBがより有力だと思います。)


  [REDACTED_NAME]：なるほど、Bプラットフォームですか。ありがとうございます。では、まずアクションアイテムとして、[REDACTED_NAME]さんは日本側、[REDACTED_NAME]さんは韓国側で、それぞれ候補となるマーケットプレイスの初期費用と手数料を調査して、来週の金曜日までに共有してください。


  [REDACTED_NAME]：承知しました。


  [REDACTED_NAME]：알겠습니다. 바로 조사해서 공유하겠습니다. (承知しました。すぐに調査して共有します。)


  [REDACTED_NAME]：お願いします。では、本日の決定事項として「来年度**매출**目標は前年比**120%**」を確定します。これを受けて、[REDACTED_NAME]さん、今日の議事録と合わせて、全社共有用の**事業計画**概要書のドラフトを更新しておいてください。


  [REDACTED_NAME]：はい、かしこまりました。本日中に更新します。'
expected:
  action_items:
    min_count: 1
  decisions:
    min_count: 1
    contains_keywords:
    - 事業計画
    - 120%
    - 매출
