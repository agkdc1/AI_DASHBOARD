id: meeting_ja_005
name: New product launch planning
language: ja-JP
transcript: '[REDACTED_NAME]：皆さん、お集まりいただきありがとうございます。それでは、新商品NP-2026の発売計画会議を始めます。まず、生産スケジュールからですが、[REDACTED_NAME]さん、いかがでしょうか？


  [REDACTED_NAME]：はい、製造ラインは順調です。来月初旬の初回ロット出荷は問題なく間に合う見込みです。


  [REDACTED_NAME]：それは良かった。ありがとうございます。では、本日の主要議題である価格設定に移ります。原価と競合製品を考慮して、販売価格は3,500円でいきたいと考えていますが、ご意見ありますか？


  [REDACTED_NAME]：3,500円ですか。なるほど。マーケティング側で調査した限りでは、競合A社が3,800円、B社が3,300円なので、妥当なラインだと思います。品質を考えれば、むしろ少し安いくらいかもしれませんね。


  [REDACTED_NAME]：そうですね。では、**新商品「NP-2026」の価格は税込み3,500円**ということで決定とします。よろしいでしょうか？


  （一同頷く）


  [REDACTED_NAME]：ありがとうございます。次にプロモーションですが、[REDACTED_NAME]さん、ウェブサイト用の商品写真の準備は進んでいますか？


  [REDACTED_NAME]：はい、準備は進めていますが、撮影用の最終サンプルがまだ手元になくて。いつ頃いただけますか？


  [REDACTED_NAME]：ああ、すみません。明日にはお渡しできます。


  [REDACTED_NAME]：承知しました。では、撮影は来週中に行います。**アクションアイテムとして、[REDACTED_NAME]は来週金曜日までに商品撮影を完了させます。**


  [REDACTED_NAME]：お願いします。あと、発売に先駆けて、在庫管理システムへの商品登録も必要になりますね。これは誰が担当しましょうか？


  [REDACTED_NAME]：私の方でやっておきます。**アクションアイテムとして、[REDACTED_NAME]が来週金曜日までに在庫システムにNP-2026を登録します。**


  [REDACTED_NAME]：助かります。では、本日の議題は以上です。皆さん、発売に向けて引き続きよろしくお願いします。'
