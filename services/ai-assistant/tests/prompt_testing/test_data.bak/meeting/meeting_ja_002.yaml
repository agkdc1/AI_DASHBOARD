id: meeting_ja_002
name: Shipping process meeting
language: ja-JP
transcript: '[REDACTED_NAME]: 皆さん、お疲れ様です。今日は出荷プロセスの見直しについて、短時間ですが打ち合わせをお願いします。


  [REDACTED_NAME]: はい、お疲れ様です。


  [REDACTED_NAME]: よろしくお願いします。


  [REDACTED_NAME]: 早速本題ですが、先日、ヤマト運輸の担当者から連絡がありまして、集荷の締め切り時間が変更になるとのことです。


  [REDACTED_NAME]: えっ、そうなんですか？いつからですか？


  [REDACTED_NAME]: 来週の月曜日からです。今後の集荷は、最終便が15時になるとのことです。


  [REDACTED_NAME]: 15時ですか！今までは16時だったので、1時間早まりますね。そうなると、14時以降に受けた注文の当日出荷がかなり厳しくなりますね…。


  [REDACTED_NAME]: そうなんですよ。お客様への影響も考えないといけませんね。これはもう先方の都合なので、受け入れるしかありません。**というわけで決定事項ですが、来週月曜からヤマトの集荷は15時を最終とします。**


  [REDACTED_NAME]: 承知しました。


  [REDACTED_NAME]: それに伴って、いくつか対応が必要です。[REDACTED_NAME]さん、まずは社内の出荷業務マニュアルを更新してください。送り状の発行締め切り時間などを修正する必要があります。


  [REDACTED_NAME]: わかりました。いつまでに対応すればよろしいでしょうか？


  [REDACTED_NAME]: 月曜から運用開始なので、今週の金曜日までにお願いできますか？


  [REDACTED_NAME]: はい、金曜日中に更新版を共有します。


  [REDACTED_NAME]: お願いします。それからもう一点。これを機に、他の運送会社との比較も再度行いたいと思っています。[REDACTED_NAME]さん、佐川急便にも連絡を取って、うちの最近の物量に基づいた新しい見積もりをもらってください。


  [REDACTED_NAME]: 承知いたしました。来月末の契約更新のタイミングに合わせる感じですかね。


  [REDACTED_NAME]: そうですね。なので、来月15日くらいまでには見積もりをもらえるよう動いてください。


  [REDACTED_NAME]: わかりました。


  [REDACTED_NAME]: では本日のアクションアイテムは以上です。皆さん、ご対応よろしくお願いします。これで会議を終わります。'
expected:
  action_items:
    min_count: 2
  decisions:
    min_count: 1
    contains_keywords:
    - 集荷
    - 15時
    - ヤマト
  doc_updates:
    min_count: 1
