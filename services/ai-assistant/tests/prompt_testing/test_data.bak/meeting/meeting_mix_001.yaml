id: meeting_mix_001
name: Cross-team shipping coordination
language: mixed
transcript: '[REDACTED_NAME_1]：お疲れ様です。では、定例の出荷調整会議を始めます。早速ですが、[REDACTED_NAME_2]さん、来週の出荷状況について共有をお願いします。


  [REDACTED_NAME_2]：네, 수고하십니다. 다음 주 화요일에 대량 **출하**가 예정되어 있습니다. 현재 집계된 것만으로도 약 **200**건이
  넘을 것 같습니다. (はい、お疲れ様です。来週の火曜日に大量の出荷が予定されています。現在集計されただけでも約200件を超える見込みです。)


  [REDACTED_NAME_3]：200件ですか！それはかなり多いですね。いつもの夕方の集荷だけだと、作業が間に合わないかもしれませんね。


  [REDACTED_NAME_1]：そうですね…。梱包スペースもそうですし、トラックに全部乗り切るかどうかも心配です。


  [REDACTED_NAME_2]：네, 맞아요. 오후 4시 정기 집하로는 시간이 부족할 수 있습니다. (はい、そうです。午後4時の定期集荷では時間が足りないかもしれません。)


  [REDACTED_NAME_1]：分かりました。では決定事項として、来週火曜日の大型**出荷**に対応するため、ヤマト運輸に臨時で追加の集荷を依頼しましょう。これは確定でお願いします。


  [REDACTED_NAME_3]：承知しました。


  [REDACTED_NAME_1]：ではアクションアイテムです。[REDACTED_NAME_3]さん、ヤマトの担当の方に連絡して、今週金曜日までに集荷スケジュールの調整をお願いできますか？午前中にも一度来てもらうのが理想ですね。


  [REDACTED_NAME_3]：はい、承知しました。金曜までに調整して、スケジュールを全体に共有します。


  [REDACTED_NAME_2]：알겠습니다. 그럼, 이번 건을 계기로 대량 출하 시의 대응 매뉴얼을 업데이트하는 게 좋을 것 같습니다. (了解しました。では、今回の件を機に、このような大量出荷時の対応マニュアルを更新しておくのが良さそうです。)


  [REDACTED_NAME_1]：あ、いい提案ですね！確かに。じゃあ今回の対応フローを、既存の「出荷業務手順書」に追記する形でドキュメント更新をお願いします。下書きを[REDACTED_NAME_2]さんにお願いしてもいいですか？


  [REDACTED_NAME_2]：네, 제가 초안 작성하겠습니다. (はい、私が下書きを作成します。)


  [REDACTED_NAME_1]：ありがとうございます。では、本日は以上です。お疲れ様でした。'
expected:
  action_items:
    min_count: 1
  decisions:
    min_count: 1
    contains_keywords:
    - 出荷
    - '200'
    - 출하
  doc_updates:
    min_count: 1
