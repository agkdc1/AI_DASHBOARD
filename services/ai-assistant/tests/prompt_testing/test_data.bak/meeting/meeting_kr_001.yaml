id: meeting_kr_001
name: 재고 점검 회의
language: ko-KR
transcript: '[REDACTED_NAME]1: 자, 그럼 2월 재고 점검 회의 시작하겠습니다. 지난주에 진행한 정기 재고 실사 결과부터 공유해
  주시죠, [REDACTED_NAME]2 대리님.


  [REDACTED_NAME]2: 네, 팀장님. 전반적으로는 시스템 수량과 실제 재고가 거의 일치했는데, 한 가지 품목에서 큰 차이가 발견되었습니다.
  SKU-C1234 제품인데, 시스템상으로는 150개가 있어야 하는데 실사 수량은 130개로 20개가 부족합니다.


  [REDACTED_NAME]3: 20개나요? 혹시 입고할 때 수량을 잘못 카운트했거나 반품 처리 과정에서 누락된 건 아닐까요?


  [REDACTED_NAME]2: 입고 기록과 반품 내역은 전부 확인했는데 특이사항은 없었습니다. 아, 그러고 보니 지난주에 영업팀에서 급하게 요청해서
  출고한 건이 하나 있었습니다. 아마 그때 전산 처리가 누락된 것 같습니다.


  [REDACTED_NAME]1: 흠, 긴급 출하 건은 종종 그런 실수가 발생하죠. 알겠습니다. 그럼 이렇게 하죠. 우선 다음 주 정기 **재고**
  **실사** 전까지 해당 **SKU**의 입출고 기록과 이동 경로를 전수 재조사하는 것으로 결정하겠습니다. [REDACTED_NAME]2 대리님,
  월요일까지 영업팀 긴급 출하 전표랑 시스템 로그를 대조해서 정확한 원인을 파악하고 보고해 주세요.


  [REDACTED_NAME]2: 네, 알겠습니다. 바로 확인해서 보고드리겠습니다.


  [REDACTED_NAME]3: 팀장님, 이런 일이 반복되지 않으려면 긴급 출하 시 업무 절차를 명확하게 할 필요가 있을 것 같습니다.


  [REDACTED_NAME]1: 좋은 지적이네요. 그럼 [REDACTED_NAME]3 주임님이 재고 관리 매뉴얼에 ''긴급 출하 시 선출고 후전산
  입력 절차 및 책임자 확인'' 항목을 추가해서 업데이트해 주세요.


  [REDACTED_NAME]3: 네, 알겠습니다. 해당 내용 정리해서 바로 매뉴얼 반영하겠습니다.


  [REDACTED_NAME]1: 좋습니다. 그럼 오늘 회의는 여기까지 하죠. 수고하셨습니다.'
expected:
  action_items:
    min_count: 1
  decisions:
    min_count: 1
    contains_keywords:
    - 재고
    - SKU
    - 실사
  doc_updates:
    min_count: 1
