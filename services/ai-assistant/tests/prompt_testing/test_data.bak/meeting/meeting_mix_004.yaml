id: meeting_mix_004
name: Quality control improvements
language: mixed
transcript: '[REDACTED_NAME]：では、時間になりましたので、品質管理の定例会議を始めます。まず、先月の不良品率のデータから確認しましょう。


  [REDACTED_NAME]：네, 보고드리겠습니다. 지난달 최종 불량률은 0.5%로 집계되었습니다. 목표치였던 0.4%를 약간 상회하는 수치입니다.

  （はい、ご報告します。先月の最終不良率は0.5%と集計されました。目標値だった0.4%を若干上回る数値です。）


  [REDACTED_NAME]：0.5%か… やはり高いですね。特にどの工程での不良が目立ちましたか？


  [REDACTED_NAME]：네, 확인해보니 B라인의 최종 검사 단계에서 미세한 흠집 불량이 전체의 60%를 차지했습니다. 작업자 간의 판단 기준이
  조금 모호해서 발생한 것 같습니다.

  （はい、確認したところ、Bラインの最終検査段階での微細な傷の不良が全体の60%を占めていました。作業者間の判断基準が少し曖昧で発生したようです。）


  [REDACTED_NAME]：なるほど、判断基準の標準化が課題ですね。これを機に、全ラインの検査基準をより厳格に見直しましょう。


  [REDACTED_NAME]：찬성입니다. 그럼 새로운 **品質** 목표를 설정하는 게 좋겠습니다.思い切って、来月からの**불량**率は**0.3%**以下を必達目標にしませんか？


  [REDACTED_NAME]：いいですね。では、**決定事項**として、来月からの不良率目標は0.3%以下とします。それに向けて、[REDACTED_NAME]さん、**アクションアイテム**ですが、新しい基準を盛り込んだ**品質管理マニュアル**の改訂案を作成してもらえますか？


  [REDACTED_NAME]：네, 알겠습니다. 그 매뉴얼에 맞춰서 현장에서 사용하는 **검품 체크리스트**도 업데이트하겠습니다. 다음 주 금요일까지
  초안을 공유하겠습니다.

  （はい、承知しました。そのマニュアルに合わせて、現場で使う**検品チェックリスト**も更新します。来週の金曜日までに草案を共有します。）


  [REDACTED_NAME]：頼みます。では、本件は以上です。進捗は来週の会議で確認しましょう。'
expected:
  action_items:
    min_count: 1
  decisions:
    min_count: 1
    contains_keywords:
    - 品質
    - 불량
    - 0.3%
  doc_updates:
    min_count: 1
