[pytest]
asyncio_mode = auto
testpaths = tests
markers =
    integration: Tests requiring live production services (skip with -m "not integration")
    slow: Tests that may take a long time (live Gemini calls, etc.)
    prompt_test: Prompt quality tests against live Gemini (requires RUN_PROMPT_TESTS=1)
    tts: Tests involving GCP Text-to-Speech audio generation
timeout = 60
