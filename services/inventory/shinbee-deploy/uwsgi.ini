[uwsgi]
# WSGI application
module = InvenTree.wsgi:application
chdir = /home/inventree/src/backend/InvenTree

# Unix socket (shared with Nginx via named volume)
socket = /var/run/uwsgi/inventree.sock
chmod-socket = 666
vacuum = true

# Process management
master = true
processes = 4
threads = 2
enable-threads = true

# Large buffer for InvenTree auth headers
buffer-size = 65535

# Request timeout (seconds)
harakiri = 120

# Graceful shutdown
die-on-term = true

# Worker recycling
max-requests = 1000

# Logging
logto = /dev/stderr
