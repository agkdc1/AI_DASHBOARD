# Sagawa e飛伝III (e-Hiden III) selectors
# Login is via Keycloak SSO at www.e-service.sagawa-exp.co.jp
# e飛伝III app runs on e-hiden3.sagawa-exp.co.jp (Element UI SPA)

login:
  business_tab: "#tab02"
  user_id_input: "#user2"
  password_input: "#pass2"
  login_button: "#hojin-login-button"

dashboard:
  # e飛伝III quick menu link on Smart Club dashboard
  ehiden_quick_menu: "#svcMenuQuickMenu-0"
  # Also available in the main menu
  ehiden_main_menu: "#svcMenuParcel-0"

ehiden_menu:
  # Service type buttons in the popup after clicking 送り状作成
  service_takuhai: "button.svcPopupBtn"

shipment_create:
  # ---- お届け先 (Recipient) ----
  recipient_code: "#input-otdkSkCd"
  recipient_phone: "#input-otdkSkTel"
  recipient_postal: "#input-otdkSkYbn"
  recipient_address1: "#input-otdkSkJsy1"
  recipient_address2: "#input-otdkSkJsy2"
  recipient_address3: "#input-otdkSkJsy3"
  recipient_name1: "#input-otdkSkNm1"
  recipient_name2: "#input-otdkSkNm2"
  customer_ref_number: "#input-kyakuKnrNo"
  # ---- 出荷 (Shipment) ----
  shipping_date: "#picker-syuDd"
  # ---- 荷姿・品名 (Package/Items) ----
  package_type: "#select-nisugata"
  item_name_1: "#input-hinNm-1"
  item_name_2: "#input-hinNm-2"
  # ---- Footer buttons ----
  register_button: "button.footer-button"
  # 反映 (reflect) button next to postal code
  postal_reflect: "button.refrect-button"

# Metadata for Gemini repair context
_descriptions:
  login.business_tab: "Radio button to switch to 法人 (business/corporate) login form"
